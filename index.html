h para pejuang di jalan Allah).", "Dari Mujāhid: “al-ghuzāt” (para pejuang).", "Dari Qatādah: “fī sabīl Allāh: fī ghazwin fī sabīl Allāh” (dalam peperangan di jalan Allah).", "Dari Ibn Zayd: “al-ghāzī fī sabīl Allāh alladhī lā yakūnu lahu fī al-dīwān ḥaqqun, fa-yuʿṭā min al-zakāh mā yablaghuhu ghazāhu” (pejuang di jalan Allah yang tidak memiliki hak tetap dalam daftar tunjangan negara, maka ia diberi dari zakat secukupnya untuk melanjutkan perangnya).", "Riwayat serupa juga dinukil dari Ibn ʿUmar yang menyebut “al-ghuzāt fī sabīl Allāh”.", "Kesimpulan:", "Menurut al-Ṭabarī, fī sabīlillāh secara khusus tertuju kepada para pejuang (mujahidin) yang memerlukan bekal untuk berperang, baik mereka itu orang miskin maupun kaya yang sedang kehabisan perbekalan dan tidak mendapat gaji tetap dari negara. Pendapat ini menutup makna lain di luar jihad. (Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, ed. Maḥmūd Muḥammad Shākir, jil. 14, hlm. 315–319)", "b. Ibn Kathīr dalam Tafsīr al-Qurʾān al-ʿAẓīm", "Cara Menafsirkan:", "Ibn Kathīr menafsirkan fī sabīlillāh sebagai para pejuang yang tidak memperoleh tunjangan tetap dari baitulmal (lā ʿaṭāʾa lahum fī al-dīwān). Penafsirannya sangat dipengaruhi oleh dalil hadis yang membatasi penerima zakat dari kalangan orang mampu hanya pada lima golongan.", "Riwayat dan Athar yang Dikutip:", "Hadis dari Abū Saʿīd al-Khudrī secara marfu’: “Lā taḥillu al-ṣadaqatu li-ghanīyin illā li-khamsin: li-ʿāmilin ʿalayhā, aw rajulin ishtarāhā bi-mālihi, aw ghārimin, aw ghāzin fī sabīl Allāh, aw miskīnin tuṣuddiqa ʿalayhi minhā fa-ahdāhā li-ghanīyin” (Zakat tidak halal bagi orang kaya kecuali untuk lima golongan: amil zakat, orang yang membelinya dengan hartanya sendiri, orang yang terlilit utang, pejuang di jalan Allah, dan orang miskin yang menerima zakat lalu menghadiahkannya kepada orang kaya). (HR. Abū Dāwūd, Ibn Mājah, dan Aḥmad; dinilai sahih).", "Ibn Kathīr juga menukil praktik para sahabat dan tabiin yang mengkhususkan makna ini pada jihad, serta menolak perluasan makna yang terlalu umum.", "Kesimpulan:", "Ibn Kathīr menegaskan bahwa fī sabīlillāh bermakna khusus para mujahid yang membutuhkan biaya untuk berperang di jalan Allah. Ia menyebutkan adanya pendapat lain yang memperluasnya ke seluruh bentuk kebajikan, namun ia lebih condong dan menguatkan pendapat jumhur yang membatasinya pada jihad. (Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, ed. Sāmī ibn Muḥammad al-Salāmah, jil. 4, hlm. 145–146)", "c. Al-Qurṭubī dalam al-Jāmiʿ li-Aḥkām al-Qurʾān", "Cara Menafsirkan:", "Al-Qurṭubī menyajikan diskusi yang paling luas. Ia mengemukakan dua pendapat utama di kalangan ulama, lalu mentarjih salah satunya dengan tetap memberi ruang bagi pengecualian yang didukung dalil.", "Riwayat dan Athar yang Dikutip:", "Pendapat pertama (jumhur): fī sabīlillāh adalah jihad dan mereka yang bertugas di pos penjagaan perbatasan (al-murābiṭūn). Diriwayatkan dari Ibn ʿUmar, ʿIkrimah, dan lainnya bahwa maksudnya adalah para tentara yang terputus dari harta mereka.", "Hadis Abū Saʿīd al-Khudrī yang sama seperti di atas juga dijadikan dalil oleh jumhur.", "Pendapat kedua: sebagian ulama memperluas maknanya ke seluruh jalan kebaikan. Diriwayatkan dari Anas ibn Mālik dan al-Ḥasan al-Baṣrī bahwa fī sabīlillāh mencakup haji dan umrah. Bahkan, ada riwayat bahwa Ibn ʿAbbās pernah memberikan zakatnya untuk memberangkatkan orang berhaji.", "Al-Qurṭubī juga menukil dari mazhab Aḥmad ibn Ḥanbal yang membolehkan pemberian zakat kepada orang fakir untuk menunaikan ibadah haji wajib, karena hal itu termasuk fī sabīlillāh dalam arti perjalanan ketaatan yang memerlukan bekal.", "Kesimpulan:", "Al-Qurṭubī menegaskan bahwa secara asal dan menurut jumhur, makna fī sabīlillāh adalah jihad dan para pejuangnya. Namun, ia mengakui adanya pendapat minoritas yang sahih dari segi riwayat—seperti pemberian zakat untuk haji bagi orang yang tidak mampu—sebagai bagian dari sabīlillāh dalam arti ibadah yang memerlukan perjalanan fisik dan finansial. Ia mempertemukan kedua pandangan itu dengan menyatakan bahwa jika istilah dimutlakkan dalam syariat, maka ia tertuju pada jihad, tetapi dalam kasus tertentu dapat diperluas pada ketaatan lain jika memenuhi syarat. (Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, ed. ʿAbd Allāh al-Turkī, jil. 8, hlm. 238–240)", "Perbandingan Ketiga Tafsir: Titik Sepakat dan Perbedaan", "Titik Sepakat:", "Makna Utama adalah Jihad dan Para Pejuangnya. Ketiga mufasir sepakat bahwa makna dominan fī sabīlillāh dalam ayat ini adalah para pejuang (mujahidin) yang berperang di jalan Allah, khususnya mereka yang tidak memiliki akses keuangan pribadi atau tunjangan resmi.", "Penggunaan Dalil Hadis yang Sama. Ketiganya merujuk pada hadis Abū Saʿīd al-Khudrī yang menyebutkan “ghāzin fī sabīl Allāh” sebagai salah satu golongan yang dibolehkan menerima zakat meskipun kaya, yang memperkuat spesifikasi pada jihad.", "Pembatasan pada yang Tidak Mendapat Gaji Tetap. Al-Ṭabarī, Ibn Kathīr, dan al-Qurṭubī sama-sama menekankan bahwa penerima adalah pejuang yang tidak tercatat dalam daftar penerima tunjangan tetap negara (dīwān).", "Perbedaan:", "Cakupan Makna. Al-Ṭabarī dan Ibn Kathīr membatasi makna fī sabīlillāh secara eksklusif pada jihad fi sabilillah. Al-Qurṭubī, meskipun menguatkan pendapat jumhur, mengakui dan membahas secara serius pendapat yang memperluasnya ke haji dan umrah, terutama bagi orang fakir yang belum menunaikan haji wajib.", "Sikap Terhadap Riwayat Haji. Al-Ṭabarī sama sekali tidak menyinggung kemungkinan haji masuk dalam kategori ini. Ibn Kathīr menyebutkan secara singkat bahwa ada yang berpendapat demikian tetapi tidak menguatkannya. Sementara al-Qurṭubī memberikan ruang penjelasan yang proporsional terhadap pendapat tersebut dan mengutip praktik Ibn ʿAbbās serta mazhab Aḥmad ibn Ḥanbal, lalu menyelaraskannya dengan kaidah syariat.", "Pendekatan Tafsir. Al-Ṭabarī menggunakan metode tafsīr bi al-maʾthūr secara ketat dengan mendata seluruh riwayat tanpa melakukan tarjih yang memunculkan pengecualian. Ibn Kathīr langsung menyaring dengan hadis sehingga pandangannya lebih ringkas. Al-Qurṭubī sebagai mufasir hukum menguraikan perbedaan pendapat ulama, menyebutkan argumentasi masing-masing, dan memberi solusi hukum yang lebih fleksibel dalam batas-batas tertentu."], "claimed_refs": ["Al-Ṭabarī, Abū Jaʿfar Muḥammad ibn Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Ed. Maḥmūd Muḥammad Shākir. Dār al-Maʿārif, 1407 H. Jilid 14, halaman 315–319.", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl ibn ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Ed. Sāmī ibn Muḥammad al-Salāmah. Dār Ṭaybah, 1420 H. Jilid 4, halaman 145–146.", "Al-Qurṭubī, Abū ʿAbd Allāh Muḥammad ibn Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān. Ed. ʿAbd Allāh ibn ʿAbd al-Muḥsin al-Turkī. Muʾassasat al-Risālah, 1427 H. Jilid 8, halaman 238–240."]}, {"run_id": "DEEPSEEK-CoT-2", "model_id": "deepseek", "model": "DeepSeek", "family": "DeepSeek", "version": 2, "source_file": "Deepseek V2.docx", "word_count": 970, "paragraphs": ["Konteks Ayat dan Kedudukan fī sabīlillāh", "QS al-Tawbah [9]: 60 menetapkan delapan golongan yang berhak menerima zakat:", "“Sesungguhnya zakat itu hanyalah untuk orang-orang fakir, orang miskin, pengurus zakat (ʿāmilīn), para muallaf yang dibujuk hatinya, untuk (memerdekakan) hamba sahaya, orang yang berutang (ghārimīn), fī sabīlillāh, dan orang yang sedang dalam perjalanan (ibn sabīl)…”", "Frasa wa fī sabīlillāh menempati urutan ketujuh. Secara bahasa, sabīl berarti “jalan”, sedangkan sabīl Allāh adalah “jalan Allah”. Dalam diskursus tafsir bi al-maʾthūr, perbedaan utama terletak pada cakupan “jalan Allah” ini: apakah terbatas pada jihad (perang) atau mencakup seluruh bentuk ketaatan. Di bawah ini akan diuraikan penafsiran tiga mufasir terkemuka secara terpisah, dengan menyandarkan pada riwayat (athar) yang mereka kutip.", "Al-Ṭabarī dalam Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān", "Al-Ṭabarī membuka pembahasan dengan menegaskan bahwa makna paling sahih dari fī sabīlillāh adalah para pejuang (ghuzāh) yang berperang di jalan Allah dan tidak menerima tunjangan tetap dari baitul mal, baik mereka kaya maupun miskin. Ia mengemukakan sejumlah athar dari sahabat dan tabiin untuk memperkuat pandangan ini:", "Riwayat dari Mujāhid (tabiin):", "“Mereka adalah para penunggang kuda dalam pasukan perang.”", "[Jāmiʿ al-Bayān, jilid 14, hlm. 316]", "Riwayat dari Qatādah (tabiin):", "“Mereka adalah para pejuang di jalan Allah.”", "[Jāmiʿ al-Bayān, jilid 14, hlm. 317]", "Riwayat dari al-Ḥasan al-Baṣrī (tabiin) yang menambahkan bahwa fī sabīlillāh juga mencakup para jamaah haji yang kehabisan bekal, tetapi al-Ṭabarī secara eksplisit mengkritik riwayat ini karena menurutnya tidak bersambung sanadnya hingga Nabi dan bertentangan dengan pendapat mayoritas sahabat. Ia menegaskan bahwa haji termasuk dalam kategori ibn sabīl (musafir), bukan fī sabīlillāh.", "[Jāmiʿ al-Bayān, jilid 14, hlm. 317-318]", "Al-Ṭabarī juga mengutip pendapat Ibnu ʿAbbās (sahabat) melalui jalur ʿAlī bin Abī Ṭalḥah:", "“Fī sabīlillāh adalah para pejuang dari kalangan pasukan.”", "[Jāmiʿ al-Bayān, jilid 14, hlm. 316]", "Kesimpulan al-Ṭabarī: Fī sabīlillāh secara definitif bermakna para mujahid yang berperang di jalan Allah. Mereka berhak menerima zakat untuk menutup biaya perbekalan, senjata, dan kendaraan tempur, meskipun secara pribadi mereka berkecukupan.", "Ibn Kathīr dalam Tafsīr al-Qurʾān al-ʿAẓīm", "Ibn Kathīr mengikuti manhaj yang sama dengan al-Ṭabarī dan menyatakan bahwa pendapat yang dipegang oleh jumhur ulama adalah fī sabīlillāh berarti para pejuang di jalan Allah (al-ghuzāh fī sabīlillāh). Ia mendasarkan penafsirannya pada sejumlah riwayat:", "Hadis marfūʿ melalui jalur Abū Hurayrah, bahwa Rasulullah ﷺ bersabda:", "“Tidak halal zakat bagi orang kaya kecuali lima: orang yang berperang di jalan Allah, amil zakat, orang yang berutang, orang yang membeli zakat dengan hartanya, dan tetangga miskin yang diberi zakat lalu menghadiahkannya kepadamu.”", "Ibn Kathīr menyebut hadis ini diriwayatkan oleh Aḥmad dan Abū Dāwūd dengan sanad yang kuat, dan ia memakainya sebagai dalil pokok bahwa fī sabīlillāh adalah pejuang.", "[Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 132]", "Athar dari Mujāhid, ʿAṭāʾ, dan al-Shaʿbī (tabiin) yang semuanya menyatakan:", "“Mereka adalah para pejuang.”", "[Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 133]", "Pendapat Ibnu ʿUmar (sahabat) yang diriwayatkan oleh Ibn Abī Ḥātim, bahwa fī sabīlillāh mencakup orang yang melaksanakan ibadah haji. Namun Ibn Kathīr, seperti al-Ṭabarī, melemahkan pendapat ini dan mengembalikannya pada makna jihad.", "[Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 133]", "Kesimpulan Ibn Kathīr: Fī sabīlillāh adalah para mujahid yang tidak memperoleh gaji tetap dari negara. Zakat diberikan untuk menopang keperluan jihad mereka, meliputi bekal, persenjataan, dan tunggangan. Ia menegaskan bahwa jihad adalah puncak realisasi sabīl Allāh.", "Al-Qurṭubī dalam al-Jāmiʿ li-Aḥkām al-Qurʾān", "Al-Qurṭubī menyajikan pembahasan yang lebih luas tentang perbedaan pendapat di kalangan ulama salaf, seraya tetap menonjolkan pendapat jumhur. Ia menulis:", "Pendapat Mayoritas (Jumhur):", "Fī sabīlillāh adalah para pejuang jihad. Mereka berhak menerima zakat untuk membiayai keperluan perang, termasuk membeli senjata dan kendaraan, meskipun mereka kaya di negerinya.", "[al-Jāmiʿ li-Aḥkām al-Qurʾān, jilid 8, hlm. 184-185]", "Athar Sahabat dan Tabiin yang Dikutip:", "Ibnu ʿUmar (sahabat): “Fī sabīlillāh adalah para pejuang di jalan Allah.” (Riwayat ini menjadi landasan jumhur).", "ʿAṭāʾ dan al-Ḥasan: “Mereka adalah para pejuang.”", "[al-Jāmiʿ, jilid 8, hlm. 185]", "Pendapat Lain yang Dicatat:", "Al-Qurṭubī menukil dari Ibnu ʿUmar (dalam satu riwayat) dan Ibn ʿAbbās bahwa fī sabīlillāh juga mencakup orang yang hendak melaksanakan ibadah haji. Bahkan ia mengutip pendapat Mālik bin Anas yang memperluas maknanya menjadi “semua jalan kebaikan dan ketaatan” (subul al-khayr), seperti menunaikan haji, membangun jembatan, dan memakmurkan masjid.", "[al-Jāmiʿ, jilid 8, hlm. 185-186]", "Tarjih al-Qurṭubī:", "Meskipun menyebutkan keluasan pendapat Mālik, al-Qurṭubī menegaskan bahwa konteks ayat dan pengamalan mayoritas sahabat menunjukkan bahwa makna yang paling kuat (arjaḥ) adalah jihad. Ia beralasan bahwa sabīl Allāh secara mutlak dalam Al-Qurʾān dan hadis seringkali merujuk pada jihad. Perluasan makna hanya berlaku jika jihad sebagai makna hakiki sudah terpenuhi, atau dalam kerangka qiyās yang dibolehkan sebagian ulama.", "[al-Jāmiʿ, jilid 8, hlm. 187]", "Kesimpulan al-Qurṭubī: Makna asasi fī sabīlillāh adalah jihad dan para mujahid. Namun, ia mencatat adanya pendapat yang memperluas cakupannya pada seluruh bentuk ketaatan publik, meskipun ia tetap berpijak pada pendapat jumhur.", "Perbandingan Ketiga Tafsir", "Persamaan:", "Inti Makna: Ketiganya sepakat bahwa makna primer dan yang paling sahih dari fī sabīlillāh dalam ayat ini adalah para pejuang (mujahid) yang berperang di jalan Allah.", "Sumber Penafsiran: Seluruhnya menggunakan metode tafsir bi al-maʾthūr, dengan mendasarkan diri pada hadis dan athar sahabat/tabiin, terutama riwayat Mujāhid, Qatādah, dan Ibnu ʿAbbās.", "Kritik terhadap Perluasan: Al-Ṭabarī dan Ibn Kathīr secara tegas menolak penafsiran yang mencakup haji atau ketaatan lain sebagai makna langsung. Al-Qurṭubī mencatatnya, tetapi tetap mengunggulkan pendapat jihad.", "Penerima Zakat: Golongan ini berhak menerima zakat walau berkecukupan, karena pemberian itu untuk menopang kepentingan jihad, bukan untuk menutup kebutuhan pribadi.", "Perbedaan:", "Cakupan Diskusi: Al-Qurṭubī lebih panjang-lebar membahas pendapat alternatif (khususnya dari mazhab Māliki) yang memperluas makna fī sabīlillāh ke seluruh bentuk amal kebaikan. Al-Ṭabarī dan Ibn Kathīr lebih ringkas dan langsung menetapkan makna jihad tanpa memberi banyak ruang pada pendapat lain.", "Sikap terhadap Perluasan Makna: Al-Ṭabarī secara metodologis menganggap riwayat perluasan sebagai lemah sanad dan bertentangan dengan kesepakatan sahabat. Ibn Kathīr mengikutinya dan menolak keabsahan takwil yang meluas. Al-Qurṭubī, meski menguatkan pendapat jumhur, masih mengakomodasi pendapat Mālik dan Ibnu ʿUmar sebagai wacana fikih yang hidup di kalangan tabiin dan salaf, sehingga pendekatannya lebih komparatif."], "claimed_refs": ["Al-Ṭabarī, Abū Jaʿfar Muḥammad ibn Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Jilid 14. Kairo: Dār Hajr, 2001. Hlm. 316–318.", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl. Tafsīr al-Qurʾān al-ʿAẓīm. Jilid 4. Riyāḍ: Dār al-Salām, 2003. Hlm. 131–134.", "Al-Qurṭubī, Abū ʿAbdillāh Muḥammad ibn Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān. Jilid 8. Kairo: Dār al-Kutub al-Miṣriyyah, 1964. Hlm. 184–189."]}, {"run_id": "DEEPSEEK-CoT-3", "model_id": "deepseek", "model": "DeepSeek", "family": "DeepSeek", "version": 3, "source_file": "DeepSeek V3.docx", "word_count": 858, "paragraphs": ["Berikut uraian langkah demi langkah penafsiran frasa fī sabīlillāh dalam QS al-Tawbah [9]: 60 berdasarkan metode tafsīr bi al-maʾthūr melalui tiga kitab tafsir utama.", "Konteks Ayat dan Kedudukan Fī Sabīlillāh", "QS al-Tawbah [9]: 60 mengatur alokasi dana zakat (ṣadaqāt) secara eksklusif kepada delapan golongan (aṣnāf). Ayat ini turun sebagai ketetapan langsung dari Allah untuk menghilangkan perselisihan dan mengokohkan otoritas distribusi negara Islam yang baru tumbuh. Frasa fī sabīlillāh menempati posisi ketujuh dalam daftar penerima, sebelum ibn al-sabīl. Secara linguistik, frasa ini bermakna “di jalan Allah,” tetapi dalam konteks distribusi zakat, makna operasionalnya menjadi perdebatan klasik: apakah ia terbatas pada jihad fisik atau mencakup seluruh jalan kebaikan?", "Penafsiran Berdasarkan Tiga Mufasir", "a. Al-Ṭabarī (w. 310 H) dalam Jāmiʿ al-Bayān", "Al-Ṭabarī memulai penafsirannya dengan menghimpun berbagai riwayat (athar) dari kalangan sahabat dan tabi’in secara lengkap beserta sanadnya.", "Riwayat yang dikutip:", "Dari Qatādah (tabi’in): “Fī sabīlillāh artinya para pejuang (ghuzzāt) yang berperang di jalan Allah.” (Jāmiʿ al-Bayān, 10:112).", "Dari Mujāhid (tabi’in): Ia menafsirkannya sebagai para prajurit yang tidak mendapatkan bagian tetap dari dīwān (daftar gaji resmi negara) serta para sukarelawan yang membutuhkan bekal dan kendaraan.", "Dari al-Ḍaḥḥāk (tabi’in): Para prajurin penjaga perbatasan (al-murābiṭūn).", "Al-Ṭabarī juga merekam pendapat alternatif yang meriwayatkan bahwa fī sabīlillāh mencakup seluruh jalan kebaikan, termasuk haji, berdasarkan riwayat dari sebagian ulama salaf.", "Kesimpulan al-Ṭabarī: Setelah memaparkan seluruh riwayat, ia melakukan tarjīḥ (pengunggulan) dan menegaskan bahwa pendapat yang paling benar (awlā al-aqwāl bi-al-ṣawāb) adalah para pejuang (ghuzzāt) yang tidak memiliki hak tetap dalam dīwān. Ia mendasarkan ini pada keumuman makna “jalan Allah” yang dalam konteks pensyariatan zakat secara khusus dimaknai sebagai jihad. Al-Ṭabarī secara eksplisit menyatakan, “wa hum al-ghuzāt alladhīna lā ḥaqqa lahum fī al-dīwān” (mereka adalah para pejuang yang tidak memiliki hak di dalam register gaji negara) sebagai definisi operasionalnya (Jāmiʿ al-Bayān, 10:113-115).", "b. Ibn Kathīr (w. 774 H) dalam Tafsīr al-Qurʾān al-ʿAẓīm", "Ibn Kathīr menyajikan penafsiran yang lebih ringkas dan bertumpu pada hadis marfū‘.", "Riwayat yang dikutip:", "Ia mengutip hadis Abū Saʿīd al-Khudrī secara marfū‘: “Sedekah (zakat) tidak halal bagi orang kaya, kecuali untuk lima golongan: orang yang berperang di jalan Allah (ghāzin fī sabīlillāh), amil zakat, orang yang terlilit utang, orang yang membelinya dengan hartanya, atau orang miskin yang diberi zakat lalu menghadiahkannya kepada orang kaya.” (HR. Aḥmad, Abū Dāwūd, dan Ibn Mājah).", "Berdasarkan hadis ini, Ibn Kathīr menegaskan bahwa fī sabīlillāh adalah golongan pejuang yang tidak mendapatkan tunjangan dari baitul mal, karena jika mereka sudah digaji, mereka termasuk al-ʿāmilīna ʿalayhā (amil zakat) atau penerima gaji tetap sehingga tidak lagi miskin dalam konteks ini.", "Kesimpulan Ibn Kathīr: Makna fī sabīlillāh adalah para pejuang (al-ghuzāt) yang tidak memiliki hak dalam dīwān. Ia tidak memperluas cakupan maknanya pada haji atau kebajikan umum dalam bab zakat, dan konsisten mengaitkannya dengan jihad fisik berdasarkan dalil hadis yang sahih (Tafsīr al-Qurʾān al-ʿAẓīm, 4:151).", "c. Al-Qurṭubī (w. 671 H) dalam al-Jāmiʿ li-Aḥkām al-Qurʾān", "Sebagai tafsir hukum, al-Qurṭubī menyajikan diskusi fikih yang lebih luas, mengkompilasi pendapat para imam mazhab.", "Riwayat yang dikutip:", "Ia meriwayatkan dari Mujāhid, Qatādah, al-Ḍaḥḥāk, dan Ibn Zayd bahwa maknanya adalah para pejuang (al-ghuzāt).", "Mengutip athar sahabat: ‘Umar ibn al-Khaṭṭāb dan ‘Alī ibn Abī Ṭālib memberikan zakat kepada para prajurit yang kekurangan bekal untuk berperang. Juga dari Ibn ‘Abbās yang membolehkan pemberian zakat untuk pejuang meskipun ia kaya di negerinya.", "Hadis Abū Saʿīd al-Khudrī tentang lima golongan penerima zakat juga menjadi sandaran.", "Ia juga mencatat pendapat minoritas dari Sufyān al-Thawrī dan Muḥammad ibn al-Ḥasan (murid Abū Ḥanīfah) yang memasukkan ibadah haji ke dalam cakupan fī sabīlillāh, serta riwayat dari Imam Mālik yang menyebut semua jalan kebaikan (subul al-khayr) sebagai makna bahasa, meskipun untuk zakat maknanya adalah jihad.", "Kesimpulan al-Qurṭubī: Setelah mengupas khilaf, al-Qurṭubī mengukuhkan pendapat jumhur bahwa makna yang sahih (al-ṣaḥīḥ) untuk fī sabīlillāh dalam ayat zakat adalah para pejuang (al-ghuzāt). Mereka adalah para penjaga perbatasan (al-murābiṭūn) dan pasukan perang, yang kebutuhan logistik dan persenjataannya ditanggung dari dana zakat. Ia menolak pemaknaan haji atau kebaikan personal karena zakat bertujuan untuk kemaslahatan kolektif umat (maṣāliḥ al-Islām wa-al-muslimīn), sedangkan haji adalah ibadah individu (al-Jāmiʿ li-Aḥkām al-Qurʾān, 8:180-182).", "Perbandingan Ketiga Tafsir", "Aspek", "Al-Ṭabarī", "Ibn Kathīr", "Al-Qurṭubī", "Kesimpulan Perbandingan", "Definisi Inti", "Pejuang (ghuzāt) tanpa hak dīwān", "Pejuang (ghuzāt) tanpa hak dīwān", "Pejuang (ghuzāt) dan penjaga perbatasan (murābiṭūn)", "Sepakat bahwa makna utama adalah para pejuang jihad fisik.", "Sumber Dalil", "Athar tabi’in dan analisis bahasa", "Hadis marfū‘ (Abū Saʿīd)", "Kombinasi athar sahabat, tabi’in, dan pendapat mazhab", "Sepakat bersandar pada riwayat salaf. Hadis Abū Saʿīd menjadi dalil kunci.", "Cakupan Makna", "Khusus jihad, menolak perluasan", "Khusus jihad, tidak membahas perluasan", "Menyebut pendapat haji dan kebaikan, tetapi menolaknya secara hukum", "Sepakat menolak pemaknaan umum “semua kebaikan” untuk bab zakat.", "Penekanan Khas", "Metode tarjīḥ atas riwayat yang beragam", "Fokus pada validitas hadis dan makna tekstual", "Perbedaan pendapat fikih antar mazhab dan implikasi hukumnya", "4. Rujukan Kitab", "Al-Ṭabarī, Abū Jaʿfar Muḥammad ibn Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl āy al-Qurʾān. Ed. Maḥmūd Muḥammad Shākir. Kairo: Maktabah Ibn Taymiyyah, t.th. Jilid 10, hlm. 112–115.", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl ibn ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Ed. Sāmī ibn Muḥammad Salāmah. Riyadh: Dār Ṭayyibah, 1999. Jilid 4, hlm. 151.", "Al-Qurṭubī, Abū ʿAbd Allāh Muḥammad ibn Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān wa-al-Mubayyin li-mā Taḍammanahu min al-Sunnah wa-Āy al-Furqān. Kairo: Dār al-Kutub al-Miṣriyyah, 1964. Jilid 8, hlm. 180–182."], "claimed_refs": ["Al-Qurṭubī, Abū ʿAbd Allāh Muḥammad ibn Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān wa-al-Mubayyin li-mā Taḍammanahu min al-Sunnah wa-Āy al-Furqān. Jilid 8. Kairo: Dār al-Kutub al-Miṣriyyah, 1964.", "Al-Ṭabarī, Abū Jaʿfar Muḥammad ibn Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl āy al-Qurʾān. Jilid 10. Ed. Maḥmūd Muḥammad Shākir. Kairo: Maktabah Ibn Taymiyyah, t.th.", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl ibn ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Jilid 4. Ed. Sāmī ibn Muḥammad Salāmah. Riyadh: Dār Ṭayyibah, 1999."]}, {"run_id": "DEEPSEEK-CoT-4", "model_id": "deepseek", "model": "DeepSeek", "family": "DeepSeek", "version": 4, "source_file": "DeepSeek V4.docx", "word_count": 3203, "paragraphs": ["Konteks Ayat dan Kedudukan Fī Sabīlillāh", "Ayat QS al-Tawbah [9]: 60 merupakan satu-satunya ayat dalam Al-Qur’an yang secara eksplisit merinci golongan-golongan penerima zakat (mustaḥiqqūn). Allah ﷻ berfirman:", "\"Sesungguhnya zakat-zakat itu, hanyalah untuk orang-orang fakir, orang-orang miskin, para pengurus zakat (ʿāmilīn), para muallaf yang dipersatukan hatinya, untuk (memerdekakan) budak (riqāb), orang-orang yang terlilit utang (ghārimīn), (orang-orang yang berjuang) di jalan Allah (fī sabīlillāh), dan orang-orang yang sedang dalam perjalanan (ibn al-sabīl) sebagai suatu ketetapan yang diwajibkan Allah. Dan Allah Maha Mengetahui lagi Maha Bijaksana.\" (QS al-Tawbah [9]: 60)", "Ayat ini, menurut riwayat yang dikutip al-Ṭabarī dari al-Suddī dan Ibn Zayd, turun untuk mencegah orang-orang munafik yang mencela Nabi ﷺ dalam pembagian sedekah, dengan menegaskan bahwa kewenangan pembagian zakat sepenuhnya milik Allah, bukan manusia (al-Ṭabarī, Jāmiʿ al-Bayān, ed. Muḥammad Shākir, jilid 14, hlm. 303–305). Al-Qurṭubī menegaskan bahwa ayat ini menutup pintu ijtihad dalam penentuan golongan penerima zakat—hanya delapan golongan ini yang berhak, dan lam dalam ayat ini berfungsi sebagai lām al-tamlīk (kepemilikan) (al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, ed. al-Bardūnī, jilid 8, hlm. 169).", "Fī sabīlillāh adalah golongan ketujuh dari delapan aṣnāf. Secara harfiah, frasa ini berarti \"di jalan Allah\"—sebuah ungkapan luas yang dalam Al-Qur’an sering merujuk pada jihad dan pengorbanan harta untuk menegakkan agama. Ayat ini menjadi dasar teologis dan hukum bagi alokasi dana zakat untuk jihad, namun cakupannya menjadi medan perbedaan pendapat di kalangan mufasir bi al-maʾthūr: apakah ia terbatas pada para pejuang (ghuzāt), atau mencakup seluruh bentuk ketaatan dan kemaslahatan umum?", "Tafsir Masing-Masing Mufasir", "A. Al-Ṭabarī (w. 310 H) – Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān", "Al-Ṭabarī memulai penafsirannya dengan metode khasnya: memaparkan keragaman riwayat, lalu mentarjih pendapat terkuat. Ia menulis:", "\"Adapun firman-Nya: wa fī sabīlillāh, maka sesungguhnya para ahli takwil berbeda pendapat tentang maknanya. Sebagian berkata: Mereka adalah para pejuang (ghuzāt) di jalan Allah.\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 314)", "Ia mengutip sejumlah athar yang membatasi maknanya pada ghuzāt (para pejuang):", "Dari Qatādah (tabiin, w. 117 H): \"Fī sabīlillāh adalah para pejuang (al-ghuzāt).\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 314, no. riwayat 16840)", "Dari Mujāhid (tabiin, w. 104 H): \"Fī sabīlillāh: yaitu para pejuang dan orang-orang yang berjaga di perbatasan (al-murābiṭūn).\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 315, no. riwayat 16842)", "Dari al-Ḍaḥḥāk (tabiin, w. 105 H): \"Mereka adalah para pejuang di jalan Allah (ghuzāt fī sabīlillāh).\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 315, no. riwayat 16843)", "Al-Ṭabarī juga mencatat riwayat yang memperluas makna fī sabīlillāh:", "Dari Ibn ʿUmar (sahabat, w. 73 H): “Haji termasuk fī sabīlillāh.” (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 315, no. riwayat 16846)", "Dari Ibn ʿAbbās (sahabat, w. 68 H): Mengizinkan zakat untuk membebaskan budak dan untuk haji. (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 318–320)", "Setelah memaparkan seluruh riwayat, al-Ṭabarī mentarjih pendapat yang membatasi pada ghuzāt:", "\"Pendapat yang paling benar dalam hal itu menurut kami adalah pendapat yang mengatakan: fī sabīlillāh adalah para pejuang yang tidak memiliki hak tetap dalam dīwān (daftar penerima tunjangan resmi dari baitul mal).\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 321)", "Kesimpulannya: Fī sabīlillāh adalah para pejuang sukarelawan (mutaṭawwiʿah) yang tidak terdaftar sebagai penerima gaji tetap negara. Mereka berhak mendapat zakat untuk bekal, senjata, dan kebutuhan jihad, bahkan jika mereka orang kaya di negeri asalnya. Adapun perluasan makna ke haji atau kebaikan umum, menurut al-Ṭabarī, bertentangan dengan makna dominan dalam bahasa Arab dan konteks syariat yang membatasi delapan golongan ini secara spesifik.", "B. Ibn Kathīr (w. 774 H) – Tafsīr al-Qurʾān al-ʿAẓīm", "Ibn Kathīr, yang metodologinya sangat dipengaruhi al-Ṭabarī namun dengan pendekatan lebih ringkas, menyatakan:", "\"Adapun fī sabīlillāh, maka mereka adalah para pejuang (al-ghuzāt) yang tidak memiliki hak dalam dīwān (tunjangan tetap).\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, ed. Sāmī al-Salāmah, jilid 4, hlm. 169)", "Ia mengutip riwayat-riwayat yang mendukung batasan ini:", "Dari Mujāhid: \"Fī sabīlillāh: para pejuang dan orang-orang yang berjaga di perbatasan (al-murābiṭūn).\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 169)", "Dari al-Ḍaḥḥāk: \"Para pejuang di jalan Allah.\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 169)", "Dari al-Awzāʿī (tabi‘ al-tabi‘in, w. 157 H): Menyatakan bahwa fī sabīlillāh adalah para pejuang. (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 169)", "Ibn Kathīr kemudian mencatat adanya perluasan makna:", "\"Diriwayatkan dari Imam Aḥmad, ia berkata: 'Haji termasuk fī sabīlillāh,' yaitu dalam konteks zakat, berdasarkan hadis yang diriwayatkan dari Ibn ʿAbbās.\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 170)", "Riwayat Ibn ʿAbbās yang dimaksud adalah bahwa ia mengizinkan seseorang mengeluarkan zakat untuk membiayai haji orang lain, dan menganggap haji sebagai bagian dari fī sabīlillāh. Ibn Kathīr menyebutkan:", "\"Ibn ʿAbbās berkata: 'Tidak mengapa engkau memberikan zakatmu untuk (membiayai) haji.'\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 170)", "Namun, Ibn Kathīr tidak secara eksplisit mentarjih pendapat ini sebagai pendapat utama. Ia lebih cenderung mengikuti jumhur yang membatasi pada ghuzāt:", "\"Pendapat yang masyhur dari jumhur ulama adalah bahwa fī sabīlillāh adalah para pejuang.\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 169)", "Kesimpulannya: Ibn Kathīr mengafirmasi pendapat jumhur bahwa fī sabīlillāh adalah para pejuang yang tidak mendapat tunjangan tetap dari baitul mal. Ia mencatat pengecualian dari Imam Aḥmad dan Ibn ʿAbbās tentang haji, tetapi tidak menjadikannya sebagai pendapat yang dominan. Dengan demikian, ia selaras dengan al-Ṭabarī dalam tarjih, namun memberi ruang lebih eksplisit bagi perluasan yang diriwayatkan dari salaf.", "C. Al-Qurṭubī (w. 671 H) – al-Jāmiʿ li-Aḥkām al-Qurʾān", "Sebagai mufasir hukum, al-Qurṭubī memberikan pembahasan paling ekstensif dan mencakup dimensi fikih yang detail. Ia membuka dengan pernyataan:", "\"Adapun sabīl Allāh, maka para ulama berbeda pendapat tentangnya. Jumhur (mayoritas) ulama berpendapat bahwa mereka adalah para pejuang (al-ghuzāt).\" (al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jilid 8, hlm. 180)", "Ia mengutip riwayat-riwayat yang mendukung pendapat jumhur:", "Dari Qatādah: \"Fī sabīlillāh: al-ghuzāt.\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 180)", "Dari Mujāhid: \"Mereka adalah para pejuang dan orang-orang yang berjaga di perbatasan (al-murābiṭūn).\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 180)", "Dari al-Ḍaḥḥāk: \"Mereka adalah para pejuang di jalan Allah.\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 180)", "Al-Qurṭubī kemudian merinci pendapat-pendapat yang memperluas cakupan fī sabīlillāh:", "Pendapat Ibn ʿUmar dan Ibn ʿAbbās: Memasukkan haji sebagai fī sabīlillāh. Al-Qurṭubī mengutip:", "\"Diriwayatkan dari Ibn ʿUmar dan Ibn ʿAbbās bahwa keduanya berkata: 'Haji termasuk fī sabīlillāh.'\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 181)", "Pendapat Aḥmad bin Ḥanbal: Membolehkan zakat untuk haji, dan ini juga pendapat Isḥāq bin Rāhawayh. (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 181)", "Pendapat yang memperluas ke seluruh jalan kebaikan (wujūh al-birr): Sebagian ulama, seperti al-Qāsim dan al-Kisāʾī, berpendapat bahwa fī sabīlillāh mencakup semua jalan kebaikan—mulai dari membangun masjid, jembatan, mengurus jenazah, hingga menyediakan air minum. Al-Qurṭubī menolak perluasan ini dengan tegas:", "\"Ini adalah pendapat yang lemah (daʿīf). Seandainya semua jalan kebaikan termasuk fī sabīlillāh, niscaya penyebutan tujuh golongan lainnya menjadi sia-sia, karena fī sabīlillāh akan mencakup semuanya. Pembatasan oleh Allah atas delapan golongan menunjukkan bahwa masing-masing memiliki spesifikasi tersendiri.\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 182)", "Al-Qurṭubī juga membahas secara detail syarat-syarat penerima zakat dari golongan fī sabīlillāh:", "Mereka adalah para pejuang sukarelawan (mutaṭawwiʿah), bukan tentara reguler yang sudah mendapat gaji dari baitul mal.", "Zakat dapat diberikan untuk membeli senjata, kuda, dan bekal jihad.", "Seorang pejuang tetap berhak menerima zakat meskipun ia kaya di negerinya, karena kebutuhan jihad bersifat mendesak dan terpisah dari kekayaan pribadi. (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 183–184)", "Kesimpulannya: Al-Qurṭubī secara tegas memilih pendapat jumhur yang membatasi fī sabīlillāh pada ghuzāt (para pejuang sukarelawan). Ia membantah perluasan makna ke seluruh jalan kebaikan dengan argumen linguistik dan kontekstual yang kuat. Meskipun ia mencatat pendapat Ibn ʿUmar dan Ibn ʿAbbās tentang haji, ia tidak menjadikannya sebagai pendapat yang dominan dalam mazhab hukum yang ia bela.", "Perbandingan Ketiga Tafsir", "Titik Kesepakatan (Ittifāq)", "Makna dasar fī sabīlillāh adalah para pejuang (ghuzāt). Ketiga mufasir sepakat bahwa makna paling otentik berdasarkan riwayat salaf adalah para pejuang di jalan Allah. Mereka semua mengutip riwayat dari Qatādah, Mujāhid, dan al-Ḍaḥḥāk yang secara eksplisit menafsirkan demikian.", "Penerima adalah pejuang sukarelawan. Ketiganya membedakan antara tentara reguler yang telah terdaftar dalam dīwān (daftar penerima gaji tetap negara) dengan pejuang sukarelawan (mutaṭawwiʿah). Hanya kelompok kedua yang berhak menerima zakat. Al-Ṭabarī dan al-Qurṭubī secara eksplisit menekankan syarat ini; Ibn Kathīr mengutipnya tanpa perbedaan.", "Kekayaan tidak menghalangi. Seorang pejuang sukarelawan tetap berhak menerima zakat meskipun ia kaya di negeri asalnya, karena zakat di sini bukan untuk menutupi kemiskinan, melainkan untuk memenuhi kebutuhan jihad yang mendesak. Ini ditegaskan oleh al-Ṭabarī dan al-Qurṭubī, dan diisyaratkan oleh Ibn Kathīr.", "Titik Perbedaan (Ikhtilāf)", "Cakupan perluasan makna.", "Al-Ṭabarī mencatat perluasan ke haji, tetapi secara eksplisit mentarjih pendapat yang membatasi pada ghuzāt. Ia menolak perluasan lebih lanjut ke seluruh kebaikan dengan argumen bahwa penyebutan delapan golongan secara spesifik tidak akan bermakna jika fī sabīlillāh mencakup semuanya.", "Ibn Kathīr lebih terbuka terhadap perluasan. Ia mengutip pendapat Imam Aḥmad dan Ibn ʿAbbās tentang haji sebagai bagian dari fī sabīlillāh tanpa menolaknya secara tegas, meskipun ia tetap menyatakan bahwa pendapat masyhur adalah pembatasan pada ghuzāt.", "Al-Qurṭubī memberikan analisis paling komprehensif. Ia mencatat pendapat yang memperluas ke haji dan bahkan ke semua jalan kebaikan, tetapi secara eksplisit dan tegas menolak perluasan ke seluruh kebaikan dengan argumen linguistik dan logis yang kuat. Ia menyebut perluasan tersebut sebagai pendapat yang lemah.", "Metode penyajian dan penekanan.", "Al-Ṭabarī menggunakan metode tafsīr bi al-maʾthūr dengan pendekatan ikhbārī (melaporkan riwayat secara lengkap), lalu mentarjih di akhir. Tekanannya pada penyajian seluruh spektrum riwayat dan kritik sanad.", "Ibn Kathīr lebih ringkas dan selektif dalam mengutip riwayat. Tekanannya pada mengonfirmasi pendapat jumhur dan menghubungkannya dengan amaliah salaf.", "Al-Qurṭubī berfokus pada implikasi hukum fikih. Selain riwayat, ia juga membahas syarat-syarat penerima, mekanisme penyaluran, dan implikasi perbedaan pendapat terhadap praktik zakat. Tekanannya sangat fiqh-oriented.", "Argumentasi penolakan perluasan.", "Al-Ṭabarī dan al-Qurṭubī menggunakan argumen yang sama secara substantif: spesifikasi delapan golongan oleh Allah tidak akan bermakna jika fī sabīlillāh ditafsirkan secara terlalu luas. Namun, al-Qurṭubī mengembangkannya lebih jauh dengan analisis kebahasaan dan konteks syariat. Ibn Kathīr tidak mengembangkan argumen ini secara eksplisit.", "1. Konteks Ayat dan Kedudukan Fī Sabīlillāh", "Ayat QS al-Tawbah [9]: 60 merupakan satu-satunya ayat dalam Al-Qur’an yang secara eksplisit merinci golongan-golongan penerima zakat (mustaḥiqqūn). Allah ﷻ berfirman:", "\"Sesungguhnya zakat-zakat itu, hanyalah untuk orang-orang fakir, orang-orang miskin, para pengurus zakat (ʿāmilīn), para muallaf yang dipersatukan hatinya, untuk (memerdekakan) budak (riqāb), orang-orang yang terlilit utang (ghārimīn), (orang-orang yang berjuang) di jalan Allah (fī sabīlillāh), dan orang-orang yang sedang dalam perjalanan (ibn al-sabīl) sebagai suatu ketetapan yang diwajibkan Allah. Dan Allah Maha Mengetahui lagi Maha Bijaksana.\" (QS al-Tawbah [9]: 60)", "Ayat ini, menurut riwayat yang dikutip al-Ṭabarī dari al-Suddī dan Ibn Zayd, turun untuk mencegah orang-orang munafik yang mencela Nabi ﷺ dalam pembagian sedekah, dengan menegaskan bahwa kewenangan pembagian zakat sepenuhnya milik Allah, bukan manusia (al-Ṭabarī, Jāmiʿ al-Bayān, ed. Muḥammad Shākir, jilid 14, hlm. 303–305). Al-Qurṭubī menegaskan bahwa ayat ini menutup pintu ijtihad dalam penentuan golongan penerima zakat—hanya delapan golongan ini yang berhak, dan lam dalam ayat ini berfungsi sebagai lām al-tamlīk (kepemilikan) (al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, ed. al-Bardūnī, jilid 8, hlm. 169).", "Fī sabīlillāh adalah golongan ketujuh dari delapan aṣnāf. Secara harfiah, frasa ini berarti \"di jalan Allah\"—sebuah ungkapan luas yang dalam Al-Qur’an sering merujuk pada jihad dan pengorbanan harta untuk menegakkan agama. Ayat ini menjadi dasar teologis dan hukum bagi alokasi dana zakat untuk jihad, namun cakupannya menjadi medan perbedaan pendapat di kalangan mufasir bi al-maʾthūr: apakah ia terbatas pada para pejuang (ghuzāt), atau mencakup seluruh bentuk ketaatan dan kemaslahatan umum?", "2. Tafsir Masing-Masing Mufasir", "A. Al-Ṭabarī (w. 310 H) – Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān", "Al-Ṭabarī memulai penafsirannya dengan metode khasnya: memaparkan keragaman riwayat, lalu mentarjih pendapat terkuat. Ia menulis:", "\"Adapun firman-Nya: wa fī sabīlillāh, maka sesungguhnya para ahli takwil berbeda pendapat tentang maknanya. Sebagian berkata: Mereka adalah para pejuang (ghuzāt) di jalan Allah.\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 314)", "Ia mengutip sejumlah athar yang membatasi maknanya pada ghuzāt (para pejuang):", "Dari Qatādah (tabiin, w. 117 H): \"Fī sabīlillāh adalah para pejuang (al-ghuzāt).\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 314, no. riwayat 16840)", "Dari Mujāhid (tabiin, w. 104 H): \"Fī sabīlillāh: yaitu para pejuang dan orang-orang yang berjaga di perbatasan (al-murābiṭūn).\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 315, no. riwayat 16842)", "Dari al-Ḍaḥḥāk (tabiin, w. 105 H): \"Mereka adalah para pejuang di jalan Allah (ghuzāt fī sabīlillāh).\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 315, no. riwayat 16843)", "Al-Ṭabarī juga mencatat riwayat yang memperluas makna fī sabīlillāh:", "Dari Ibn ʿUmar (sahabat, w. 73 H): “Haji termasuk fī sabīlillāh.” (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 315, no. riwayat 16846)", "Dari Ibn ʿAbbās (sahabat, w. 68 H): Mengizinkan zakat untuk membebaskan budak dan untuk haji. (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 318–320)", "Setelah memaparkan seluruh riwayat, al-Ṭabarī mentarjih pendapat yang membatasi pada ghuzāt:", "\"Pendapat yang paling benar dalam hal itu menurut kami adalah pendapat yang mengatakan: fī sabīlillāh adalah para pejuang yang tidak memiliki hak tetap dalam dīwān (daftar penerima tunjangan resmi dari baitul mal).\" (al-Ṭabarī, Jāmiʿ al-Bayān, jilid 14, hlm. 321)", "Kesimpulannya: Fī sabīlillāh adalah para pejuang sukarelawan (mutaṭawwiʿah) yang tidak terdaftar sebagai penerima gaji tetap negara. Mereka berhak mendapat zakat untuk bekal, senjata, dan kebutuhan jihad, bahkan jika mereka orang kaya di negeri asalnya. Adapun perluasan makna ke haji atau kebaikan umum, menurut al-Ṭabarī, bertentangan dengan makna dominan dalam bahasa Arab dan konteks syariat yang membatasi delapan golongan ini secara spesifik.", "B. Ibn Kathīr (w. 774 H) – Tafsīr al-Qurʾān al-ʿAẓīm", "Ibn Kathīr, yang metodologinya sangat dipengaruhi al-Ṭabarī namun dengan pendekatan lebih ringkas, menyatakan:", "\"Adapun fī sabīlillāh, maka mereka adalah para pejuang (al-ghuzāt) yang tidak memiliki hak dalam dīwān (tunjangan tetap).\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, ed. Sāmī al-Salāmah, jilid 4, hlm. 169)", "Ia mengutip riwayat-riwayat yang mendukung batasan ini:", "Dari Mujāhid: \"Fī sabīlillāh: para pejuang dan orang-orang yang berjaga di perbatasan (al-murābiṭūn).\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 169)", "Dari al-Ḍaḥḥāk: \"Para pejuang di jalan Allah.\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 169)", "Dari al-Awzāʿī (tabi‘ al-tabi‘in, w. 157 H): Menyatakan bahwa fī sabīlillāh adalah para pejuang. (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 169)", "Ibn Kathīr kemudian mencatat adanya perluasan makna:", "\"Diriwayatkan dari Imam Aḥmad, ia berkata: 'Haji termasuk fī sabīlillāh,' yaitu dalam konteks zakat, berdasarkan hadis yang diriwayatkan dari Ibn ʿAbbās.\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 170)", "Riwayat Ibn ʿAbbās yang dimaksud adalah bahwa ia mengizinkan seseorang mengeluarkan zakat untuk membiayai haji orang lain, dan menganggap haji sebagai bagian dari fī sabīlillāh. Ibn Kathīr menyebutkan:", "\"Ibn ʿAbbās berkata: 'Tidak mengapa engkau memberikan zakatmu untuk (membiayai) haji.'\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 170)", "Namun, Ibn Kathīr tidak secara eksplisit mentarjih pendapat ini sebagai pendapat utama. Ia lebih cenderung mengikuti jumhur yang membatasi pada ghuzāt:", "\"Pendapat yang masyhur dari jumhur ulama adalah bahwa fī sabīlillāh adalah para pejuang.\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4, hlm. 169)", "Kesimpulannya: Ibn Kathīr mengafirmasi pendapat jumhur bahwa fī sabīlillāh adalah para pejuang yang tidak mendapat tunjangan tetap dari baitul mal. Ia mencatat pengecualian dari Imam Aḥmad dan Ibn ʿAbbās tentang haji, tetapi tidak menjadikannya sebagai pendapat yang dominan. Dengan demikian, ia selaras dengan al-Ṭabarī dalam tarjih, namun memberi ruang lebih eksplisit bagi perluasan yang diriwayatkan dari salaf.", "C. Al-Qurṭubī (w. 671 H) – al-Jāmiʿ li-Aḥkām al-Qurʾān", "Sebagai mufasir hukum, al-Qurṭubī memberikan pembahasan paling ekstensif dan mencakup dimensi fikih yang detail. Ia membuka dengan pernyataan:", "\"Adapun sabīl Allāh, maka para ulama berbeda pendapat tentangnya. Jumhur (mayoritas) ulama berpendapat bahwa mereka adalah para pejuang (al-ghuzāt).\" (al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jilid 8, hlm. 180)", "Ia mengutip riwayat-riwayat yang mendukung pendapat jumhur:", "Dari Qatādah: \"Fī sabīlillāh: al-ghuzāt.\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 180)", "Dari Mujāhid: \"Mereka adalah para pejuang dan orang-orang yang berjaga di perbatasan (al-murābiṭūn).\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 180)", "Dari al-Ḍaḥḥāk: \"Mereka adalah para pejuang di jalan Allah.\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 180)", "Al-Qurṭubī kemudian merinci pendapat-pendapat yang memperluas cakupan fī sabīlillāh:", "Pendapat Ibn ʿUmar dan Ibn ʿAbbās: Memasukkan haji sebagai fī sabīlillāh. Al-Qurṭubī mengutip:", "\"Diriwayatkan dari Ibn ʿUmar dan Ibn ʿAbbās bahwa keduanya berkata: 'Haji termasuk fī sabīlillāh.'\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 181)", "Pendapat Aḥmad bin Ḥanbal: Membolehkan zakat untuk haji, dan ini juga pendapat Isḥāq bin Rāhawayh. (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 181)", "Pendapat yang memperluas ke seluruh jalan kebaikan (wujūh al-birr): Sebagian ulama, seperti al-Qāsim dan al-Kisāʾī, berpendapat bahwa fī sabīlillāh mencakup semua jalan kebaikan—mulai dari membangun masjid, jembatan, mengurus jenazah, hingga menyediakan air minum. Al-Qurṭubī menolak perluasan ini dengan tegas:", "\"Ini adalah pendapat yang lemah (daʿīf). Seandainya semua jalan kebaikan termasuk fī sabīlillāh, niscaya penyebutan tujuh golongan lainnya menjadi sia-sia, karena fī sabīlillāh akan mencakup semuanya. Pembatasan oleh Allah atas delapan golongan menunjukkan bahwa masing-masing memiliki spesifikasi tersendiri.\" (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 182)", "Al-Qurṭubī juga membahas secara detail syarat-syarat penerima zakat dari golongan fī sabīlillāh:", "Mereka adalah para pejuang sukarelawan (mutaṭawwiʿah), bukan tentara reguler yang sudah mendapat gaji dari baitul mal.", "Zakat dapat diberikan untuk membeli senjata, kuda, dan bekal jihad.", "Seorang pejuang tetap berhak menerima zakat meskipun ia kaya di negerinya, karena kebutuhan jihad bersifat mendesak dan terpisah dari kekayaan pribadi. (al-Qurṭubī, al-Jāmiʿ, jilid 8, hlm. 183–184)", "Kesimpulannya: Al-Qurṭubī secara tegas memilih pendapat jumhur yang membatasi fī sabīlillāh pada ghuzāt (para pejuang sukarelawan). Ia membantah perluasan makna ke seluruh jalan kebaikan dengan argumen linguistik dan kontekstual yang kuat. Meskipun ia mencatat pendapat Ibn ʿUmar dan Ibn ʿAbbās tentang haji, ia tidak menjadikannya sebagai pendapat yang dominan dalam mazhab hukum yang ia bela.", "3. Perbandingan Ketiga Tafsir", "Titik Kesepakatan (Ittifāq)", "Makna dasar fī sabīlillāh adalah para pejuang (ghuzāt). Ketiga mufasir sepakat bahwa makna paling otentik berdasarkan riwayat salaf adalah para pejuang di jalan Allah. Mereka semua mengutip riwayat dari Qatādah, Mujāhid, dan al-Ḍaḥḥāk yang secara eksplisit menafsirkan demikian.", "Penerima adalah pejuang sukarelawan. Ketiganya membedakan antara tentara reguler yang telah terdaftar dalam dīwān (daftar penerima gaji tetap negara) dengan pejuang sukarelawan (mutaṭawwiʿah). Hanya kelompok kedua yang berhak menerima zakat. Al-Ṭabarī dan al-Qurṭubī secara eksplisit menekankan syarat ini; Ibn Kathīr mengutipnya tanpa perbedaan.", "Kekayaan tidak menghalangi. Seorang pejuang sukarelawan tetap berhak menerima zakat meskipun ia kaya di negeri asalnya, karena zakat di sini bukan untuk menutupi kemiskinan, melainkan untuk memenuhi kebutuhan jihad yang mendesak. Ini ditegaskan oleh al-Ṭabarī dan al-Qurṭubī, dan diisyaratkan oleh Ibn Kathīr.", "Titik Perbedaan (Ikhtilāf)", "Cakupan perluasan makna.", "Al-Ṭabarī mencatat perluasan ke haji, tetapi secara eksplisit mentarjih pendapat yang membatasi pada ghuzāt. Ia menolak perluasan lebih lanjut ke seluruh kebaikan dengan argumen bahwa penyebutan delapan golongan secara spesifik tidak akan bermakna jika fī sabīlillāh mencakup semuanya.", "Ibn Kathīr lebih terbuka terhadap perluasan. Ia mengutip pendapat Imam Aḥmad dan Ibn ʿAbbās tentang haji sebagai bagian dari fī sabīlillāh tanpa menolaknya secara tegas, meskipun ia tetap menyatakan bahwa pendapat masyhur adalah pembatasan pada ghuzāt.", "Al-Qurṭubī memberikan analisis paling komprehensif. Ia mencatat pendapat yang memperluas ke haji dan bahkan ke semua jalan kebaikan, tetapi secara eksplisit dan tegas menolak perluasan ke seluruh kebaikan dengan argumen linguistik dan logis yang kuat. Ia menyebut perluasan tersebut sebagai pendapat yang lemah.", "Metode penyajian dan penekanan.", "Al-Ṭabarī menggunakan metode tafsīr bi al-maʾthūr dengan pendekatan ikhbārī (melaporkan riwayat secara lengkap), lalu mentarjih di akhir. Tekanannya pada penyajian seluruh spektrum riwayat dan kritik sanad.", "Ibn Kathīr lebih ringkas dan selektif dalam mengutip riwayat. Tekanannya pada mengonfirmasi pendapat jumhur dan menghubungkannya dengan amaliah salaf.", "Al-Qurṭubī berfokus pada implikasi hukum fikih. Selain riwayat, ia juga membahas syarat-syarat penerima, mekanisme penyaluran, dan implikasi perbedaan pendapat terhadap praktik zakat. Tekanannya sangat fiqh-oriented.", "Argumentasi penolakan perluasan.", "Al-Ṭabarī dan al-Qurṭubī menggunakan argumen yang sama secara substantif: spesifikasi delapan golongan oleh Allah tidak akan bermakna jika fī sabīlillāh ditafsirkan secara terlalu luas. Namun, al-Qurṭubī mengembangkannya lebih jauh dengan analisis kebahasaan dan konteks syariat. Ibn Kathīr tidak mengembangkan argumen ini secara eksplisit."], "claimed_refs": []}, {"run_id": "GPT-CoT-1", "model_id": "gpt", "model": "GPT 5.5", "family": "OpenAI", "version": 1, "source_file": "Respon GPT 5.5 V1.docx", "word_count": 1197, "paragraphs": ["Catatan awal", "Penjelasan ini menggunakan rujukan halaman dari edisi digital yang ditampilkan oleh Islamweb/KSU Quran. Nomor halaman dapat berbeda pada cetakan lain, tetapi rujukan jilid dan halaman di bawah mengikuti tampilan edisi tersebut.", "1. Konteks QS al-Tawbah [9]: 60 dan kedudukan fī sabīlillāh", "QS al-Tawbah [9]: 60 turun dalam konteks pembagian zakat/sedekah wajib. Ibn Kathīr menjelaskan bahwa setelah Allah menyebut keberatan kaum munafik terhadap Nabi dalam pembagian sedekah, Allah sendiri menjelaskan hukum pembagiannya dan tidak menyerahkan penentuan golongannya kepada siapa pun; karena itu ayat ini menyebut delapan golongan penerima zakat. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 165.", "Delapan golongan itu ialah: fakir, miskin, amil zakat, muʾallaf, riqāb, ghārimīn, fī sabīlillāh, dan ibn al-sabīl. Al-Ṭabarī menegaskan makna awal ayat: “sedekah/zakat itu tidak lain untuk fakir, miskin, dan orang-orang yang Allah sebutkan.” Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 305.", "Kedudukan fī sabīlillāh adalah golongan ketujuh dari delapan aṣnāf. Dalam kerangka tafsīr bi al-maʾthūr klasik, maknanya terutama dipahami melalui riwayat, hadis, dan atsar sebagai pembiayaan perjuangan di jalan Allah, khususnya ghazw/gazwah atau jihad militer. Perluasan kepada haji muncul sebagai pendapat yang dikutip, terutama oleh Ibn Kathīr dan al-Qurṭubī, tetapi bukan makna utama yang disepakati semua mufasir.", "2. Penafsiran masing-masing mufasir", "A. Al-Ṭabarī dalam Jāmiʿ al-Bayān", "Al-Ṭabarī menafsirkan wa fī sabīlillāh sebagai pembiayaan untuk menolong agama Allah, jalan-Nya, dan syariat-Nya, yaitu dengan memerangi musuh-musuh-Nya; maksud konkretnya ialah perang melawan kaum kafir. Jadi, bagi al-Ṭabarī, makna utamanya adalah orang yang berperang di jalan Allah atau kebutuhan perang/jihad. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319.", "Riwayat yang ia kutip secara langsung adalah atsar dari Ibn Zayd: ketika menafsirkan wa fī sabīlillāh, Ibn Zayd berkata, “al-ghāzī fī sabīlillāh,” yakni orang yang berperang di jalan Allah. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319.", "Al-Ṭabarī juga mengutip hadis melalui jalur Zayd b. Aslam dari ʿAṭāʾ b. Yasār bahwa sedekah tidak halal bagi orang kaya kecuali untuk beberapa keadaan, salah satunya fī sabīlillāh. Ia juga mengutip riwayat dari Abū Saʿīd al-Khudrī bahwa sedekah tidak halal bagi orang kaya kecuali dalam beberapa hal, termasuk fī sabīlillāh dan ibn al-sabīl. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319–320.", "Kesimpulan al-Ṭabarī: fī sabīlillāh adalah orang yang berperang/berjihad di jalan Allah dan pembiayaan untuk kepentingan perang membela agama Allah. Golongan ini boleh menerima zakat bukan karena miskin, tetapi karena fungsi perjuangan agama; karena itu orang kaya pun dapat menerima bagian ini bila ia mengambilnya untuk keperluan perang, bukan untuk menutup kebutuhan pribadi. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 316 dan 319–320.", "B. Ibn Kathīr dalam Tafsīr al-Qurʾān al-ʿAẓīm", "Ibn Kathīr memulai dengan konteks bahwa ayat ini datang setelah celaan kaum munafik terhadap pembagian sedekah oleh Nabi. Ia mengutip hadis Ziyād b. al-Ḥārith al-Ṣudāʾī—dengan catatan bahwa dalam sanadnya ada kelemahan—bahwa Allah tidak menyerahkan hukum sedekah kepada Nabi atau selainnya, tetapi Allah sendiri membaginya menjadi delapan golongan. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 165.", "Untuk fī sabīlillāh, Ibn Kathīr menyatakan: “di antaranya adalah al-ghuzāt, yaitu para pejuang, yang tidak memiliki hak tetap dalam dīwān.” Artinya, sasaran utama bagian ini adalah pejuang/jundī yang tidak mendapat jatah resmi dari administrasi negara. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169.", "Ibn Kathīr juga mencatat pendapat Aḥmad, al-Ḥasan, dan Isḥāq bahwa haji termasuk sabīlillāh, berdasarkan hadis. Namun, susunan penjelasan Ibn Kathīr menunjukkan bahwa makna pertama yang ia tampilkan tetap para pejuang/gazāt. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169.", "Riwayat penting yang ia gunakan adalah hadis dari Abū Saʿīd al-Khudrī melalui jalur Zayd b. Aslam dari ʿAṭāʾ b. Yasār, bahwa sedekah tidak halal bagi orang kaya kecuali lima: amil, orang yang membelinya dengan hartanya, ghārim, ghāzī fī sabīlillāh, atau orang miskin yang diberi sedekah lalu menghadiahkannya kepada orang kaya. Ia juga menyebut riwayat Abū Dāwud dari ʿAṭiyyah al-ʿAwfī dari Abū Saʿīd al-Khudrī yang memasukkan fī sabīlillāh dan ibn al-sabīl sebagai pengecualian. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169–170.", "Kesimpulan Ibn Kathīr: fī sabīlillāh terutama adalah para pejuang di jalan Allah, khususnya yang tidak mendapat bagian dari dīwān. Ia membuka ruang pendapat bahwa haji dapat termasuk sabīlillāh menurut Aḥmad, al-Ḥasan, dan Isḥāq, tetapi titik tekan tafsirnya tetap pada ghuzāt. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169–170.", "C. Al-Qurṭubī dalam al-Jāmiʿ li-Aḥkām al-Qurʾān", "Al-Qurṭubī menafsirkan ayat ini secara fikih dengan menyusun pembahasan dalam banyak masalah. Pada awal pembahasan, ia menjelaskan bahwa ayat ini menerangkan maṣārif al-ṣadaqāt, yaitu tempat penyaluran zakat, sehingga zakat tidak boleh keluar dari golongan-golongan tersebut. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 95–96.", "Dalam masalah ke-22, al-Qurṭubī menyatakan bahwa wa fī sabīlillāh adalah al-ghuzāt wa mawḍiʿ al-ribāṭ, yaitu para pejuang dan tempat/pos ribāṭ. Mereka diberi biaya untuk keperluan perang, baik mereka fakir maupun kaya. Ia menyebut ini sebagai pendapat kebanyakan ulama dan sebagai hasil pemahaman mazhab Mālik. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 111.", "Al-Qurṭubī juga mengutip pendapat Ibn ʿUmar bahwa yang termasuk fī sabīlillāh adalah hujjāj dan ʿummār, yakni orang-orang yang berhaji dan berumrah. Ia menambahkan bahwa dari Aḥmad dan Isḥāq juga diriwayatkan pendapat bahwa haji termasuk sabīlillāh. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 111–112.", "Dalam memperkuat makna pejuang, al-Qurṭubī mengutip hadis “sedekah tidak halal bagi orang kaya kecuali lima,” salah satunya ghāzī fī sabīlillāh. Ia menyebut riwayat itu dari Zayd b. Aslam dari ʿAṭāʾ b. Yasār, dan versi marfūʿ-nya melalui Maʿmar dari Zayd b. Aslam dari ʿAṭāʾ b. Yasār dari Abū Saʿīd al-Khudrī. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 113.", "Al-Qurṭubī juga menyebut rincian praktis: zakat boleh diberikan untuk kuda/perlengkapan perang, senjata, dan kebutuhan alat perang, karena semuanya termasuk manfaat perang dan jalan mempertahankan wilayah kaum Muslim. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 112.", "Kesimpulan al-Qurṭubī: fī sabīlillāh terutama berarti para pejuang dan kebutuhan ribāṭ/perang, baik penerimanya miskin maupun kaya. Ia juga mencatat pendapat yang memasukkan haji dan umrah, terutama dari Ibn ʿUmar serta riwayat pendapat Aḥmad dan Isḥāq, tetapi ia menegaskan bahwa pemaknaan pejuang/ribāṭ adalah pendapat mayoritas. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 111–113.", "3. Perbandingan ketiga tafsir", "Ketiganya sepakat bahwa fī sabīlillāh dalam QS al-Tawbah [9]: 60 bukan frasa umum untuk semua kebaikan, tetapi salah satu pos zakat yang memiliki sasaran khusus. Dalam tiga tafsir ini, sasaran pokoknya adalah al-ghāzī/al-ghuzāt, yaitu orang yang berperang di jalan Allah, serta biaya yang terkait dengan perjuangan tersebut. Rujukan: al-Ṭabarī, jld. 14, hlm. 319–320; Ibn Kathīr, jld. 4, hlm. 169–170; al-Qurṭubī, jld. 8, hlm. 111–113.", "Perbedaannya terletak pada keluasan pembahasan. Al-Ṭabarī paling tegas membatasi makna pada pembiayaan perang melawan musuh Allah, lalu mendukungnya dengan atsar Ibn Zayd dan hadis pengecualian bagi orang kaya. Ibn Kathīr tetap menjadikan ghuzāt sebagai makna utama, tetapi menyebut pendapat bahwa haji termasuk sabīlillāh. Al-Qurṭubī memberi pembahasan fikih paling luas: ia menyebut ghuzāt dan ribāṭ sebagai pendapat mayoritas, mengutip pendapat haji/umrah dari Ibn ʿUmar, serta membahas perlengkapan perang dan status orang kaya yang ikut perang. Rujukan: al-Ṭabarī, jld. 14, hlm. 319–320; Ibn Kathīr, jld. 4, hlm. 169–170; al-Qurṭubī, jld. 8, hlm. 111–113.", "Dengan demikian, menurut metode tafsīr bi al-maʾthūr pada tiga tafsir tersebut, makna yang paling kuat dan paling berulang untuk fī sabīlillāh adalah orang yang berjuang/berperang di jalan Allah dan pembiayaan yang menunjang jihad/ribāṭ. Perluasan kepada haji/umrah ada dalam sebagian riwayat dan pendapat ulama, tetapi tidak menghapus makna dominan tersebut."], "claimed_refs": ["Al-Ṭabarī, Abū Jaʿfar Muḥammad b. Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Jilid 14, hlm. 305, 316, 319–320.", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl b. ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Jilid 4, hlm. 165, 169–170.", "Al-Qurṭubī, Abū ʿAbd Allāh Muḥammad b. Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān. Jilid 8, hlm. 95–96, 111–113."]}, {"run_id": "GPT-CoT-2", "model_id": "gpt", "model": "GPT 5.5", "family": "OpenAI", "version": 2, "source_file": "GPT Respon 5.5 V2.docx", "word_count": 1594, "paragraphs": ["Catatan rujukan: nomor jilid dan halaman di bawah mengikuti paginasi kitab yang ditampilkan dalam sumber digital yang dirujuk. Pada cetakan lain, nomor halaman dapat bergeser.", "A. Konteks QS al-Tawbah [9]: 60", "QS al-Tawbah [9]: 60 berbicara tentang maṣārif al-zakāh, yaitu delapan golongan penerima zakat. Ayat ini berbunyi:", "إِنَّمَا الصَّدَقَاتُ لِلْفُقَرَاءِ وَالْمَسَاكِينِ وَالْعَامِلِينَ عَلَيْهَا وَالْمُؤَلَّفَةِ قُلُوبُهُمْ وَفِي الرِّقَابِ وَالْغَارِمِينَ وَفِي سَبِيلِ اللَّهِ وَابْنِ السَّبِيلِ فَرِيضَةً مِنَ اللَّهِ وَاللَّهُ عَلِيمٌ حَكِيمٌ", "Artinya: zakat hanya diperuntukkan bagi: fakir, miskin, amil zakat, muallaf, pembebasan budak, orang berutang, fī sabīlillāh, dan ibn al-sabīl. Frasa fī sabīlillāh berada pada urutan ketujuh, setelah al-ghārimīn dan sebelum ibn al-sabīl. Dalam konteks ayat, ia bukan istilah umum yang dilepaskan dari daftar penerima zakat, melainkan salah satu pos resmi zakat. Ibn Kathīr menjelaskan bahwa ayat ini turun setelah penyebutan orang-orang munafik yang mencela pembagian sedekah Nabi; lalu Allah sendiri menjelaskan pembagian zakat dan tidak menyerahkan penentuan hukumnya kepada selain-Nya. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 165.", "Dalam pendekatan tafsīr bi al-maʾthūr, makna ayat ditelusuri melalui penjelasan al-Qur’an, hadis, riwayat sahabat, dan athar tabi‘in. Pada tiga tafsir yang dibahas, makna dominan fī sabīlillāh dalam QS 9:60 adalah orang yang berperang/berjihad secara sah di jalan Allah dan pembiayaan yang terkait dengannya, bukan seluruh amal kebajikan secara bebas. Namun, Ibn Kathīr dan al-Qurṭubī juga mencatat adanya riwayat atau pendapat yang memasukkan haji ke dalam cakupan tertentu.", "B. Tafsir al-Ṭabarī: Jāmiʿ al-Bayān", "1. Penafsiran al-Ṭabarī", "Al-Ṭabarī menafsirkan “wa fī sabīlillāh” sebagai nafkah untuk menolong agama Allah, jalan-Nya, dan syariat-Nya melalui perang melawan musuh-musuh-Nya. Ia menggunakan ungkapan yang sangat jelas: maksudnya adalah ghazw al-kuffār, yaitu peperangan melawan orang-orang kafir dalam konteks jihad klasik. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319.", "Dengan demikian, dalam tafsir al-Ṭabarī, fī sabīlillāh tidak dipahami sebagai semua kegiatan keagamaan atau sosial, tetapi secara khusus sebagai pembiayaan jihad/qitāl: orang yang berangkat berperang, bekal, dan kebutuhan yang mendukung peperangan di jalan Allah. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319–320.", "2. Riwayat dan athar yang dikutip", "Al-Ṭabarī mengutip athar dari Ibn Zayd, seorang tabi‘i, yang menafsirkan “fī sabīlillāh” dengan “al-ghāzī fī sabīlillāh”, yaitu orang yang berperang di jalan Allah. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319.", "Ia juga mengutip riwayat dari jalur Zayd ibn Aslam – ʿAṭāʾ ibn Yasār tentang hadis Nabi: sedekah/zakat tidak halal bagi orang kaya kecuali untuk beberapa keadaan, salah satunya fī sabīlillāh. Dalam riwayat berikutnya, al-Ṭabarī juga menyebut hadis dari Abū Saʿīd al-Khudrī yang menyebut pengecualian serupa. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319–320.", "3. Kesimpulan al-Ṭabarī", "Menurut al-Ṭabarī, yang termasuk fī sabīlillāh dalam QS 9:60 adalah al-ghāzī, yaitu orang yang terlibat dalam jihad/perang di jalan Allah, serta pembiayaan yang diperlukan untuk mendukungnya. Kesimpulan ini ia dasarkan pada penjelasan bahasa ayat, konteks zakat, dan riwayat tabi‘in serta hadis yang ia kutip. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319–320.", "C. Tafsir Ibn Kathīr: Tafsīr al-Qurʾān al-ʿAẓīm", "1. Penafsiran Ibn Kathīr", "Ibn Kathīr menjelaskan bahwa fī sabīlillāh mencakup al-ghuzāt alladhīna lā ḥaqqa lahum fī al-dīwān, yaitu para pejuang yang tidak memiliki hak tetap dalam daftar tunjangan negara. Artinya, mereka adalah pejuang sukarela atau pejuang yang tidak mendapatkan gaji tetap dari baitulmal, sehingga boleh diberi dari zakat untuk membantu jihad mereka. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169.", "Ibn Kathīr juga mencatat pendapat lain: menurut Aḥmad, al-Ḥasan, dan Isḥāq, haji termasuk dalam makna sabīlillāh, berdasarkan hadis. Namun, posisi utama Ibn Kathīr tetap menempatkan ghuzāt sebagai makna pokok ayat. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169.", "2. Riwayat dan athar yang dikutip", "Dalam pembahasan ayat ini, Ibn Kathīr mengutip hadis Ziyād ibn al-Ḥārith al-Ṣudāʾī tentang seseorang yang meminta sedekah kepada Nabi, lalu Nabi menjelaskan bahwa Allah sendiri membagi sedekah ke dalam delapan bagian. Ibn Kathīr menyebut bahwa dalam sanadnya terdapat kelemahan, tetapi hadis ini ia gunakan untuk menunjukkan bahwa pembagian zakat dalam ayat bersifat langsung dari Allah. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 165.", "Untuk mendukung pos fī sabīlillāh, Ibn Kathīr menyebut hadis dari Abū Saʿīd al-Khudrī melalui jalur Zayd ibn Aslam – ʿAṭāʾ ibn Yasār, bahwa zakat tidak halal bagi orang kaya kecuali dalam beberapa keadaan, salah satunya ghāzī fī sabīlillāh. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169–170.", "3. Kesimpulan Ibn Kathīr", "Menurut Ibn Kathīr, penerima zakat pada pos fī sabīlillāh adalah terutama para pejuang di jalan Allah yang tidak memperoleh bagian tetap dari dīwān. Mereka boleh menerima zakat meskipun tidak termasuk fakir, karena kebutuhan mereka berkaitan dengan jihad, bukan semata kebutuhan pribadi. Namun, Ibn Kathīr juga mencatat pendapat yang memasukkan haji sebagai bagian dari sabīlillāh menurut sebagian ulama. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169–170.", "D. Tafsir al-Qurṭubī: al-Jāmiʿ li-Aḥkām al-Qurʾān", "1. Penafsiran al-Qurṭubī", "Al-Qurṭubī membahas QS 9:60 dalam bentuk masalah-masalah fikih. Ia menyebut bahwa ayat ini mengandung tiga puluh masalah. Pada masalah ke-22, ia menafsirkan “wa fī sabīlillāh” sebagai al-ghuzāt wa mawḍiʿ al-ribāṭ, yaitu para pejuang dan pos pertahanan/ribāṭ. Mereka diberi dari zakat untuk biaya perang, baik mereka fakir maupun kaya. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 95 dan 111.", "Al-Qurṭubī menegaskan bahwa makna ini adalah pendapat kebanyakan ulama dan merupakan hasil pemahaman mazhab Mālik. Jadi, makna utama fī sabīlillāh menurut al-Qurṭubī adalah jihad/pertahanan militer yang sah, termasuk pembiayaan kebutuhan perang. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 111.", "2. Riwayat dan athar yang dikutip", "Al-Qurṭubī mengutip pendapat Ibn ʿUmar bahwa fī sabīlillāh dapat mencakup haji dan umrah. Ia juga menyebut bahwa dari Aḥmad dan Isḥāq diriwayatkan pendapat bahwa haji termasuk sabīlillāh. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 111.", "Ia juga menyebut riwayat yang dinisbatkan dalam al-Bukhārī dari Abū Lās, bahwa Nabi pernah membawa mereka dengan unta sedekah untuk haji. Al-Qurṭubī juga menyebut riwayat dari Ibn ʿAbbās bahwa seseorang boleh memerdekakan budak dari zakatnya dan memberi untuk haji. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 111–112.", "Selain itu, al-Qurṭubī mengutip laporan dari Ibn ʿUmar ketika ditanya tentang harta yang diwasiatkan “di jalan Allah”; Ibn ʿUmar mengarahkannya kepada orang-orang saleh yang berhaji ke Baitullah. Ini menunjukkan bahwa al-Qurṭubī mencatat adanya jalur penafsiran yang memasukkan haji ke dalam sabīlillāh, meskipun pendapat mayoritas yang ia dahulukan tetap ghuzāt dan ribāṭ. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 112.", "Al-Qurṭubī juga menyebut pendapat Muḥammad ibn ʿAbd al-Ḥakam bahwa zakat pada pos ini dapat digunakan untuk kuda perang, senjata, alat perang, dan kebutuhan pertahanan untuk menahan musuh. Ini memperluas makna dalam lingkup jihad dan pertahanan, bukan memperluasnya menjadi semua kegiatan sosial. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 112.", "3. Kesimpulan al-Qurṭubī", "Menurut al-Qurṭubī, makna utama fī sabīlillāh adalah para pejuang dan pos ribāṭ, termasuk biaya perang, alat perang, dan kebutuhan pertahanan. Mereka dapat diberi zakat baik fakir maupun kaya menurut mayoritas ulama. Namun, ia juga mencatat pendapat sahabat dan ulama yang memasukkan haji dan umrah ke dalam cakupan sabīlillāh. Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jld. 8, hlm. 111–112.", "E. Perbandingan Ketiga Tafsir", "E. Perbandingan Ketiga Tafsir", "Aspek", "al-Ṭabarī", "Ibn Kathīr", "al-Qurṭubī", "Makna utama fī sabīlillāh", "Nafkah untuk menolong agama Allah melalui perang melawan musuh; terutama ghaz
