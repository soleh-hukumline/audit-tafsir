man dapat berbeda.", "1. Konteks QS al-Tawbah [9]: 60 dan kedudukan fī sabīlillāh", "QS al-Tawbah [9]: 60 menjelaskan delapan golongan penerima zakat: fakir, miskin, amil zakat, mu’allaf, riqāb, ghārimīn, fī sabīlillāh, dan ibn al-sabīl. Dalam susunan ayat, fī sabīlillāh berada pada posisi ketujuh, setelah al-ghārimīn dan sebelum ibn al-sabīl. Karena ayat memakai redaksi “innamā al-ṣadaqāt”, para mufasir memahaminya sebagai pembatasan distribusi zakat pada delapan maṣārif tersebut, bukan untuk semua bentuk kebaikan secara umum.", "Al-Ṭabarī menyebut bahwa zakat tidak keluar dari delapan golongan ini, meskipun menurut mayoritas ulama tidak wajib dibagi merata kepada semuanya; cukup diberikan kepada salah satu atau beberapa golongan yang termasuk dalam delapan kategori itu. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 322–323.", "Ibn Kathīr juga menempatkan ayat ini dalam konteks keberatan kaum munafik terhadap pembagian sedekah/zakat oleh Nabi. Menurutnya, Allah sendiri menjelaskan pembagian zakat dan “membaginya menjadi delapan bagian/golongan”; ia mengutip hadis Abū Dāwūd dari Ziyād ibn al-Ḥārith al-Ṣudāʾī tentang seseorang yang meminta sedekah, lalu Nabi menjelaskan bahwa Allah telah menetapkan delapan bagian tersebut. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 165.", "Dengan demikian, menurut pendekatan tafsīr bi al-maʾthūr, frasa fī sabīlillāh dalam ayat zakat ini tidak dibaca bebas sebagai “semua aktivitas baik”, tetapi dipahami berdasarkan riwayat, athar, hadis, dan pemakaian awal dalam konteks penerima zakat.", "2. Penafsiran masing-masing mufasir", "A. Al-Ṭabarī dalam Jāmiʿ al-Bayān", "Al-Ṭabarī menafsirkan fī sabīlillāh sebagai pembiayaan untuk menolong agama Allah, jalan-Nya, dan syariat-Nya melalui perang melawan musuh-musuh-Nya. Ia menyimpulkan secara tegas bahwa maksudnya adalah ghazw al-kuffār, yaitu peperangan melawan orang kafir dalam konteks jihad pada masa itu. Redaksi al-Ṭabarī: “fī al-nafaqah fī nuṣrat dīn Allāh ... bi-qitāl aʿdāʾih, wa-dhālika huwa ghazw al-kuffār.” Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319.", "Riwayat utama yang ia kutip adalah dari Ibn Zayd: ketika menafsirkan wa fī sabīlillāh, Ibn Zayd berkata: “al-ghāzī fī sabīlillāh”, yaitu orang yang berperang di jalan Allah. Al-Ṭabarī juga mengutip hadis melalui Zayd ibn Aslam dari ʿAṭāʾ ibn Yasār bahwa sedekah tidak halal bagi orang kaya kecuali untuk beberapa golongan, termasuk orang yang berada fī sabīlillāh dan ibn al-sabīl. Ia juga mengutip jalur dari ʿAṭiyyah dari Abū Saʿīd al-Khudrī dengan makna serupa. Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān, jld. 14, hlm. 319–320.", "Kesimpulan al-Ṭabarī: fī sabīlillāh dalam QS 9:60 terutama menunjuk kepada al-ghāzī, yaitu pejuang/jund yang berangkat dalam jihad, serta kebutuhan pembiayaan yang terkait langsung dengan peperangan membela agama. Ia tidak memperluas maknanya kepada semua bentuk kemaslahatan umum.", "B. Ibn Kathīr dalam Tafsīr al-Qurʾān al-ʿAẓīm", "Ibn Kathīr menafsirkan fī sabīlillāh dengan rumusan ringkas: “fa-minhum al-ghuzāt alladhīna lā ḥaqqa lahum fī al-dīwān”, yaitu para pejuang yang tidak mendapat bagian/gaji dari dīwān atau daftar pembiayaan resmi negara. Artinya, zakat dapat diberikan kepada pejuang yang membutuhkan dukungan biaya karena tidak memperoleh tunjangan tetap dari kas negara. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169.", "Selain itu, Ibn Kathīr menyebut pendapat Imām Aḥmad, al-Ḥasan, dan Isḥāq bahwa haji termasuk sabīlillāh berdasarkan hadis. Namun, redaksi utama Ibn Kathīr tetap mendahulukan makna al-ghuzāt atau para pejuang. Dengan kata lain, ia mengakui adanya perluasan tertentu kepada haji menurut sebagian ulama, tetapi makna pokoknya tetap terkait jihad/peperangan. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169.", "Riwayat yang ia kaitkan dengan pembahasan ini antara lain hadis dari Abū Saʿīd al-Khudrī bahwa sedekah tidak halal bagi orang kaya kecuali beberapa golongan, salah satunya “ghāzin fī sabīlillāh”. Ia juga menyebut bahwa sebagian jalurnya diriwayatkan secara mursal dari Zayd ibn Aslam dari ʿAṭāʾ. Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jld. 4, hlm. 169–170.", "Kesimpulan Ibn Kathīr: fī sabīlillāh terutama mencakup para pejuang yang tidak mendapat alokasi resmi dari negara, dan dalam sebagian pendapat yang ia sebut, dapat mencakup haji berdasarkan riwayat tertentu.", "C. Al-Qurṭubī dalam al-Jāmiʿ li Aḥkām al-Qurʾān", "Al-Qurṭubī membahas fī sabīlillāh dalam corak fikih-tafsir yang kuat. Ia menafsirkan: “hum al-ghuzāt wa mawḍiʿ al-ribāṭ”, yaitu para pejuang dan tempat/pos ribāṭ. Mereka diberi biaya untuk kebutuhan perang, baik mereka miskin maupun kaya. Ia menyatakan bahwa ini adalah pendapat mayoritas ulama dan merupakan hasil pemahaman mazhab Mālik. Rujukan: al-Qurṭubī, al-Jāmiʿ li Aḥkām al-Qurʾān, jld. 8, hlm. 111–112.", "Riwayat/athar yang dikutip al-Qurṭubī lebih beragam. Ia menyebut pendapat Ibn ʿUmar bahwa yang termasuk fī sabīlillāh adalah jamaah haji dan umrah (al-ḥujjāj wa al-ʿummār). Ia juga menyebut riwayat yang dinisbatkan kepada Aḥmad dan Isḥāq bahwa haji termasuk sabīlillāh. Selain itu, ia mengutip keterangan dalam al-Bukhārī secara taʿlīq: dari Abū Lās, bahwa Nabi membawa mereka dengan unta sedekah untuk haji; dan dari Ibn ʿAbbās, bahwa seseorang dapat memerdekakan budak dari zakatnya dan memberi untuk haji. Rujukan: al-Qurṭubī, al-Jāmiʿ li Aḥkām al-Qurʾān, jld. 8, hlm. 112.", "Al-Qurṭubī juga menambahkan pendapat Muḥammad ibn ʿAbd al-Ḥakam bahwa zakat dapat dipakai untuk kuda, senjata, dan perlengkapan perang karena semuanya termasuk kebutuhan ghazw dan manfaatnya. Ia kemudian mengutip hadis “tidak halal sedekah bagi orang kaya kecuali lima”, salah satunya “li-ghāzin fī sabīlillāh”, sebagai penjelas bahwa pejuang dapat menerima zakat meskipun pada asalnya ia bukan fakir. Rujukan: al-Qurṭubī, al-Jāmiʿ li Aḥkām al-Qurʾān, jld. 8, hlm. 112–113.", "Kesimpulan al-Qurṭubī: makna utama fī sabīlillāh adalah pejuang dan kebutuhan ribāṭ/perlengkapan jihad, baik penerimanya miskin maupun kaya; tetapi ia juga mencatat adanya riwayat dan pendapat yang memasukkan haji dan umrah ke dalam cakupan sabīlillāh.", "3. Perbandingan ketiga tafsir", "Ketiganya sepakat bahwa fī sabīlillāh dalam QS 9:60 adalah salah satu pos penerima zakat, bukan frasa umum untuk seluruh amal kebajikan. Ketiganya juga menempatkan makna pokoknya pada jihad/ghazw, yaitu pembiayaan orang yang berjuang di jalan Allah atau kebutuhan yang terkait dengannya. Al-Ṭabarī memakai rumusan paling eksplisit: pembiayaan untuk menolong agama Allah dengan memerangi musuh, yaitu ghazw al-kuffār. Ibn Kathīr menyebut al-ghuzāt yang tidak mendapat hak dari dīwān. Al-Qurṭubī menyebut al-ghuzāt dan mawḍiʿ al-ribāṭ. Rujukan: al-Ṭabarī, jld. 14, hlm. 319–320; Ibn Kathīr, jld. 4, hlm. 169; al-Qurṭubī, jld. 8, hlm. 111–112.", "Perbedaannya terletak pada keluasan cakupan. Al-Ṭabarī paling ketat: fī sabīlillāh diarahkan kepada al-ghāzī dan pembiayaan perang. Ibn Kathīr tetap menjadikan al-ghuzāt sebagai makna utama, tetapi mencatat pendapat Aḥmad, al-Ḥasan, dan Isḥāq bahwa haji termasuk sabīlillāh. Al-Qurṭubī paling luas dalam pembahasan fikihnya: selain pejuang dan ribāṭ, ia menyebut haji/umrah menurut Ibn ʿUmar, Aḥmad, dan Isḥāq, serta perlengkapan perang seperti kuda dan senjata. Rujukan: al-Ṭabarī, jld. 14, hlm. 319–320; Ibn Kathīr, jld. 4, hlm. 169–170; al-Qurṭubī, jld. 8, hlm. 112–113.", "Jadi, menurut tiga tafsir klasik berbasis maʾthūr ini, makna utama fī sabīlillāh dalam QS 9:60 adalah pembiayaan jihad/pejuang di jalan Allah, bukan seluruh kegiatan sosial-keagamaan secara umum. Perluasan kepada haji/umrah muncul dalam Ibn Kathīr dan al-Qurṭubī sebagai pendapat yang diriwayatkan dari sebagian ulama, tetapi bukan titik tekan utama al-Ṭabarī."], "claimed_refs": ["Al-Ṭabarī, Abū Jaʿfar Muḥammad ibn Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Jilid 14, hlm. 319–323. Rujukan utama bagian fī sabīlillāh: hlm. 319–320.", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl ibn ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Jilid 4, hlm. 165–170. Rujukan utama bagian fī sabīlillāh: hlm. 169–170.", "Al-Qurṭubī, Abū ʿAbd Allāh Muḥammad ibn Aḥmad. al-Jāmiʿ li Aḥkām al-Qurʾān. Jilid 8, hlm. 111–113. Rujukan utama bagian fī sabīlillāh: hlm. 111–113."]}, {"run_id": "GEMINI-CoT-1", "model_id": "gemini", "model": "Gemini 3.5", "family": "Google", "version": 1, "source_file": "Gemini 3.5 V1.docx", "word_count": 862, "paragraphs": ["Tanggal: Sabtu, 27 Juni 2026", "Berikut adalah penjelasan mendalam mengenai makna frasa fī sabīlillāh dalam QS al-Tawbah [9]: 60 berdasarkan metode tafsīr bi al-maʾthūr (tafsir yang bersandar pada riwayat Al-Qur'an, Hadis, serta atsar sahabat/tabi'in) dengan membedah tiga kitab tafsir otoritatif.", "1. Konteks Ayat dan Kedudukan Fī Sabīlillāh", "QS al-Tawbah [9]: 60 diturunkan sebagai respons dan ketetapan hukum yang mutlak dari Allah SWT untuk membantah kaum munafik yang mencela Nabi Muhammad SAW terkait pembagian sedekah/zakat sebagaimana terekam dalam ayat 58–59. Melalui ayat ini, Allah menegaskan bahwa otoritas pembagian zakat berada langsung di tangan-Nya, bukan atas kecenderungan manusiawi.", "Ayat ini dibuka dengan perangkat pembatas (adāt al-ḥaṣr), yaitu kata “Innamā” sesungguhnya hanyalah, yang memberikan konsekuensi hukum bahwa zakat tidak boleh disalurkan ke luar dari delapan golongan (asnaf) yang disebut secara eksplisit.", "Di antara delapan golongan tersebut, frasa fī sabīlillāh menempati urutan ketujuh. Kedudukannya di dalam ayat menggunakan huruf jar fī, berbeda dengan empat golongan pertama yang menggunakan lam takhsis/kepemilikan, lil-fuqarā', yang mengisyaratkan wadah atau ruang lingkup alokasi dana, di mana zakat disalurkan untuk kemaslahatan umum yang berada di jalan Allah.", "2. Penafsiran Menurut Tiga Mufasir", "A. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān Tafsir al-Ṭabarī", "Penafsiran Frasa: Imam al-Ṭabarī menegaskan bahwa makna dasar fī sabīlillāh dalam ayat ini adalah jalan Allah yang lurus, namun secara spesifik dalam konteks hukum zakat, maknanya menyempit pada pendanaan jihad atau peperangan membela agama Allah.", "Riwayat/Athar yang Dikutip: Al-Ṭabarī bersandar pada tradisi periwayatan dari generasi tabi'in dan tabi' ut-tabi'in. Beliau mengutip riwayat dari Ibn Zayd yang menyatakan secara ringkas:", "“Fī sabīlillāh adalah orang-orang yang berperang (al-ghuzāt) di jalan Allah.”", "Beliau juga mengutip pendapat dari Abu Ja'far Imam Muhammad al-Baqir yang menjelaskan bahwa bagian zakat ini diberikan kepada tentara kaum muslimin.", "Kesimpulan: Al-Ṭabarī menyimpulkan bahwa hak fī sabīlillāh diberikan khusus kepada para pejuang (al-ghuzāt) yang berangkat berperang membela Islam, baik mereka tergolong orang miskin maupun orang kaya yang membutuhkan logistik di medan perang karena tidak mendapatkan santunan rutin dari negara.", "Rujukan Presisi: Jāmiʿ al-Bayān fī Taʾwīl al-Qurʾān, Al-Ṭabarī, Jilid 14, hlm. 313–314.", "B. Tafsīr al-Qurʾān al-ʿAẓīm Tafsir Ibn Kathīr", "Penafsiran Frasa: Ibn Kathīr menjelaskan bahwa fī sabīlillāh mencakup para pejuang yang tidak memiliki bagian tetap dalam diwan anggaran militer negara. Namun, sebagai mufasir yang berlatar belakang ahli hadis (muḥaddith), beliau memperluas cakupannya ke ibadah lain berdasarkan dalil-dalil sunah.", "Hadis/Athar yang Dikutip: Ibn Kathīr mengutip hadis dari Musnad Ahmad, Abu Dawud, dan Ibn Majah dari sahabat Abu Sa'id al-Khudri bahwa Nabi SAW bersabda:", "“Zakat tidak halal bagi orang kaya kecuali untuk lima golongan: orang yang berperang di jalan Allah (ghāzin fī sabīlillāh)...”", "Selain jihad militer, Ibn Kathīr juga mengutip pendapat fikhiah kelompok Hanbali yang memasukkan Hajj dan Umrah ke dalam makna fī sabīlillāh. Beliau bersandar pada hadis riwayat Abu Ya'la dari Ibn Abbas serta riwayat dari Imam Ahmad ibn Hanbal yang menyatakan bahwa ibadah haji termasuk bagian dari sabīlillāh.", "Kesimpulan: Menurut Ibn Kathīr, substansi utama fī sabīlillāh adalah para pejuang perang (al-ghuzāt). Namun, secara hukum operasional, zakat dari pos ini juga sah diberikan kepada orang miskin agar mereka dapat menunaikan ibadah haji wajib ke Baitullah.", "Rujukan Presisi: Tafsīr al-Qurʾān al-ʿAẓīm, Ibn Kathīr, Jilid 4, hlm. 166–167.", "C. Al-Jāmiʿ li-Aḥkām al-Qurʾān Tafsir al-Qurṭubī", "Penafsiran Frasa: Sebagai tafsir yang bercorak hukum (fiqhī), Al-Qurṭubī mengupas tuntas implikasi yuridis dari kata ini. Beliau menyatakan bahwa fī sabīlillāh adalah para pejuang (al-ghuzāt) dan penjaga tapal batas wilayah Islam (al-murābiṭūn).", "Riwayat/Pandangan yang Dikutip: Al-Qurṭubī mengutip pandangan Imam Malik mazhabnya dan mayoritas ulama. Beliau menyebutkan riwayat dari Ibn 'Umar yang pernah ditanya tentang seseorang yang menyalurkan zakatnya untuk keperluan haji, lalu Ibn 'Umar membolehkannya dengan alasan haji adalah bagian dari jalan Allah. Namun, Al-Qurṭubī menekankan bahwa mayoritas ulama (jumhur) tetap membatasi maknanya pada perang. Beliau juga mengutip pendapat ulama mazhab Maliki, seperti Ibn Shas, mengenai kebolehan membeli senjata dan kuda perang menggunakan dana zakat ini.", "Kesimpulan: Al-Qurṭubī menyimpulkan bahwa dana zakat pos ini wajib dialokasikan untuk keperluan militer, persenjataan, logistik, benteng, dan gaji pasukan, demi membela wilayah Islam, baik tentaranya miskin maupun kaya. Beliau secara tegas menolak pendapat yang meluaskan makna ini untuk proyek umum seperti membangun masjid atau mengafani jenazah.", "Rujukan Presisi: Al-Jāmiʿ li-Aḥkām al-Qurʾān, Al-Qurṭubī, Jilid 8, hlm. 184–185.", "3. Perbandingan Ketiga Tafsir", "Titik Temu Kesepakatan", "Substansi Utama: Ketiga mufasir sepakat secara mutlak (ijma') bahwa inti dari makna fī sabīlillāh dalam QS al-Tawbah [9]: 60 adalah jihad fi sabilillah secara militer (al-ghuzāt/al-mujahidun).", "Kriteria Kekayaan: Ketiganya sepakat bahwa pejuang yang sedang di medan perang berhak menerima dana ini sekalipun di kampung halamannya ia adalah orang yang kaya, karena status penerimaannya didasarkan pada maslahat jihad, bukan kemiskinan.", "Penolakan Makna Universal: Ketiga tafsir bi al-ma'thur ini tidak memperluas makna sabīlillāh secara liar ke seluruh bentuk amal kebaikan, seperti pembangunan infrastruktur umum atau fasilitas sosial, karena hal tersebut akan merusak fungsi pembatasan (ḥaṣr) dari kata Innamā.", "Titik Perbedaan", "Cakupan Hukum Keagamaan: Al-Ṭabarī membatasi tafsirnya secara ketat pada teks riwayat awal, yaitu jihad fisik. Sebaliknya, Ibn Kathīr dan Al-Qurṭubī membuka ruang perdebatan fikhiah mengenai masuknya ibadah haji ke dalam cakupan ayat berdasarkan variasi hadis yang mereka terima.", "Detail Logistik Militer: Al-Qurṭubī, karena orientasi tafsir hukumnya, jauh lebih terperinci dalam menjabarkan alokasi dana non-manusia, seperti kebolehan membeli kuda perang, membiayai mata-mata, dan membangun benteng pertahanan perbatasan (ribāṭ), yang tidak diulas secara mendalam oleh Al-Ṭabarī."], "claimed_refs": ["Al-Qurṭubī, Abu ʿAbdullāh Muḥammad ibn Aḥmad. (1964). Al-Jāmiʿ li-Aḥkām al-Qurʾān. Kairo: Dār al-Kutub al-Miṣriyyah. Jilid 8.", "Al-Ṭabarī, Abu Jaʿfar Muḥammad ibn Jarīr. (2000). Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Beirut: Muʾassasat al-Risālah. Jilid 14.", "Ibn Kathīr, ʿImādud dīn Abu al-Fidāʾ Ismāʿīl. (1999). Tafsīr al-Qurʾān al-ʿAẓīm. Riyadh: Dār Ṭaybah. Jilid 4."]}, {"run_id": "GEMINI-CoT-2", "model_id": "gemini", "model": "Gemini 3.5", "family": "Google", "version": 2, "source_file": "Gemini 3.5 V2.docx", "word_count": 741, "paragraphs": ["1. Konteks Ayat dan Kedudukan Fī Sabīlillāh dalam QS al-Tawbah [9]: 60", "QS al-Tawbah [9]: 60 diturunkan sebagai ketetapan syariat yang bersifat mutlak untuk membatasi penyaluran zakat hanya kepada delapan golongan (asnaf). Secara historis, ayat ini turun sebagai respons terhadap kaum munafik yang mencela Nabi Muhammad SAW terkait pembagian sedekah/zakat sebagaimana diisyaratkan pada ayat 58. Allah SWT kemudian menegaskan bahwa pembagian zakat bukanlah otoritas manusia, melainkan ketentuan langsung dari Allah.", "Dalam susunan ayat tersebut, frasa fī sabīlillāh (فِي سَبِيلِ اللَّهِ) menduduki urutan ketujuh dari delapan golongan penerima zakat:", "Al-Fuqarāʾ → Al-Masākīn → Al-ʿĀmilīna ʿAlayhā → Al-Mu’allafati Qulūbuhum → Fī al-Riqāb → Al-Ghārimīn → Fī Sabīlillāh → Ibn al-Sabīl", "Kedudukan fī sabīlillāh di dalam ayat ini menggunakan huruf jar fī (فِي) yang secara semantik mengisyaratkan wadah atau alokasi kepentingan umum yang luas, namun dalam koridor metodologi tafsīr bi al-maʾthūr, maknanya dispesifikkan berdasarkan riwayat yang valid.", "2. Penafsiran Menurut Tiga Mufasir Klasik", "A. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān Al-Ṭabarī", "Penafsiran Frasa: Al-Ṭabarī menegaskan bahwa fī sabīlillāh berarti peruntukan dana zakat demi menyokong kelancaran perang di jalan Allah, baik untuk bekal pasukan maupun kebutuhan logistik perang pertahanan Islam.", "Riwayat/Athar yang Dikutip: Al-Ṭabarī menukil otoritas dari kalangan Tabi'in. Di antaranya adalah riwayat dari Ibnu Zayd yang menyatakan bahwa fī sabīlillāh adalah mereka yang keluar untuk berjuang jihad. Beliau juga mengutip pendapat yang menyatakan bahwa bagian ini mencakup orang-orang yang membutuhkan bantuan untuk membeli senjata dan tunggangan demi berperang.", "Kesimpulan: Menurut al-Ṭabarī, yang dimaksud fī sabīlillāh secara eksklusif adalah para pejuang/tentara sukarela (al-ghuzāt) yang berjuang membela Islam dan tidak memiliki bagian tetap (dīwān) di dalam baitulmal.", "Rujukan: Jāmiʿ al-Bayān, Jilid 14, hlm. 314–315.", "B. Tafsīr al-Qurʾān al-ʿAẓīm Ibn Kathīr", "Penafsiran Frasa: Ibn Kathīr menjelaskan bahwa hak fī sabīlillāh diberikan kepada para pejuang yang tidak memiliki gaji rutin dari negara. Menariknya, ia juga membuka ruang bagi perluasan makna ke ibadah Haji berdasarkan riwayat tekstual.", "Riwayat/Athar yang Dikutip: Ibn Kathīr mengutip hadis Nabi SAW riwayat Imam Ahmad, Abu Dawud, dan al-Tirmidzi yang menegaskan bahwa zakat tidak halal bagi orang kaya kecuali untuk lima golongan, salah satunya adalah al-ghāzī fī sabīlillāh pejuang di jalan Allah. Selain itu, ia mengutip hadis dari Abu Las al-Khuza'i bahwa Nabi SAW memerintahkan untuk memberikan unta zakat kepada orang yang ingin pergi Haji, serta pendapat Ibnu Abbas bahwa Haji adalah bagian dari sabīlillāh.", "Kesimpulan: Ibn Kathīr menyimpulkan mayoritas ulama membatasinya pada para pejuang perang (al-ghuzāt), namun ia juga mengakui legalitas pemberian zakat untuk orang yang menunaikan ibadah Haji dan Umrah jika mengacu pada mazhab Imam Ahmad bin Hanbal yang didukung oleh athar sahih.", "Rujukan: Tafsīr al-Qurʾān al-ʿAẓīm, Jilid 4, hlm. 166.", "C. Al-Jāmiʿ li-Aḥkām al-Qurʾān Al-Qurṭubī", "Penafsiran Frasa: Sebagai mufasir yang fokus pada hukum fikih, al-Qurṭubī menegaskan bahwa fī sabīlillāh adalah jalur pendanaan militer untuk menegakkan kalimat Allah dan menjaga perbatasan wilayah Muslim (al-ribāṭ).", "Riwayat/Athar yang Dikutip: Al-Qurtubi mengutip pandangan Imam Malik bin Anas tokoh mazhabnya yang menyatakan bahwa dana fī sabīlillāh diserahkan untuk keperluan jihad dan pos-pos pertahanan perbatasan. Ia juga menukil riwayat dari Ibnu Umar yang mengategorikan Haji ke dalam sabīlillāh, namun al-Qurṭubī memberikan catatan kritis bahwa pendapat mayoritas ulama (jumhūr) tidak memasukkan haji ke dalam pos zakat wajib ini.", "Kesimpulan: Golongan yang berhak menerima adalah para pejuang (al-ghuzāt) dan penjaga tapal batas (al-murābiṭūn). Al-Qurṭubī menekankan bahwa pejuang tersebut boleh menerima zakat meskipun mereka kaya, karena zakat di sini diberikan atas asas kemaslahatan umum pertahanan negara, bukan atas asas kebutuhan kemiskinan. Ia menolak keras penafsiran yang memperluas makna ini ke proyek fasilitas umum seperti membangun masjid.", "Rujukan: Al-Jāmiʿ li-Aḥkām al-Qurʾān, Jilid 8, hlm. 183–185.", "3. Perbandingan Ketiga Tafsir: Persamaan dan Perbedaan", "Persamaan", "Makna Inti Kombatant: Ketiga mufasir sepakat secara mutlak (ijmaʿ) bahwa makna primer dan utama dari fī sabīlillāh dalam konteks zakat adalah jihad militer/peperangan fisik untuk membela agama Islam serta perlengkapan perang terkait.", "Sifat Riwayat: Ketiganya menggunakan koridor bi al-maʾthūr dengan bersandar pada tradisi para sahabat dan tabi'in untuk membatasi agar makna kata “jalan Allah” tidak ditafsirkan terlalu liar secara linguistik.", "Perbedaan", "Cakupan Ibadah Haji: Ibn Kathīr cenderung ke mazhab Hanbali dalam hal ini bersikap lebih terbuka menerima opsi bahwa ibadah Haji termasuk dalam fī sabīlillāh berdasarkan athar Ibnu Abbas. Sebaliknya, al-Qurṭubī mazhab Maliki dan al-Ṭabarī membatasi ruangnya hanya pada aspek defensif/ofensif militer, dan memandang haji memiliki jalurnya sendiri di luar zakat wajib.", "Kriteria Kekayaan Penerima: Al-Qurṭubī secara spesifik menguraikan status fikih bahwa pejuang kaya tetap berhak menerima dana ini demi maslahat militer, sebuah ulasan fikih yang tidak dieksplorasi secara mendalam oleh al-Ṭabarī yang lebih fokus pada kodifikasi riwayat murni."], "claimed_refs": ["Al-Qurṭubī, Abū ʿAbdillāh Muḥammad ibn Aḥmad. (1964). Al-Jāmiʿ li-Aḥkām al-Qurʾān. Kairo: Dār al-Kutub al-Miṣriyah. Jilid 8, hlm. 183-185.", "Al-Ṭabarī, Abū Jaʿfar Muḥammad ibn Jarīr. (2000). Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Penyunting: Aḥmad Muḥammad Shākir. Beirut: Muʾassasat al-Risālah. Jilid 14, hlm. 314-315.", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl ibn ʿUmar. (1999). Tafsīr al-Qurʾān al-ʿAẓīm. Penyunting: Sāmī ibn Muḥammad al-Salāmah. Riyadh: Dār Ṭaybah. Jilid 4, hlm. 166."]}, {"run_id": "GEMINI-CoT-3", "model_id": "gemini", "model": "Gemini 3.5", "family": "Google", "version": 3, "source_file": "Gemini 3.5 V3.docx", "word_count": 877, "paragraphs": ["1. Konteks Ayat dan Kedudukan Fī Sabīlillāh dalam QS al-Tawbah [9]: 60", "QS al-Tawbah [9]: 60 diturunkan sebagai ketetapan syariat yang bersifat mutlak untuk membatasi kelompok yang berhak menerima zakat (asṇāf al-thamāniyah). Konteks historis (asbāb al-nuzūl) ayat ini berkaitan dengan sikap kaum munafik yang mencela Nabi Muhammad ﷺ dalam pembagian sedekah/zakat sebagaimana terekam pada ayat 58–59. Mereka memprotes jika tidak diberi, dan rida jika diberi. Maka, Allah Swt. menurunkan ayat 60 untuk menegaskan bahwa pembagian zakat bukanlah otoritas manusia—termasuk Rasulullah secara personal—melainkan otoritas mutlak Allah Swt.", "Di dalam ayat ini, frasa fī sabīlillāh (وفِي سَبِيلِ اللَّهِ) menempati posisi ketujuh dari delapan golongan. Penggunaan huruf jar fī (في) yang berarti “di dalam/pada” sebelum kata sabīlillāh memberikan penekanan bahwa alokasi dana zakat untuk golongan ini bersifat melekat pada kemaslahatan sektor tersebut, bukan sekadar kepemilikan personal (tamlīk) seperti halnya al-fuqarā’ kaum fakir yang diawali dengan huruf lām (لِ).", "2. Penafsiran Frasa Fī Sabīlillāh Menurut Tiga Mufasir", "A. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān al-Ṭabarī", "Penafsiran: Ibnu Jarir al-Tabari menjelaskan bahwa fī sabīlillāh adalah hak yang ditetapkan Allah bagi para pejuang yang berperang di jalan-jalan-Nya guna meninggikan kalimat-Nya dan menghalau musuh. Dana ini digunakan untuk mendanai logistik perang mereka, seperti pembelian kuda, senjata, dan bekal perjalanan.", "Riwayat/Athar yang Dikutip: Al-Tabari menonjolkan jalur riwayat dari kalangan Tabi'in:", "Dari Qatadah: “Adapun fī sabīlillāh adalah bagi para prajurit perang (al-ghuzāt).”", "Dari Ibn Zayd: beliau menyatakan bahwa golongan ini adalah mereka yang keluar untuk berjihad di jalan Allah.", "Kesimpulan: Menurut al-Tabari, cakupan fī sabīlillāh dalam ayat zakat ini bersifat khusus dan terbatas pada para pejuang (al-ghuzāt atau al-mujāhidūn) yang terlibat langsung dalam ekspedisi militer membela Islam, baik mereka miskin maupun kaya.", "Rujukan Presisi: Al-Ṭabarī, Abu Jaʿfar Muḥammad ibn Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Ditahqiq oleh Dr. Abdullah bin Abdul Muhsin al-Turki. Kairo: Dar Hijr, 2001, Jilid 11, hlm. 544–545.", "B. Tafsīr al-Qurʾān al-ʿAẓīm Ibn Kathīr", "Penafsiran: Ibnu Kathir menegaskan bahwa porsi fī sabīlillāh diperuntukkan bagi para pejuang (al-ghuzāt) yang tidak memiliki gaji tetap atau bagian khusus dalam buku administrasi militer negara (dīwān al-jund). Namun, uniknya Ibnu Kathir juga memaparkan perluasan makna ke bidang ibadah fisik lainnya.", "Riwayat/Athar yang Dikutip: Ibnu Kathir mengutip hadis Nabi ﷺ dan ijtihad fukaha:", "Hadis riwayat Imam Ahmad, Abu Dawud, dan al-Tirmidzi: “Zakat tidak halal bagi orang kaya kecuali lima golongan: salah satunya orang yang berperang di jalan Allah...”", "Beliau juga mengutip pendapat Imam Ahmad ibn Hanbal, Ishaq ibn Rahawayh, dan sebuah riwayat dari Ibnu Abbas r.a. yang menyatakan bahwa Haji dan Umrah termasuk dalam cakupan fī sabīlillāh. Argumen ini didasarkan pada hadis mengenai seseorang yang menambatkan untanya untuk fī sabīlillāh, lalu Nabi ﷺ menyarankannya agar unta itu digunakan untuk mengangkut orang berhaji.", "Kesimpulan: Ibnu Kathir menyimpulkan bahwa pilar utamanya adalah para pejuang perang. Namun, beliau membuka ruang mengikuti mazhab Hanbali untuk memasukkan orang miskin yang dibantu dana zakat agar bisa menunaikan ibadah haji wajib.", "Rujukan Presisi: Ibn Kathīr, Abū al-Fidā’ Ismāʿīl ibn ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Ditahqiq oleh Sami bin Muhammad al-Salamah. Riyadh: Dar Taybah, 1999, Jilid 4, hlm. 166–167.", "C. Al-Jāmiʿ li-Aḥkām al-Qurʾān al-Qurṭubī", "Penafsiran: Sebagai mufasir yang berlatar belakang fikih Maliki, al-Qurtubi menekankan aspek regulasi hukum pembagian zakat. Beliau menyatakan bahwa harta zakat ini dialokasikan untuk membeli perlengkapan perang, senjata, kuda, serta membiayai pos-pos penjagaan di perbatasan (ribāṭ).", "Riwayat/Athar yang Dikutip: Al-Qurtubi mengutip pandangan Imam Malik bin Anas:", "Imam Malik berkata: “Jalan Allah itu banyak, namun aku tidak mendengar adanya perselisihan konsensus bahwa yang dimaksud dengan fī sabīlillāh di sini dalam ayat zakat adalah al-ghazwpeperangan/pertahanan militer.”", "Beliau juga mendiskusikan riwayat dari Ibnu Umar r.a. mengenai ketentuan bahwa prajurit kaya pun boleh mengambil zakat ini karena ia menerimanya atas dasar kemaslahatan umum (manfaʿah ʿāmmah), bukan kebutuhan pribadi.", "Kesimpulan: Al-Qurtubi berkesimpulan secara ketat bahwa fī sabīlillāh hanya mencakup aktivitas militer pertahanan Islam (al-ghazw dan al-ribāṭ). Beliau secara eksplisit menolak pendapat sebagian ulama yang mencoba memperluas maknanya untuk segala bentuk kebaikan umum, seperti membangun masjid atau jembatan.", "Rujukan Presisi: Al-Qurṭubī, Abū ʿAbdillāh Muḥammad ibn Aḥmad. Al-Jāmiʿ li-Aḥkām al-Qurʾān. Kairo: Dār al-Kutub al-Miṣriyyah, 1964, Jilid 8, hlm. 184–186.", "3. Perbandingan Ketiga Tafsir: Persamaan dan Perbedaan", "Aspek Analisis", "Jāmiʿ al-Bayān al-Ṭabarī", "Tafsīr al-Qurʾān al-ʿAẓīm Ibn Kathīr", "Al-Jāmiʿ li-Aḥkām al-Qurʾān al-Qurṭubī", "Titik Temu Kesepakatan", "Ketiganya sepakat secara absolut bahwa makna primer dan utama dari fī sabīlillāh adalah para pejuang militer (al-ghuzāt atau al-mujāhidūn). Ketiganya juga sepakat bahwa penerima dari golongan ini boleh berstatus kaya, karena dana diberikan demi kemaslahatan jihad, bukan karena kemiskinan personal.", "Ketiganya sepakat secara absolut bahwa makna primer dan utama dari fī sabīlillāh adalah para pejuang militer (al-ghuzāt atau al-mujāhidūn). Ketiganya juga sepakat bahwa penerima dari golongan ini boleh berstatus kaya, karena dana diberikan demi kemaslahatan jihad, bukan karena kemiskinan personal.", "Ketiganya sepakat secara absolut bahwa makna primer dan utama dari fī sabīlillāh adalah para pejuang militer (al-ghuzāt atau al-mujāhidūn). Ketiganya juga sepakat bahwa penerima dari golongan ini boleh berstatus kaya, karena dana diberikan demi kemaslahatan jihad, bukan karena kemiskinan personal.", "Metode Pendekatan", "Dominan atsari, yaitu riwayat dari Tabi'in seperti Qatadah.", "Kombinasi hadis marfu', tradisi fikih hadis, dan pendapat sahabat/tabi'in.", "Dominan fikih hukum (ahkam) dengan analisis komparasi mazhab, terutama Maliki.", "Perluasan Makna", "Sangat ketat: hanya membatasi pada peperangan fisik.", "Agak longgar: memasukkan ibadah Haji dan Umrah berdasarkan dalil dari mazhab Hanbali.", "Sangat ketat: membatasi pada perang dan pos penjagaan perbatasan (ribat); menolak keras perluasan ke fasilitas publik seperti masjid."], "claimed_refs": ["Al-Qurṭubī, Abū ʿAbdillāh Muḥammad ibn Aḥmad. (1964). Al-Jāmiʿ li-Aḥkām al-Qurʾān (Jilid 8). Kairo: Dār al-Kutub al-Miṣriyyah.", "Al-Ṭabarī, Abu Jaʿfar Muḥammad ibn Jarīr. (2001). Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Tahqiq: Dr. Abdullah bin Abdul Muhsin al-Turki (Jilid 11). Kairo: Dar Hijr.", "Ibn Kathīr, Abū al-Fidā’ Ismāʿīl ibn ʿUmar. (1999). Tafsīr al-Qurʾān al-ʿAẓīm. Tahqiq: Sami bin Muhammad al-Salamah (Jilid 4). Riyadh: Dar Taybah."]}, {"run_id": "GEMINI-CoT-4", "model_id": "gemini", "model": "Gemini 3.5", "family": "Google", "version": 4, "source_file": "Gemini 3.5 V4.docx", "word_count": 760, "paragraphs": ["Konteks Ayat dan Kedudukan Fī Sabīlillāh", "QS al-Tawbah [9]: 60 merupakan ayat fundamental yang membatasi penyaluran zakat hanya kepada delapan golongan (al-asnaf al-thamaniyah). Ayat ini diawali dengan perangkat pembatas (adāt al-ḥaṣr), yaitu kata innamā (إنما), yang berarti “sesungguhnya zakat itu hanyalah untuk...”.", "Di antara delapan golongan tersebut, fī sabīlillāh (في سبيل الله) menempati urutan ketujuh, setelah golongan al-ghārimīn orang yang terlilit utang dan sebelum ibn al-sabīl musafir. Secara harfiah, frasa ini berarti “di jalan Allah”. Namun, dalam metodologi tafsīr bi al-maʾthūr tafsir yang bersandar pada riwayat Al-Qur'an, hadis, sahabat, dan tabi'in, makna frasa ini memiliki batasan hukum yang spesifik dan tidak dimaknai secara longgar untuk segala bentuk kebaikan.", "Analisis Penafsiran Menurut Tiga Mufasir", "1. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān Al-Ṭabarī", "Penafsiran: Imam al-Ṭabarī menjelaskan bahwa makna fī sabīlillāh adalah pendanaan untuk kelompok yang berjihad membela agama Allah dan melawan musuh-musuh-Nya. Zakat disalurkan kepada mereka sebagai sokongan operasional dalam mempertahankan eksistensi Islam.", "Riwayat dan Athar: Al-Ṭabarī menggunakan sanadnya untuk mengutip otoritas dari kalangan tabi'in. Beliau menyebutkan riwayat dari Mujahid bin Jabr dan Qatadah bin Di'amah yang secara tegas menyatakan bahwa bagian fī sabīlillāh dikhususkan untuk para pejuang perang (al-ghuzāt).", "Kesimpulan: Menurut al-Ṭabarī, golongan yang berhak menerima zakat dari pos ini adalah para pejuang tentara Muslim yang membutuhkan bekal, senjata, atau kendaraan untuk berperang, khususnya bagi mereka yang tidak memiliki gaji tetap dari negara (dīwān).", "Rujukan Presisi: Al-Ṭabarī, Jāmiʿ al-Bayān, Jilid 14, hlm. 314–315.", "2. Tafsīr al-Qurʾān al-ʿAẓīm Ibn Kathīr", "Penafsiran: Ibn Kathīr menegaskan bahwa pilar utama dari fī sabīlillāh adalah para pejuang (al-ghuzāt). Menariknya, Ibn Kathīr juga mengakomodasi perluasan makna luar-militer secara terbatas yang didukung oleh teks hadis, yaitu ibadah Haji.", "Riwayat dan Athar: Beliau mengutip hadis marfu' riwayat Imam Ahmad, Abu Dawud, dan al-Hakim dari Abu Sa'īd al-Khudrī bahwa Nabi SAW bersabda:", "“Zakat tidak halal bagi orang kaya kecuali untuk lima golongan... [salah satunya] orang yang berperang di jalan Allah.”", "Riwayat ini memperkuat bahwa pejuang berhak menerima zakat meski ia berkecukupan.", "Beliau juga mengutip hadis riwayat Imam Ahmad dan Abu Dawud dari Ibn ʿAbbās dan riwayat tentang Ummu Ma'qil, bahwa menunaikan ibadah Haji termasuk dalam cakupan fī sabīlillāh.", "Kesimpulan: Golongan yang masuk dalam cakupan ini adalah para pejuang perang yang tidak mendapat tunjangan rutin dari baitulmal, serta orang yang membutuhkan dana untuk menunaikan ibadah Haji wajib (Hajjat al-Islam) karena keterbatasan biaya.", "Rujukan Presisi: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, Jilid 4, hlm. 166–167.", "3. Al-Jāmiʿ li-Aḥkām al-Qurʾān Al-Qurṭubī", "Penafsiran: Sebagai mufasir yang berfokus pada ayat-ayat hukum (ayāt al-aḥkām), al-Qurṭubī menekankan sisi fikih mazhab. Ia mendefinisikan fī sabīlillāh sebagai urusan perang dan pertahanan. Al-Qurṭubī secara ketat menolak pendapat sebagian ulama yang menggunakan dana zakat pos ini untuk proyek infrastruktur publik non-militer.", "Riwayat dan Athar: Al-Qurṭubī mengutip fatwa dari Imam Malik bin Anas dalam kitab al-Muwaṭṭaʾ, serta pendapat Abdullah bin ʿUmar. Imam Malik menyatakan bahwa bagian zakat ini diserahkan untuk keperluan perang, seperti membeli kuda, senjata, dan logistik pasukan. Al-Qurṭubī juga mengutip argumen bahwa pejuang tetap diberi zakat meskipun kaya, karena sifat pemberiannya adalah bantuan tugas (maʿūnah), bukan karena kemiskinan.", "Kesimpulan: Golongan yang termasuk di dalamnya adalah para pejuang perang (al-ghuzāt) dan para penjaga benteng/perbatasan wilayah Muslim (al-murābiṭūn). Dana ini haram dialokasikan untuk pembangunan masjid, perbaikan jalan, atau pengafanan jenazah.", "Rujukan Presisi: Al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, Jilid 8, hlm. 185–186.", "Perbandingan Ketiga Tafsir", "Untuk melihat peta pemikiran ketiga mufasir bi al-ma'thur ini, berikut tabel analisis perbandingannya:", "Indikator Perbandingan", "Jāmiʿ al-Bayān al-Ṭabarī", "Tafsīr al-Qurʾān al-ʿAẓīm Ibn Kathīr", "al-Jāmiʿ li-Aḥkām al-Qurʾān al-Qurṭubī", "Makna Utama", "Militer/Jihad (al-ghuzāt).", "Militer/Jihad (al-ghuzāt).", "Militer/Jihad dan pertahanan tapal batas (ribāṭ).", "Status Kekayaan Penerima", "Diutamakan bagi yang tidak memiliki gaji tetap dari negara.", "Berhak menerima meskipun kaya berdasarkan hadis Abu Sa'id.", "Berhak menerima meskipun kaya karena fungsinya adalah subsidi logistik.", "Perluasan Makna", "Sangat ketat, tidak memperluas ke luar batas jihad militer.", "Memperluas ke ibadah Haji bagi yang tidak mampu berdasarkan riwayat hadis khusus.", "Sangat ketat, menolak keras perluasan ke fasilitas umum seperti masjid, jembatan, dan lain-lain.", "Titik Kesepakatan Konsensus", "Ketiga mufasir sepakat secara absolut bahwa jihad bersenjata/militer demi membela Islam adalah makna primer dan da delapan golongan (asnaf) yang disebutkan, sebagai kewajiban (farīḍah) dari Allah.", "Delapan golongan tersebut adalah:", "Fakir (al-fuqarā’)", "Miskin (al-masākīn)", "Amil zakat (al-‘āmilīna ‘alayhā)", "Muallaf (al-mu’allafati qulūbuhum)", "Memerdekakan budak (fī al-riqāb)", "Orang berhutang (al-ghārimīn)", "Fī sabīlillāh (posisi ketujuh)", "Ibnu sabil (ibn al-sabīl)", "Fī sabīlillāh menempati posisi khusus dengan pengulangan huruf fī, yang menurut sebagian mufasir menandakan keutamaan atau cakupan yang lebih luas dibandingkan golongan sebelumnya. Golongan ini umumnya dikaitkan dengan upaya mendukung agama Allah, terutama jihad (perjuangan di jalan Allah), meskipun ada nuansa penafsiran. Ayat ini menegaskan zakat sebagai instrumen sosial-ekonomi dan pertahanan agama yang terstruktur.", "Penafsiran Setiap Mufasir (Metode Tafsīr bi al-Ma’thūr)", "a. Jāmiʿ al-Bayān ‘an Ta’wīl Āy al-Qur’ān (al-Ṭabarī)", "Al-Ṭabarī menafsirkan \"fī sabīlillāh\" sebagai nafakah untuk mendukung agama Allah, khususnya perjuangan melawan musuh-Nya (ghazw al-kuffār / jihad). Ia mengutip riwayat dari Ibn Zayd: \"الغازي في سبيل الله\" (orang yang berperang di jalan Allah).", "Ia juga menyebutkan athar/hadits, misalnya dari Abū Saʿīd al-Khudrī (melalui jalur yang melibatkan ‘Aṭiyyah, meski ada kelemahan) dan riwayat lain yang membatasi sedekah untuk orang kaya hanya pada kasus tertentu termasuk fī sabīlillāh. Kesimpulannya: golongan ini mencakup para mujahid/ghāzī yang membutuhkan bantuan untuk persiapan perang, senjata, bekal, dll., meskipun mereka kaya (karena tujuannya mendukung perjuangan, bukan sekadar mengisi kekurangan pribadi).", "Rujukan presisi: Jāmiʿ al-Bayān (al-Ṭabarī), jilid terkait Surah al-Tawbah (biasanya jilid 10 atau setara dalam edisi standar seperti Dar al-Ma’rifah atau Syākir), pembahasan ayat 60 (lihat riwayat no. 16876 dll. dalam edisi KSU/online).", "b. Tafsīr al-Qur’ān al-ʿAẓīm (Ibn Kathīr)", "Ibn Kathīr menjelaskan \"fī sabīlillāh\" secara khusus untuk para pejuang  berorientasi hadits, tegas membatasi pada mujahid tanpa gaji dari negara.", "Al-Qurṭubī: Lebih fiqh-oriented, membahas perbedaan madzhab dan kemungkinan cakupan lebih luas (meski utama jihad), dengan analisis hukum mendalam."], "claimed_refs": ["Al-Ṭabarī, Muḥammad bin Jarīr. Jāmiʿ al-Bayān ‘an Ta’wīl Āy al-Qur’ān. (Edisi standar, misalnya Dar al-Ma’rifah atau Syākir), jilid terkait Surah al-Tawbah ayat 60.", "Ibn Kathīr, Ismāʿīl bin ‘Umar. Tafsīr al-Qur’ān al-ʿAẓīm. (Edisi standar), penjelasan QS. al-Tawbah:60.", "Al-Qurṭubī, Muḥammad bin Aḥmad. Al-Jāmiʿ li-Aḥkām al-Qur’ān. (Edisi standar), jilid 8, hal. ~154 (pembahasan ayat 60).", "Sumber pendukung online: Quran.com, KSU Tafsir Project (untuk teks riwayat)."]}, {"run_id": "GROK-CoT-2", "model_id": "grok", "model": "Grok AI Fast", "family": "xAI", "version": 2, "source_file": "Grok AI Fast V2.docx", "word_count": 720, "paragraphs": ["Konteks Ayat dan Kedudukan “fī sabīlillāh” di Antara Delapan Golongan Penerima Zakat", "Ayat QS. al-Tawbah [9]:60 merupakan penjelasan langsung dari Allah SWT mengenai pembagian zakat (ṣadaqāt). Ayat ini turun dalam konteks kritik orang-orang munafik terhadap distribusi zakat oleh Nabi ﷺ, yang ditanggapi dengan penegasan bahwa pembagian zakat adalah hak prerogatif Allah dan Rasul-Nya. Ayat ini menetapkan delapan golongan mustahik zakat secara eksklusif:", "إِنَّمَا الصَّدَقَاتُ لِلْفُقَرَاءِ وَالْمَسَاكِينِ وَالْعَامِلِينَ عَلَيْهَا وَالْمُؤَلَّفَةِ قُلُوبُهُمْ وَفِي الرِّقَابِ وَالْغَارِمِينَ وَفِي سَبِيلِ اللَّهِ وَابْنِ السَّبِيلِ ۖ فَرِيضَةً مِّنَ اللَّهِ ۗ وَاللَّهُ عَلِيمٌ حَكِيمٌ", "“fī sabīlillāh” (فِي سَبِيلِ اللَّهِ) adalah golongan ketujuh (setelah al-ghārimīn dan sebelum ibn al-sabīl). Pengulangan huruf “fī” menunjukkan kekhususan dan keutamaannya dibandingkan golongan sebelumnya. Dalam tafsir bi al-ma’thūr, frasa ini merujuk pada pengeluaran untuk mendukung perjuangan di jalan Allah, terutama jihad fi sabilillah (perang di jalan Allah), meskipun ada nuansa tambahan di be al-ʿAẓīm, jil. 4, hlm. 24).", "Riwayat/Athar: Ibn Kathīr mengutip hadits Nabi yang diriwayatkan oleh al-Bukhārī melalui Mu‘ādz bin Jabal saat diutus ke Yaman, di mana beliau menyebutkan hak-hak zakat termasuk \"fī sabīlillāh\". Untuk menegaskan ketatannya, Ibn Kathīr meriwayatkan surat ‘Umar bin al-Khaṭṭāb kepada Abu Mūsā al-Ash‘arī yang isinya melarang memberikan zakat kepada pejuang yang sudah mendapat jatah rezeki/gaji dari baitul mal (man kāna lahu fī al-bait māl). Ia juga mengutip athar Ibnu ‘Umar yang mengatakan bahwa tidak ada bagian zakat (laysa lahā min al-ṣadaqah shayʾ) bagi orang yang telah mendapat gaji (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 24-25).", "Kesimpulan: Ibn Kathīr menyimpulkan bahwa fī sabīlillāh hanyalah untuk para pejuang (al-ghuzāt) yang tidak memiliki penghasilan lain atau tidak terdaftar dalam daftar gaji tentara negara Islam (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 25).", "C. Al-Qurṭubī (al-Jāmiʿ li-Aḥkām al-Qurʾān)", "Penafsiran: Meski dikenal sebagai tafsir bermazhab Mālikī yang cenderung fokus pada aspek fiqh, al-Qurṭubī dalam menafsirkan frasa ini tetap berpegang pada metode maʾthūr. Ia menetapkan bahwa makna aslinya adalah para pejuang (al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 85).", "Riwayat/Athar: Al-Qurṭubī menyebutkan athar dari Ibnu ‘Abbas, Mujāhid, dan al-Ḥasan al-Baṣrī yang semuanya sepakat bahwa fī sabīlillāh adalah para pejuang. Ia bahkan meriwayatkan pandangan ulama Mālikī seperti Ibnu al-Qāsim dan Asyhab yang mengatakan tidak boleh memberikan zakat untuk membangun masjid atau jembatan, karena secara maʾthūr frasa ini ditujukan bagi pejuang (al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 86).", "Kesimpulan: Al-Qurṭubī menyimpulkan bahwa pendapat yang paling kuat (aṣaḥḥ) berdasarkan dalil dan athar Salaf adalah bahwa fī sabīlillāh dikhususkan bagi para pejuang yang tidak menerima gaji (‘irāsh). Ia menolak generalisasi makna \"jalan kebaikan\" untuk zakat, meskipun ia mencatat bahwa ada sebagian ulama (seperti Ibnu Syubrumah) yang memperbolehkan menggunakan zakat untuk kebaikan umum secara qiyyās, pendapat ini ditolaknya karena bertentangan dengan zhāhir athar dari generasi awal (al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 86-87).", "Perbandingan Ketiga Tafsir", "Titik Kesepakatan: Ketiga mufasir ini sepenuhnya sepakat dalam metode tafsīr bi al-maʾthūr bahwa frasa fī sabīlillāh dalam ayat zakat tidak boleh ditakwil secara luas (misalnya untuk pendidikan, pembangunan masjid, atau kegiatan sosial umum). Ketiganya mengutip sumber athar yang sama (Ibnu ‘Abbas, Mujāhid, Qatādah) untuk menyimpulkan bahwa makna spesifiknya adalah para pejuang/perang (al-ghuzāt). Selain itu, ketiganya juga sepakat (berdasarkan atsar 'Umar dan Ibnu Umar) bahwa pejuang yang sudah mendapat gaji tetap dari negara tidak berhak lagi menerima bagian dari zakat ini (al-Ṭabarī, Jāmiʿ al-Bayān, jil. 14, hlm. 316; Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 25; al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 85).", "Titik Perbedaan: Perbedaan ketiganya terletak pada dimensi penekanan dan gaya penyajian.", "Al-Ṭabarī sangat konsisten dengan pendekatan linguistik historis; ia menyajikan berbagai rantai periwayatan athar dari Tabi'in tanpa memasukkan konteks administrasi negara yang terlalu luas (al-Ṭabarī, Jāmiʿ al-Bayān, jil. 14, hlm. 313-315).", "Ibn Kathīr menambahkan dimensi hadits Nabi (riwayat Mu‘ādz) dan sangat menekankan aspek syar'i administratif dengan menyebutkan surat resmi Khalifah ‘Umar bin al-Khaṭṭāb untuk membuktikan praktik langsung Sahabat (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 24).", "Al-Qurṭubī, meski berpegang pada athar, sengaja menampilkan pandangan fiqh yang menyimpang (seperti pendapat Ibnu Syubrumah atau sebagian Malikiyyah yang memperbolehkan untuk masjid) hanya untuk kemudian menolaknya secara tegas dengan dalil athar Salaf. Ini menunjukkan keunikan al-Qurṭubī yang berusaha merespons perdebatan fiqh di zamannya dengan menggunakan senjata tafsīr bi al-maʾthūr (al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 86-87)."], "claimed_refs": ["al-Ṭabarī, Muḥammad bin Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Tahrir: Aḥmad Muḥammad Shākir. Beirut: Dār al-Fikr, 1405 H / 1985 M, Jilid 14, Halaman 312-316.", "Ibn Kathīr, Ismā‘īl bin ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Tahrir: Samī bin Muḥammad al-Sālim. Riyadh: Dār Ṭayyibah, 1999 M, Jilid 4, Halaman 23-25.", "al-Qurṭubī, Muḥammad bin Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān. Beirut: Dār al-Risālah, 2006 M, Jilid 8, Halaman 85-87."]}, {"run_id": "ZAI-CoT-2", "model_id": "zai", "model": "Z.AI GLM", "family": "Zhipu", "version": 2, "source_file": "Z.AI GLM Turbo V2.docx", "word_count": 933, "paragraphs": ["Berikut adalah penjelasan mengenai makna frasa fī sabīlillāh dalam QS al-Tawbah [9]: 60 berdasarkan metode tafsīr bi al-maʾthūr dari tiga kitab tafsir klasik utama.", "Konteks Ayat dan Kedudukan fī sabīlillāh di Antara Delapan Golongan Penerima Zakat", "QS al-Tawbah [9]: 60 merupakan ayat muhkamāt yang menjadi landasan utama dalam fikih zakat. Ayat ini secara eksplisit menetapkan delapan golongan (asnāf) yang berhak menerima zakat (ṣadaqāt). Frasa wa fī sabīlillāh (dan di jalan Allah) menempati urutan ketujuh dari delapan golongan, tepat setelah al-ghārimīn (orang yang berutang) dan sebelum ibn al-sabīl (musafir yang kehabisan bekal).", "Kedudukannya sebagai asnaf ketujuh ini mengindikasikan bahwa meskipun frasa \"di jalan Allah\" secara bahasa sangat luas (mencakup segala bentuk ketaatan), dalam konteks distribusi dana zakat, frasa ini memerlukan spesifikasi tertentu agar tidak tumpang tindih dengan tujuh golongan lainnya. Para mufasir klasik berupaya membatasi maknanya berdasarkan riwayat (maʾthūr) dari Nabi Muhammad ﷺ, para sahabat, dan tabi'in.", "Penafsiran fī sabīlillāh menurut Tiga Kitab Tafsir", "A. Jāmiʿ al-Bayān (al-Ṭabarī)", "Cara Penafsiran: Al-Ṭabarī menggunakan metode tafsīr bi al-maʾthūr dengan mengutip berbagai riwayat dari sahabat dan tabi'in, kemudian menyaringnya berdasarkan kekuatan sanad dan pemahaman bahasa.", "Riwayat dan Athar yang Dikutip:", "Mujāhid (Tabi'in): Al-Ṭabarī mengutip riwayat dari Mujāhid yang menafsirkan fī sabīlillāh secara spesifik sebagai \"al-Ghuzāt\" (para pejuang/tempur di medan perang) [Jilid 14, hal. 333].", "Ibn ʿAbbās (Sahabat): Ia mengutip riwayat dari Ibn ʿAbbās yang memaknainya sebagai \"al-Ḥājj\" (orang yang berhaji). Dalam riwayat tersebut, Ibn ʿAbbās menegaskan bahwa jika seseorang berniat menunaikan haji, maka ia termasuk dalam fī sabīlillāh [Jilid 14, hal. 334].", "Ibrāhīm al-Nakhaʿī (Tabi'in): Mengutip pandangannya bahwa fī sabīlillāh ditujukan untuk membeli senjata dan kendaraan perang bagi para pejuang [Jilid 14, hal. 335].", "Kesimpulan: Al-Ṭabarī menyimpulkan bahwa secara literal, fī sabīlillāh mencakup seluruh ketaatan kepada Allah. Namun, dalam konteks ayat zakat ini, makna yang paling kuat (al-aqwál) dan sesuai dengan pemahaman para sahabat adalah para al-ghuzāt (pejuang fi sabilillah yang tidak digaji oleh negara). Al-Ṭabarī juga tidak menolak pendapat Ibn ʿAbbās tentang haji, namun ia memandang bahwa jihad (peperangan) adalah pemahaman yang lebih dominan [Jilid 14, hal. 336].", "B. Tafsīr al-Qurʾān al-ʿAẓīm (Ibn Kathīr)", "Cara Penafsiran: Ibn Kathīr menyaring riwayat dengan ketat dan cenderung mengambil kesimpulan yang paling selaras dengan syariat secara global, serta menolak penafsiran yang terlalu luas tanpa dalil.", "Riwayat dan Athar yang Dikutip:", "Mujāhid (Tabi'in): Mengutip pendapat Mujāhid bahwa maknanya adalah al-ghuzāt [Jilid 4, hal. 102].", "Ibn ʿAbbās (Sahabat): Mengutip riwayat Ibn ʿAbbās tentang pensyariatan haji sebagai bagian dari fī sabīlillāh [Jilid 4, hal. 102].", "Kesimpulan: Ibn Kathīr menyimpulkan bahwa fī sabīlillāh dalam ayat ini secara khusus merujuk pada para mujahid (al-mujāhidīn) yang berperang di jalan Allah namun tidak mendapat gaji rutin dari Baitul Mal. Dana zakat digunakan untuk kebutuhan mereka, baik berupa perlengkapan, senjata, maupun logistic. Ibn Kathīr mengkritik pandangan sebagian ulama yang mengatakan bahwa fī sabīlillāh mencakup segala hal (membangun masjid, jembatan), karena menurutnya pemahaman tersebut melemahkan makna spesifik asnaf ini dan menyalahi pemahaman para salaf [Jilid 4, hal. 103].", "C. al-Jāmiʿ li-Aḥkām al-Qurʾān (al-Qurṭubī)", "Cara Penafsiran: Al-Qurṭubī lebih fokus pada aspek hukum (aḥkām). Ia mengumpulkan seluruh pendapat maʾthūr lalu menimbangnya dari sisi qaidah fikih.", "Riwayat dan Athar yang Dikutip:", "Jumhur Sahabat & Tabi'in (Hasan al-Basrī, ʿAṭāʾ, Ibrāhīm al-Nakhaʿī): Mengutip bahwa fī sabīlillāh ditujukan untuk al-ghuzāt (pasukan sukarela) [Jilid 8, hal. 188].", "Ibn ʿAbbās (Sahabat): Mengutip pendapatnya tentang al-Ḥājj (jamaah haji yang kehabisan bekal) [Jilid 8, hal. 189].", "Pandangan ulama fiqih (Mālikiyah dan lainnya): Al-Qurṭubī membahas apakah asnaf ini bersifat umum ('āmm) mencakup segala kebaikan. Ia mengutip Abu Yusuf dan beberapa ulama yang memperluas maknanya untuk pembangunan fasilitas umum, namun ia juga mengutip penolakan dari ulama seperti Qāḍī Abū Bakr Ibn al-ʿArabī yang menganggap generalisasi makna ini keliru [Jilid 8, hal. 190].", "Kesimpulan: Al-Qurṭubī menyimpulkan bahwa makna yang shahīh (benar) dan disepakati oleh mayoritas salaf adalah al-ghuzāt (pejuang yang berperang membela agama Allah). Dzakat boleh diberikan kepada mereka meskipun mereka orang kaya, karena kebutuhan jihad bersifat mutlak. Adapun makna haji (pendapat Ibn ʿAbbās), al-Qurṭubī memakluminya sebagai bagian dari ibadah yang menggugurkan kemampuan finansial, sehingga musafir haji yang kehabisan bekal bisa mengambil dari bagian ini (atau dari ibn al-sabīl) [Jilid 8, hal. 191].", "Perbandingan Ketiga Tafsir", "Titik Kesepakatan: Ketiga mufasir (al-Ṭabarī, Ibn Kathīr, dan al-Qurṭubī) sepakat bahwa secara tafsīr bi al-maʾthūr, makna utama dan paling kuat dari fī sabīlillāh dalam QS 9:60 adalah al-ghuzāt (para mujahid/pasukan sukarela yang tidak digaji oleh kas negara). Mereka semua merujuk pada athar Mujāhid dan jumhur tabi'in sebagai pendukung utama. Mereka juga sepakat mengutip riwayat Ibn ʿAbbās yang menyertakan jamaah haji (al-ḥājj) sebagai penerima potensial.", "Titik Perbedaan:", "Al-Ṭabarī lebih kompromistik terhadap makna bahasa. Ia mengakui bahwa secara etimologi kata tersebut luas (\"segala ketaatan\"), namun ia membatasinya pada konteks ayat melalui riwayat tanpa menolak keras interpretasi yang lebih luas.", "Ibn Kathīr paling tegas dan eksklusif. Ia secara apriori menolak penafsiran fī sabīlillāh untuk kepentingan umum (seperti membangun masjid atau jembatan) dan membatasinya secara mutlak pada pasukan perang (jihad).", "Al-Qurṭubī lebih komprehensif dalam memaparkan pro dan kontra di kalangan ahli hukum (fuqahā'). Ia tidak hanya membahas aspek tafsir, tetapi juga fikih praktisnya, seperti membolehkan orang kaya menerima zakat bagian ini selama ia menjadi ghāzī (pejuang), sebuah titik hukum yang tidak dibahas se-detail itu oleh al-Ṭabarī dan Ibn Kathīr.", "4. Rujukan Kitab Secara Presisi", "Berikut adalah rincian rujukan untuk setiap pernyataan di atas:", "Pernyataan tentang pandangan Mujāhid dan Ibrāhīm al-Nakhaʿī, serta kesimpulan Al-Ṭabarī:", "Al-Ṭabarī, Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Jilid 14. Hal. 333–336.", "Pernyataan tentang pandangan Ibn ʿAbbās (haji) dan Mujāhid (ghuzāt), serta kesimpulan eksklusif Ibn Kathīr:", "Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm. Jilid 4. Hal. 102–103.", "Pernyataan tentang kutipan Hasan al-Baṣrī, ʿAṭāʾ, Qāḍī Ibn al-ʿArabī, dan diskusi hukum fikih oleh Al-Qurṭubī:", "Al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān. Jilid 8. Hal. 188–191."], "claimed_refs": ["Al-Qurṭubī, Muḥammad b. Aḥmad. Al-Jāmiʿ li-Aḥkām al-Qurʾān. Kairo: Dār al-Kutub al-Miṣriyyah / Mu'assasat al-Risālah. Jilid 8.", "Al-Ṭabarī, Muḥammad b. Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Riyad: Dār ʿĀlam al-Kutub / Mu'assasat al-Risālah. Jilid 14.", "Ibn Kathīr, Ismāʿīl b. ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Riyad: Dār Ṭaybah. Jilid 4."]}, {"run_id": "ZAI-CoT-3", "model_id": "zai", "model": "Z.AI GLM", "family": "Zhipu", "version": 3, "source_file": "Z.AI GLM Turbo V3.docx", "word_count": 803, "paragraphs": ["Berikut adalah penjelasan mengenai makna frasa fī sabīlillāh dalam QS al-Tawbah [9]: 60 menurut metode tafsīr bi al-maʾthūr berdasarkan pandangan tiga mufasir utama.", "Konteks Ayat dan Kedudukan Fī Sabīlillāh di Antara Delapan Golongan", "QS al-Tawbah [9]: 60 merupakan ayat fundamental (ummahat al-ahkām) yang menetapkan dasar hukum distribusi zakat. Ayat ini menyebutkan delapan golongan (al-ashnāf al-thamāniyah) yang berhak menerima zakat. Frasa fī sabīlillāh menempati posisi ketujuh dari kedelapan golongan tersebut, yang dalam teks ayat dibaca: \"...wa al-ghārimīna wa fī sabīlillāh...\" (Jāmiʿ al-Bayān, jil. 10, hlm. 455; Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 18; al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 72). Kedudukannya yang berada di akhir sebelum golongan terakhir (ibn al-sabil) sering kali menimbulkan pertanyaan apakah ia terkait erat dengan golongan sebelumnya atau merupakan kategori mandiri.", "Penafsiran Setiap Mufasir", "A. Al-Ṭabarī (Jāmiʿ al-Bayān)", "Penafsiran Frasa: Al-Ṭabarī membahas frasa ini dengan metode menyandarkan makna kepada bahasa Arab asli dan athar-athar Salaf. Ia menjelaskan bahwa makna harfiahnya adalah \"di jalan Allah\".", "Riwayat/Athar: Al-Ṭabarī mengutip athar dari Ibnu Abbas yang mengatakan, \"Fī sabīlillāh ialah al-ghuzāt (para pejuang) yang tidak memiliki bagian dari gaji ('ata')\" (Jāmiʿ al-Bayān, jil. 10, hlm. 456). Ia juga mengutip pernyataan Mujahid: \"Mereka adalah al-mujāhidūn (para pejuang)\" (Jāmiʿ al-Bayān, jil. 10, hlm. 456). Athar serupa juga disebutkan dari Qatadah. Di sisi lain, al-Ṭabarī juga mencatat riwayat dari Ikrimah yang memperluas maknanya, yaitu siapa saja yang keluar dari rumahnya untuk ketaatan kepada Allah, seperti penuntut ilmu atau orang yang hendak melaksanakan haji (Jāmiʿ al-Bayān, jil. 10, hlm. 457).", "Kesimpulan: Meskipun menyebutkan pandangan Ikrimah, al-Ṭabarī melakukan tarjīh (penyaringan) dengan menyatakan bahwa pendapat yang paling kuat (ashahh) adalah pendapat Ibnu Abbas dan Mujahid. Al-Ṭabarī menegaskan bahwa makna fī sabīlillāh yang ditujukan dalam ayat zakat ini secara khusus adalah para pejuang di jalan Allah yang tidak mendapat upah dari baitul mal (Jāmiʿ al-Bayān, jil. 10, hlm. 458).", "B. Ibnu Katsīr (Tafsīr al-Qurʾān al-ʿAẓīm)", "Penafsiran Frasa: Ibnu Katsīr sangat ketat dalam metodologi tafsīr bi al-maʾthūr. Ia langsung menolak segala bentuk takwil yang menyimpang dari pemahaman generasi pertama (Salaf).", "Riwayat/Athar: Ibnu Katsīr mengutip athar yang sangat serupa dengan al-Ṭabarī. Ia menisbatkan kepada Ibnu Abbas: \"Fī sabīlillāh adalah al-ghuzāt di jalan Allah\" (Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 19). Ia juga mengutip Mujahid, Hasan al-Bashri, dan Umar bin Abdul Aziz yang semuanya membatasi maknanya pada pejuang.", "Kesimpulan: Ibnu Katsīr menutup pembahasannya dengan penolakan tegas terhadap pendapat yang memperluas makna frasa ini. Ia menyatakan bahwa mengalokasikan zakat untuk pembangunan masjid, jembatan, atau sarana umum lainnya adalah pendapat yang tidak didasari dalil yang benar menurut para ulama Salaf. Kesimpulan pastinya adalah bahwa fī sabīlillāh hanyalah untuk para pejuang sukarela yang tidak terikat gaji oleh negara (Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 20).", "C. Al-Qurṭubī (al-Jāmiʿ li-Aḥkām al-Qurʾān)", "Penafsiran Frasa: Karena kitab ini berfokus pada aspek hukum (ahkām), al-Qurṭubī membahas frasa ini dari sudut pandang disiplin ilmu fiqih berdasarkan madzhab-madzhab, namun tetap dimulai dengan athar.", "Riwayat/Athar: Al-Qurṭubī mengawali dengan riwayat dari Ibnu Abbas, Mujahid, dan Hasan al-Bashri yang mengartikannya sebagai al-ghuzāt (al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 72). Ia kemudian memasukkan pandangan fuqaha' (ahli hukum). Ia menyebutkan bahwa Imam Malik, al-Syafi'i, dan Abu Hanifah sepakat bahwa fī sabīlillāh adalah para pejuang (al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 73).", "Kesimpulan: Al-Qurṭubī menyimpulkan bahwa pendapat jumhur (mayoritas) ulama termasuk empat imam madzhab adalah bahwa frasa ini khusus untuk al-mujāhidūn. Namun, bedanya dengan Ibnu Katsīr, al-Qurṭubī mencatat secara mendetail adanya pendapat minoritas dalam sejarah fiqih (seperti praktik yang dilakukan oleh Umar bin Abdul Aziz saat menyalurkannya untuk pembangunan jalan) sebagai bahan khazanah hukum, meskipun ia cenderung melemahkan pendapat tersebut dan menguatkan pendapat jumhur (al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 74).", "Perbandingan Ketiga Tafsir", "Titik Kesepakatan: Ketiga mufasir ini sepenuhnya sepakat dan memiliki kesimpulan identik berdasarkan metode tafsīr bi al-maʾthūr, bahwa makna fī sabīlillāh dalam ayat zakat adalah para pejuang di jalan Allah (al-ghuzāt/al-mujāhidūn) yang tidak menerima gaji/upah dari kas negara (baitul mal). Kesepakatan ini mereka bangun di atas landasan yang sama, yaitu athar dari Ibnu Abbas dan Mujahid.", "Titik Perbedaan: Perbedaan mereka terletak pada cara penyajian terhadap pendapat yang menyimpang (pemaknaan luas):", "Al-Ṭabarī menyajikan pendapat luas (seperti dari Ikrimah: untuk pelajar haji/ilmu) sebagai bagian dari metodologi jam' al-aqwāl (menghimpun seluruh pendapat), namun ia menolaknya secara halus melalui proses tarjīh di akhir pembahasan (Jāmiʿ al-Bayān, jil. 10, hlm. 457-458).", "Ibnu Katsīr bersikap paling eksklusif dan tegas. Ia tidak hanya menolak pendapat luas tersebut, tetapi secara eksplisit menganggapnya sebagai kesalahan (khathā') dan tidak memiliki dasar dari Salaf, sehingga menutup ruang ijtihad untuk memperluas makna ayat ini (Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 20).", "Al-Qurṭubī bersikap komprehensif secara fikih. Ia menyetujui makna khusus untuk pejuang sebagai pendapat utama, tetapi karena sifat kitabnya yang ensiklopedis dalam hukum, ia mendokumentasikan praktik historis dan perbedaan pendapat fiqih (seperti keputusan Umar bin Abdul Aziz) secara netral sebagai catatan variasi hukum, tanpa serangan keras seperti yang dilakukan Ibnu Katsīr (al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 73-74)."], "claimed_refs": ["Al-Ṭabarī, Muḥammad ibn Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl al-Qurʾān. Tahqiq: Aḥmad Muḥammad Shākir. Kairo: Dār al-Maʿārif, [t.t.]. Jilid 10, hlm. 455–458.", "Ibn Kathīr, Ismāʿīl ibn ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Tahqiq: Samī ibn Muḥammad al-Sālim. Riyadh: Dār Ṭayyibah li al-Nasyr wa al-Tawzīʿ, 1999. Jilid 4, hlm. 18–20.", "Al-Qurṭubī, Muḥammad ibn Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān. Tahqiq: Hāshim Samī al-Bahrāwī. Beirut: Dār al-Risālah, 2006. Jilid 8, hlm. 72–74."]}, {"run_id": "ZAI-CoT-4", "model_id": "zai", "model": "Z.AI GLM", "family": "Zhipu", "version": 4, "source_file": "Z.AI GLM V4.docx", "word_count": 933, "paragraphs": ["Berikut adalah penjelasan mengenai makna frasa fī sabīlillāh dalam QS al-Tawbah [9]: 60 menurut metode tafsīr bi al-maʾthūr berdasarkan tiga kitab tafsir utama.", "Konteks Ayat dan Kedudukan fī sabīlillāh", "Ayat ke-60 dari Surah al-Tawbah merupakan ayat yang secara fundamental memuat delapan golongan (asnāf) yang berhak menerima zakat (mustahikk zakat). Frasa fī sabīlillāh tercatat sebagai golongan ketujuh dari kedelapan golongan tersebut (sebelum ibn al-sabīl).", "Konteks turunnya ayat ini berkaitan dengan pengelolaan dana zakat. Para ulama menafsirkan bahwa ayat ini turun untuk membantah kebiasaan sebagian sahabat yang ingin mendistribusikan zakat secara langsung sendiri tanpa melalui pemerintah (Baitul Mal). Ayat ini menetapkan bahwa zakat hanya boleh diberikan kepada delapan golongan ini, dan fī sabīlillāh merupakan satu kategori khusus yang kemudian menjadi bahan perdebatan ulama mengenai cakupannya (Al-Ṭabarī, Jāmiʿ al-Bayān, jil. 11, hlm. 258; Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 39).", "Penafsiran Tiga Mufasir Secara Terpisah", "A. Al-Ṭabarī (Jāmiʿ al-Bayān)", "Cara Menafsirkan: Al-Ṭabarī menggunakan pendekatan bahasa (lughah) dan memaparkan seluruh riwayat dari Salaf secara komprehensif sebelum memberikan kesimpulan. Ia menjelaskan bahwa makna harfiah fī sabīlillāh adalah \"di jalan Allah\". Namun, ia menolak pendapat yang memaknainya secara umum sebagai segala bentuk kebaikan (seperti membeli air wudhu atau memberi makan orang miskin) dengan alasan bahwa ayat ini menyebutkan hak-hak tertentu dari harta tertentu, sehingga tidak boleh ditakwil secara luas tanpa batas (Al-Ṭabarī, Jāmiʿ al-Bayān, jil. 11, hlm. 262).", "Riwayat/Athar: Al-Ṭabarī mengutip beberapa athar penting:", "Dari Ibnu Abbas: \"Yakni, orang-orang yang berperang di jalan Allah (al-ghuzāt).\" (Al-Ṭabarī, Jāmiʿ al-Bayān, jil. 11, hlm. 262).", "Dari Mujahid: \"Mereka adalah para pejuang (al-ghuzāt) di jalan Allah.\" (Al-Ṭabarī, Jāmiʿ al-Bayān, jil. 11, hlm. 263).", "Dari Qatadah: \"Adapun fī sabīlillāh, maka mereka adalah para pejuang (al-ghuzāt) yang tidak diberi gaji dari baitul mal.\" (Al-Ṭabarī, Jāmiʿ al-Bayān, jil. 11, hlm. 263).", "Dari Ikrimah: \"Orang-orang yang berperang.\" (Al-Ṭabarī, Jāmiʿ al-Bayān, jil. 11, hlm. 263).", "Kesimpulan: Al-Ṭabarī menyimpulkan secara qat'ī (pasti) bahwa fī sabīlillāh dalam ayat ini ditujukan khusus bagi para pejuang yang berperang di jalan Allah dan tidak mendapat gaji/upah dari negara (baitul mal), serta mereka termasuk golongan yang membutuhkan (Al-Ṭabarī, Jāmiʿ al-Bayān, jil. 11, hlm. 265).", "B. Ibn Kathīr (Tafsīr al-Qurʾān al-ʿAẓīm)", "Cara Menafsirkan: Ibn Kathīr sangat kuat berpegang pada metodologi tafsīr bi al-maʾthūr yang disaring dengan sanad yang sahih. Ia cenderung menolak takwil-takwil filosofis atau sufi yang memperluas makna sabīlillāh. Ia menegaskan bahwa makna asli pada masa awal Islam harus dijadikan patokan.", "Riwayat/Athar:", "Ia mengutip pernyataan Ibnu Abbas: \"Mereka adalah para pejuang di jalan Allah.\" (Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, jil. 4, hlm. 42).", "Ia mengutip athar dari Al-Hasan al-Bashri yang juga bolehkan dana fī sabīlillāh digunakan untuk membiayai haji orang lain atau membangun masjid, dengan alasan bahwa penafsiran Salaf (Ibnu Abbas, Mujahid, dll) tidak pernah menyebut hal tersebut (Al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, jil. 8, hlm. 107-108).", "Perbandingan Ketiga Tafsir", "Titik Kesepakatan: Ketiga mufasir ini sepenuhnya sepakat berdasarkan dalil ma'thur (athar Sahabat dan Tabi'in seperti Ibnu Abbas, Mujahid, Al-Hasan, dan Qatadah) bahwa frasa fī sabīlillāh dalam QS al-Tawbah [9]: 60 tidak boleh ditakwil secara luas sebagai \"segala bentuk kebaikan\". Mereka sepakat bahwa makna yang dimaksud adalah para pejuang di jalan Allah (al-ghuzāt), khususnya pejuang sukarela (mutatawwi'ah) yang tidak mendapat gaji dari baitul mal.", "Titik Perbedaan: Perbedaan mereka terletak pada pendekatan metodologis dan cakupan bahasan, bukan pada kesimpulan makna inti:", "Al-Ṭabarī menekankan pembuktian makna ini dari sisi kebahasaan dan penolakan terhadap takwil yang melampaui batas literasi teks ayat. Ia paling rinci dalam menyebutkan rantai periwayatan (isnad) dari berbagai Tabi'in.", "Ibn Kathīr menekankan pada penfilteran sanad (menggunakan hadis Nabi sebagai benteng tambahan) dan secara tegas menolak pendapat kelompok muta'akhkhirin (seperti sebagian kaum Sufi) yang menafsirkannya sebagai dana untuk mendirikan ribat, zawiyyah, atau kegiatan dakwah non-militer. Bagi Ibn Kathir, pembatasan makna pada \"pejuang fisik\" adalah hukum final.", "Al-Qurṭubī memasukkan dimensi fiqh (jurisprudensi). Ia menggunakan athar yang sama, tetapi kemudian menggunakannya sebagai basis untuk menyerang pendapat ulama fiqih lain (seperti Abu Hanifah) yang memperluas makna fī sabīlillāh ke ranah infrastruktur publik atau ibadah non-perang. Al-Qurṭubī membahas bagaimana athar Salaf ini menutup pintu terhadap ijtihad yang terlalu luas dalam penggunaan dana zakat."], "claimed_refs": ["Al-Ṭabarī, Muḥammad bin Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Ditahqiq oleh Aḥmad Muḥammad Shākir. Kairo: Mu'assasat al-Risālah, 1420 H / 2000 M. Jilid 11.", "Ibn Kathīr, Ismāʿīl bin ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Beirut: Dār al-Maʿrifah, 2006 M. Jilid 4.", "Al-Qurṭubī, Muḥammad bin Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān. Ditahqiq oleh Hishām Samīr al-Bakrī. Beirut: Dār al-Risālah, 2006 M. Jilid 8."]}]};

const $=(s,el=document)=>el.querySelector(s), $$=(s,el=document)=>[...el.querySelectorAll(s)];
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function load(k,def){try{const v=JSON.parse(localStorage.getItem(k));return v??def;}catch(e){return def;}}
function save(){localStorage.setItem(LS_FIND,JSON.stringify(findings));localStorage.setItem(LS_CFG,JSON.stringify(cfg));localStorage.setItem(LS_RUB,JSON.stringify(rubric));localStorage.setItem(LS_RALL,JSON.stringify(rubricAll));localStorage.setItem(LS_SYNC,JSON.stringify(sync));}

const catByName=Object.fromEntries(DATA.taxonomy.categories.map(c=>[c.name,c]));

// ---------- scoring: Indeks Akurasi (penalti negatif) ----------
const statusF=s=>cfg.statusFactor[s]??0;
function findingPenalty(f){const c=catByName[f.category];if(!c)return 0;const sev=f.severity!=null?f.severity:c.severity;return sev*(cfg.pillarWeight[c.pillar]??1)*statusF(f.status);}
const runFindings=run=>findings.filter(f=>f.run_id===run);
function runScore(run){const pen=runFindings(run).reduce((a,f)=>a+findingPenalty(f),0);return Math.max(0,+(100-pen*cfg.K).toFixed(1));}
function modelScore(m){const rs=DATA.responses.filter(r=>r.model===m);return rs.length?+(rs.reduce((a,r)=>a+runScore(r.run_id),0)/rs.length).toFixed(1):100;}
const scoreColor=v=>v>=85?"var(--good)":v>=65?"var(--warn)":"var(--bad)";

// ---------- scoring: Skor Kualitas (rubrik positif, sadar multi-koder) ----------
// Sel rubrik untuk satu run (semua koder). Online: dari rubricAll. Offline: dari rubric lokal (koder ini).
function rubCells(run){
  if(online()) return rubricAll.filter(r=>String(r.run_id)===String(run)&&r.value!=null&&r.value!=="");
  const o=rubric[run]||{}; return Object.keys(o).filter(d=>o[d]!=null&&o[d]!=="").map(d=>({run_id:run,coder:sync.coder||"manual",dim:d,value:+o[d]}));
}
// Skor rubrik yang sedang DIEDIT (milik koder aktif).
function rubScores(run){
  if(online()){const out={};rubricAll.filter(r=>String(r.run_id)===String(run)&&String(r.coder)===String(sync.coder)).forEach(r=>out[r.dim]=+r.value);return out;}
  return rubric[run]||{};
}
function qualityScore(run){
  const cells=rubCells(run); if(!cells.length) return null;
  const byDim={}; cells.forEach(c=>{(byDim[c.dim]=byDim[c.dim]||[]).push(+c.value);});
  const means=Object.values(byDim).map(a=>a.reduce((x,y)=>x+y,0)/a.length);
  return +(means.reduce((x,y)=>x+y,0)/(means.length*2)*100).toFixed(1);
}
function modelQuality(m){const rs=DATA.responses.filter(r=>r.model===m).map(r=>qualityScore(r.run_id)).filter(v=>v!=null);return rs.length?+(rs.reduce((a,v)=>a+v,0)/rs.length).toFixed(1):null;}
function dimAvg(dimId){const vals=[];DATA.responses.forEach(r=>rubCells(r.run_id).filter(c=>c.dim===dimId).forEach(c=>vals.push(+c.value)));return vals.length?+(vals.reduce((a,v)=>a+v,0)/vals.length).toFixed(2):null;}

function postSync(payload){ if(!online())return Promise.resolve(); return fetch(sync.url,{method:"POST",body:JSON.stringify(payload)}).catch(e=>{syncMsg="⚠ gagal kirim: "+e;}); }
function pushFinding(f){ return postSync({action:"upsertFinding",finding:flatF(f)}); }
function delFindingRemote(id){ return postSync({action:"deleteFinding",id}); }
function pushRubric(run,dim,val){ return postSync({action:"setRubric",run_id:run,coder:sync.coder||"manual",dim,value:(val==null?"":val)}); }
function flatF(f){return {id:f.id,run_id:f.run_id,model:f.model,category:f.category,severity:f.severity??"",status:f.status,coder:f.coder,quote:f.quote,source:f.source,note:f.note};}

    rubricAll=(d.rubric||[]).map(r=>({run_id:String(r.run_id),coder:String(r.coder),dim:String(r.dim),value:+r.value}));
    save(); syncMsg="✓ tersinkron ("+findings.length+" temuan, "+rubricAll.length+" sel rubrik)";
  }catch(e){ syncMsg="⚠ gagal tarik: "+e.message; }
}

// ===================================================================
//  AUTO-CODER (heuristik) — kandidat temuan + rubrik, "Perlu cek ulang"
// ===================================================================
const SIG={
  ijma:/ijmāʿ|ijma['ʿ]?\b|sepakat|disepakati|kesepakatan|konsensus|seluruh ulama|semua ulama|tanpa perbedaan|tidak ada (perbedaan|khilaf|khilāf)/i,
  modern:/pendidikan|dakwah|infrastruktur|rumah sakit|kepentingan umum|kemaslahatan umum|kemaslahatan publik|pembangunan|beasiswa|fasilitas umum|kontemporer|modern|kemanusiaan|segala (bentuk )?kebaikan|jalan kebaikan|amal kebaikan/i,
  cite:/(jld|jilid|juz|vol)\.?\s*\d|(hlm|hal|h)\.?\s*\d{1,4}|halaman\s*\d/i,
  sanadStrong:/حدثنا|أخبرنا|ثنا|ḥaddathan|haddathan|akhbaran|no\.?\s*\d{4,5}|nomor athar/i,
  sanadWeak:/sanad|isnād|isnad|riwayat|atsar|athar|perawi|mursal|marfū|mauqūf|periwayat/i,
  jihad:/ghaz(w|a)|غز|jihād|jihad|berperang|peperangan|pejuang|berjuang di jalan|al-?gh(u|ā)z|militer|al-?ghāzī/i,
  haji:/\bhaji\b|ḥajj|حج/i,
  hajiAuth:/Aḥmad|Ahmad|Isḥāq|Ishaq|al-?Ḥasan|al-?Hasan/i,
  tabari:/Ṭabarī|Thabari|Tabari|الطبري/i,
  ibnkathir:/Ibn Kathīr|Ibnu? Katsir|Ibn Kathir|ابن كثير|Katsir/i,
  qurtubi:/Qurṭubī|Qurtubi|القرطبي/i,
};
function sentenceWith(text,re){
  const parts=text.split(/(?<=[\.\!\?؟])\s+|\n+/);
  for(const s of parts){if(re.test(s))return s.trim();}
  const m=text.match(re); return m?text.slice(Math.max(0,text.indexOf(m[0])-40),text.indexOf(m[0])+120).trim():"";
}
function autoCode(run,bulkAcc){
  const r=respByRun[run], text=r.paragraphs.join("\n");
  findings=findings.filter(f=>!(f.run_id===run&&f.coder==="auto"));   // ganti hasil auto lama, simpan manual
  const slug=s=>s.replace(/[^A-Za-z]+/g,"");
  const newFs=[];
  const add=(cat,re,note)=>{const q=sentenceWith(text,re);const f={id:"auto_"+run+"_"+slug(cat),run_id:run,model:r.model,category:cat,severity:null,status:"Perlu cek ulang",coder:"auto",quote:q.slice(0,300),source:"",note:note};findings.push(f);newFs.push(f);};
  if(SIG.ijma.test(text)) add("False Consensus (Ijmāʿ)",SIG.ijma,"Auto: terdeteksi klaim kesepakatan/ijmāʿ — cek apakah sumber justru khilāf.");
  if(SIG.modern.test(text)) add("Anachronistic Expansion",SIG.modern,"Auto: terdeteksi perluasan makna ke ranah modern/umum — cek dasar ma'thūr.");
  if(SIG.cite.test(text)) add("Citation Fabrication",SIG.cite,"Auto: terdeteksi rujukan jilid/halaman — verifikasi ke edisi sumber.");
  if(!SIG.sanadStrong.test(text)&&!SIG.sanadWeak.test(text)) add("Essay-ization",/.+/,"Auto: tak ada penanda sanad/atsar — kemungkinan esai-isasi.");
  // rubrik otomatis koder "auto" (dim bersinyal jelas; r6,r7 dibiarkan manual)
  const R={};
  const muf=[SIG.tabari,SIG.ibnkathir,SIG.qurtubi].filter(re=>re.test(text)).length;
  R.r1 = muf>=3?2:muf===2?1:0;
  R.r2 = SIG.jihad.test(text)?2:0;
  R.r3 = SIG.haji.test(text)?(SIG.hajiAuth.test(text)?2:1):0;
  R.r4 = SIG.sanadStrong.test(text)?2:SIG.sanadWeak.test(text)?1:0;
  R.r5 = R.r4;
  if(SIG.modern.test(text)) R.r8=0;
  const rubRows=[];
  Object.keys(R).forEach(dim=>{
    const ac="auto";
    rubricAll=rubricAll.filter(x=>!(x.run_id===run&&x.coder===ac&&x.dim===dim));
    rubricAll.push({run_id:run,coder:ac,dim,value:R[dim]});
    rubRows.push({run_id:run,coder:ac,dim,value:R[dim]});
    if(!online()){ if(!rubric[run])rubric[run]={}; if(rubric[run][dim]==null) rubric[run][dim]=R[dim]; }
  });
  save();
  if(bulkAcc){ newFs.forEach(f=>bulkAcc.findings.push(flatF(f))); rubRows.forEach(x=>bulkAcc.rubric.push(x)); }
  return {findings:newFs,rubric:rubRows};
}
function autoCodeAll(){
  const acc={findings:[],rubric:[]};
  DATA.responses.forEach(r=>autoCode(r.run_id,acc));
  if(online()) postSync({action:"bulk",findings:acc.findings,rubric:acc.rubric}).then(()=>{syncMsg="✓ auto-fill terkirim ke server";renderSyncStatus();});
}
// rubrik: set / batal nilai 1 dimensi (koder aktif)
function setRub(run,dim,val){
  if(online()){
    rubricAll=rubricAll.filter(x=>!(x.run_id===run&&String(x.coder)===String(sync.coder)&&x.dim===dim));
    if(val!=null) rubricAll.push({run_id:run,coder:sync.coder||"manual",dim,value:val});
    pushRubric(run,dim,val);
  } else {
    if(!rubric[run])rubric[run]={}; rubric[run][dim]=val;
  }
  save();
}
