<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Audit Tafsir — fī sabīlillāh</title>
<style>
:root{
  --bg:#0f1419; --panel:#1a2129; --panel2:#222b35; --line:#2c3744;
  --ink:#e6edf3; --mut:#9fb0c0; --acc:#4ea1d3; --acc2:#7bc96f;
  --p1:#e06c75; --p2:#e5c07b; --p3:#56b6c2; --warn:#d19a66; --good:#7bc96f; --bad:#e06c75;
  --shadow:0 2px 12px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55}
h1,h2,h3,h4{margin:0 0 .4em}
a{color:var(--acc)}
header{padding:14px 20px;background:linear-gradient(180deg,#1a2129,#141a20);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
header h1{font-size:17px}
header .sub{color:var(--mut);font-size:12.5px}
nav{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
nav button{background:var(--panel2);color:var(--mut);border:1px solid var(--line);padding:7px 14px;border-radius:8px 8px 0 0;cursor:pointer;font-size:13px;font-weight:600}
nav button.active{background:var(--acc);color:#08151d;border-color:var(--acc)}
main{padding:18px 20px;max-width:1500px;margin:0 auto}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.muted{color:var(--mut)}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;color:#08151d}
.pill.P1{background:var(--p1)} .pill.P2{background:var(--p2)} .pill.P3{background:var(--p3)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1000px){.grid2,.grid3{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border:1px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top}
th{background:var(--panel2);color:var(--mut);font-weight:700;position:sticky;top:0}
tr:nth-child(even) td{background:rgba(255,255,255,.015)}
select,input,textarea,button{font-family:inherit;font-size:13px}
select,input[type=text],textarea{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:7px 9px;width:100%}
textarea{resize:vertical;min-height:54px}
label{display:block;font-size:11.5px;color:var(--mut);font-weight:700;margin:0 0 4px;text-transform:uppercase;letter-spacing:.03em}
.btn{background:var(--acc);color:#08151d;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer}
.btn.sec{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.btn.danger{background:var(--bad);color:#1a0a0a}
.btn.gold{background:var(--p2);color:#1a1405}
.btn:hover{filter:brightness(1.08)}
.btn.sm{padding:5px 10px;font-size:12px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.field{flex:1;min-width:140px}
.readpane{height:460px;overflow:auto;background:#0c1116;border:1px solid var(--line);border-radius:8px;padding:14px}
.readpane p{margin:0 0 .7em}
.gt-ar{direction:rtl;font-size:18px;line-height:2.1;color:#cfe3f2;font-family:"Geeza Pro","Scheherazade New","Traditional Arabic",serif}
.kpi{display:flex;gap:14px;flex-wrap:wrap}
.kpi .box{flex:1;min-width:120px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px}
.kpi .box .n{font-size:26px;font-weight:800}
.kpi .box .l{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.bar{height:13px;border-radius:7px;background:var(--acc)}
.bar-track{background:var(--panel2);border-radius:7px;overflow:hidden;height:13px}
.scorebadge{font-weight:800;font-size:15px;padding:2px 9px;border-radius:7px}
.scorebadge.sm{font-size:13px}
.tag{font-size:11px;padding:1px 7px;border-radius:6px;border:1px solid var(--line);color:var(--mut)}
.findrow td{font-size:12.5px}
details summary{cursor:pointer;font-weight:700;color:var(--acc)}
.chip{cursor:pointer;padding:6px 10px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);font-size:12.5px;color:var(--mut)}
.chip.active{background:var(--acc);color:#08151d;border-color:var(--acc);font-weight:700}
.small{font-size:11.5px}
.flexsb{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.gtsel{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.notice{background:#2a2018;border:1px solid var(--warn);color:#e5c07b;padding:8px 12px;border-radius:8px;font-size:12.5px}
.rubric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:900px){.rubric-grid{grid-template-columns:1fr}}
.rubric-item{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px}
.rubric-item .nm{font-weight:700;font-size:12.5px}
.rubric-item .ds{font-size:11px;color:var(--mut);margin:3px 0 7px}
.seg{display:flex;gap:4px}
.seg button{flex:1;background:#0c1116;border:1px solid var(--line);color:var(--mut);border-radius:6px;padding:5px;cursor:pointer;font-weight:700}
.seg button.on0{background:var(--bad);color:#1a0a0a;border-color:var(--bad)}
.seg button.on1{background:var(--warn);color:#1a1405;border-color:var(--warn)}
.seg button.on2{background:var(--good);color:#08151d;border-color:var(--good)}
.autotag{font-size:10px;color:var(--p2);font-weight:700;border:1px solid var(--p2);border-radius:5px;padding:0 5px}
</style>
</head>

 "desc": "Mengarang/menyebut jilid–halaman/nomor athar yang tidak dapat diverifikasi pada edisi sumber."}, {"name": "Structural Flattening", "pillar": "P2", "severity": 2, "desc": "Menghilangkan struktur riwayat berlapis menjadi pernyataan datar."}, {"name": "Riwāyah Hierarchy Missing/Inverted", "pillar": "P2", "severity": 2, "desc": "Hierarki/urutan riwayat (sanad–matn, tingkatan riwayat) hilang atau dibalik."}, {"name": "Essay-ization", "pillar": "P2", "severity": 1, "desc": "Mengubah tafsīr bi al-maʾthūr menjadi esai naratif tanpa sanad/atsar."}, {"name": "Omission of Core Riwāyah", "pillar": "P2", "severity": 2, "desc": "Menghilangkan atsar/riwayat inti (mis. atsar Ibn Zayd ‘al-ghāzī fī sabīl Allāh’, hadis aṣnāf)."}, {"name": "Translation Distortion", "pillar": "P2", "severity": 2, "desc": "Terjemahan/parafrase menyimpang dari makna teks Arab sumber."}, {"name": "Fiqh Interpolation", "pillar": "P3", "severity": 2, "desc": "Menyisipkan kesimpulan fiqh (hukum) yang tidak ada dalam riwayat tafsir."}, {"name": "Conceptual Misframing", "pillar": "P3", "severity": 2, "desc": "Membingkai konsep secara keliru (mis. menyamakan fī sabīlillāh dengan ‘amal kebaikan umum’)."}, {"name": "Anachronistic Expansion", "pillar": "P3", "severity": 3, "desc": "Memperluas fī sabīlillāh ke ranah modern (pendidikan, infrastruktur, sosial) tanpa dasar ma’thūr."}, {"name": "Interpretative Overreach", "pillar": "P3", "severity": 1, "desc": "Menarik kesimpulan melampaui yang didukung sumber."}], "rubric": [{"id": "r1", "name": "Cakupan tiga mufasir", "desc": "Merujuk al-Ṭabarī, Ibn Kathīr, DAN al-Qurṭubī (3=2 · 2=1 · ≤1=0).", "max": 2}, {"id": "r2", "name": "Ketepatan makna inti", "desc": "fī sabīlillāh = nafkah jihād/ghazw (al-ghāzī fī sabīl Allāh), bukan makna umum.", "max": 2}, {"id": "r3", "name": "Penyajian khilāf perluasan", "desc": "Menyebut riwayat perluasan ke haji (Aḥmad/al-Ḥasan/Isḥāq) sebagai khilāf, bukan ijmāʿ.", "max": 2}, {"id": "r4", "name": "Kehadiran sanad/atsar", "desc": "Menyertakan isnād/perawi/nomor athar (mis. Ibn Zayd, ʿAṭāʾ b. Yasār).", "max": 2}, {"id": "r5", "name": "Pemeliharaan struktur riwāyah", "desc": "Mempertahankan struktur riwayat (qāla–ḥaddathanā–ʿan), bukan esai datar.", "max": 2}, {"id": "r6", "name": "Ketepatan atribusi pendapat", "desc": "Pendapat ditautkan ke mufasir/perawi yang benar, tidak tertukar.", "max": 2}, {"id": "r7", "name": "Akurasi kutipan", "desc": "Kutipan/terjemahan benar-benar ada & setia pada teks sumber.", "max": 2}, {"id": "r8", "name": "Disiplin genre", "desc": "Tetap dalam tafsīr bi al-maʾthūr; tidak melompat ke fiqh/opini modern.", "max": 2}], "status_options": ["Terkonfirmasi", "Diragukan", "Tidak terbukti", "Perlu cek ulang"], "severity_labels": {"1": "Ringan", "2": "Sedang", "3": "Berat"}}, "ground_truth": [{"id": "tabari", "title": "al-Ṭabarī — Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān", "arabic": ["الصورة الأولى", "تفسير سورة التوبة: ٦٠", "١٦٨٧٨ - .... قال، حدثنا أبي، عن ابن أبي ليلى، عن عطية، عن أبي سعيد الخدري، عن النبي صلى الله عليه وسلم قال: لا تحل الصدقة لغني، إلا لثلاثة: في سبيل الله، أو ابن السبيل، أو رجل كان له جار فتصدق عليه، فأهداها له. (١)", "الصورة الثانية", "وأما قوله: «وفي سبيل الله»، فإنه يعني: وفي النفقة في نصرة دين الله وطريقه وشريعته التي شرعها لعباده، بقتال أعدائه، وذلك هو غزو الكفار. (١)", "وبالذي قلنا في ذلك قال أهل التأويل:", "ذكر من قال ذلك:", "١٦٨٧٦ - حدثني يونس قال، أخبرنا ابن وهب قال، قال ابن زيد في قوله: «وفي سبيل الله»، قال: الغازي في سبيل الله.", "١٦٨٧٧ - حدثنا ابن وكيع قال، حدثنا أبي، عن سفيان، عن زيد بن أسلم، عن عطاء بن يسار قال: قال النبي صلى الله عليه وسلم: لا تحل الصدقة لغني إلا خمسة: رجل عمل عليها، أو رجل اشتراها بماله، أو في سبيل الله، أو ابن السبيل، أو رجل كان له جار تصدق عليه فأهداها له. (٢)"], "translation": ["قال: ثنا جرير، عن منصور، عن إبراهيم، قال: كانت تجعل الصدقة في فقراء المهاجرين، وفي سبيل الله تعالى.\"Ia berkata: telah menceritakan kepada kami Jarir, dari Manshur, dari Ibrahim, ia berkata: Dahulu zakat diberikan kepada fakir dari kalangan Muhajirin dan kepada (orang-orang yang berada) fi sabilillah Ta‘ala.\"", "حدثنا ابن حميد، قال: ثنا يعقوب، عن جعفر، عن سعيد بن جبير وسعيد بن عبد الرحمن بن أبزي، قالا: كان ناس من المهاجرين لأحدهم الدار والزوجة والعبد والناقة يحج عليها ويغزو، فنسبهم الله إلى أنهم فقراء، وجعل لهم سهما في الزكاة.\"Telah menceritakan kepada kami Ibn Humaid, ia berkata: telah menceritakan kepada kami Ya‘qub, dari Ja‘far, dari Sa‘id bin Jubair dan Sa‘id bin ‘Abd al-Rahman bin Abzi, keduanya berkata: Ada sekelompok orang dari kalangan Muhajirin yang salah seorang dari mereka memiliki rumah, istri, budak, dan unta yang digunakannya untuk haji dan berjihad, namun Allah tetap menyandarkan mereka sebagai orang-orang fakir dan menjadikan bagi mereka bagian dalam zakat.\"", "حدثنا أحمد بن إسحاق، قال: ثنا أبو أحمد، قال: ثنا سفيان، عن منصور، عن إبراهيم، قال: كان يقال: إنما الصدقات في فقراء المهاجرين، وفي سبيل الله.\"Telah menceritakan kepada kami Ahmad bin Ishaq, ia berkata: telah menceritakan kepada kami Abu Ahmad, ia berkata: telah menceritakan kepada kami Sufyan, dari Manshur, dari Ibrahim, ia berkata: Dahulu dikatakan: zakat itu (diberikan) kepada fakir dari kalangan Muhajirin dan fi sabilillah.\"", "فقال بعضهم: قد بطلت المؤلفة قلوبهم اليوم، ولا سهم لأحد في الصدقة المفروضة إلا لذي حاجة إليها وفي سبيل الله أو لعامل عليها.\"Sebagian mereka berkata: Telah terhapus bagian untuk mu’allafah qulubuhum hari ini. Tidak ada bagian dari zakat wajib bagi siapa pun kecuali yang memiliki kebutuhan, berada fi sabilillah, atau menjadi amil zakat.\"", "وذلك كما يعطي الذي يعطاه بالجهاد في سبيل الله، فإنه يعطي ذلك غنيا كان أو فقيرا للغزو لا لسد خلته.\"Sebagaimana diberikan kepada orang yang berjihad fi sabilillah, ia diberi itu—baik ia kaya ataupun miskin—untuk berperang, bukan untuk menutupi kebutuhannya.\"", "Tafsir ayat: {وفي سبيل الله} — dan (untuk) fi sabilillah", "وأما قوله: { وفي سبيل الله } فإنه يعني: وفي النفقة في نصرة دين الله وطريقه وشريعته التي شرعها لعباده بقتال أعدائه، وذلك هو غزو الكفار.\"Adapun firman-Nya: {dan fi sabilillah}, maka yang dimaksud adalah: dalam pembelanjaan untuk menolong agama Allah, dan pada jalan serta syariat-Nya yang telah Dia syariatkan bagi hamba-hamba-Nya dengan memerangi musuh-musuh-Nya. Dan yang dimaksud dengan itu adalah perang terhadap orang-orang kafir.\"", "وبالذي قلنا في ذلك قال أهل التأويل.\"Dan dengan apa yang kami katakan ini, para ahli tafsir juga telah berkata.\"", "ذكر من قال ذلك:\"Disebutkan dari orang-orang yang mengatakan demikian:\"", "حدثني يونس، قال: أخبرنا ابن وهب، قال: قال ابن زيد، في قوله: { وفي سبيل الله } قال: الغازي في سبيل الله.\"Telah menceritakan kepadaku Yunus, ia berkata: telah mengabarkan kepada kami Ibnu Wahb, ia berkata: Ibn Zayd berkata mengenai firman-Nya: {dan fi sabilillah}, ia berkata: 'Orang yang berperang (berjihad) fi sabilillah.'\"", "حدثنا ابن وكيع، قال: ثنا أبي، عن سفيان، عن زيد بن أسلم، عن عطاء بن يسار، قال: قال النبي صلى الله عليه وسلم:\"لا تحل الصدقة لغني إلا لخمسة: رجل عمل عليها، أو رجل اشتراها بماله، أو في سبيل الله، أو ابن السبيل، أو رجل كان له جار تصدق عليه فأهداها له\".\"Telah menceritakan kepada kami Ibn Waki‘, ia berkata: telah menceritakan kepada kami ayahku, dari Sufyān, dari Zayd bin Aslam, dari ‘Aṭā’ bin Yasār, ia berkata: Nabi ﷺ bersabda:'Zakat tidak halal bagi orang kaya kecuali bagi lima: seseorang yang bekerja (sebagai amil) atasnya, seseorang yang membelinya dengan hartanya, atau fi sabilillah, atau ibn al-sabīl, atau seseorang yang memiliki tetangga yang bersedekah kepadanya lalu ia menghadiahkannya kepadanya.'\"", "قال: ثنا أبي، عن ابن أبي ليلى، عن عطية، عن أبي سعيد الخدري، عن النبي صلى الله عليه وسلم قال:\"لا تحل الصدقة لغني إلا لثلاثة: في سبيل الله، أو ابن السبيل، أو رجل كان له جار فتصدق عليه فأهداها له\".\"Ia berkata: telah menceritakan kepada kami ayahku, dari Ibn Abī Laylā, dari ‘Aṭiyyah, dari Abū Sa‘īd al-Khudrī, dari Nabi ﷺ, beliau bersabda:'Zakat tidak halal bagi orang kaya kecuali untuk tiga (golongan): fi sabilillah, atau ibn al-sabīl, atau seseorang yang memiliki tetangga yang bersedekah kepadanya lalu ia menghadiahkan zakat itu kepadanya.'\""]}, {"id": "ibnkathir", "title": "Ibn Kathīr — Tafsīr al-Qurʾān al-ʿAẓīm", "arabic": ["واحدا؟ قال: «لا، عتق النسمة أن تفرد بعتقها، وفك الرقبة أن تعين في ثمنها».", "وأما الغارمون فهم أقسام فمنهم: من تحمل حمالة أو ضمن دينا فلزمه فأجحف بماله أو غرم في أداء دينه أو في معصية ثم تاب فهؤلاء يدفع إليهم، والأصل في هذا الباب حديث قبيصة بن مخارق الهلالي قال: تحملت حمالة فأتيت رسول الله ﷺ أسأله فيها، فقال: «أقم حتى تأتينا الصدقة فنأمر لك بها» قال: ثم قال: «يا قبيصة إن المسألة لا تحل إلا لأحد ثلاثة: رجل تحمل حمالة فحلت له المسألة حتى يصيبها ثم يمسك، ورجل أصابته جائحة اجتاحت ماله فحلت له المسألة حتى يصيب قواما من عيش – أو قال سدادا من عيش – ورجل أصابته فاقة حتى يقوم ثلاثة من ذوي الحجا من قرابة قومه فيقولون لقد أصابت فلانا فاقة، فحلت له المسألة حتى يصيب قواما من عيش – أو قال سدادا من عيش – فما سواهن من المسألة سحت، يأكلها صاحبها سحتا» رواه مسلم.", "وعن أبي سعيد قال: أصيب رجل في عهد رسول الله ﷺ في ثمار ابتاعها فكثر دينه، فقال النبي ﷺ: «تصدقوا عليه» فتصدق الناس عليه فلم يبلغ ذلك وفاء دينه، فقال النبي ﷺ لغرمائه: «خذوا ما وجدتم وليس لكم إلا ذلك» رواه مسلم.", "وقال الإمام أحمد: حدثنا عبد الصمد، أنبأنا صدقة بن موسى عن أبي عمران الجوني عن قيس بن يزيد عن قاضي المصريين عن عبد الرحمن بن أبي بكر قال: قال رسول الله ﷺ: «يدعو الله بصاحب الدين يوم القيامة حتى يوقف بين يديه فيقول: يا ابن آدم فيم أخذت هذا الدين وفيم ضيعت حقوق الناس؟ فيقول: يا رب إنك تعلم أني أخذته فلم آكل ولم أشرب ولم أضيع ولكن أتى على يدي إما حرق وإما سرق وإما وضيعة. فيقول الله: صدق عبدي أنا أحق من قضى عنك اليوم، فيدعو الله بشيء فيضعه في كفة ميزانه فترجح حسناته على سيئاته، فيدخل الجنة بفضل الله ورحمته».", "وأما في سبيل الله فمنهم الغزاة الذين لا حق لهم في الديوان، وعند الإمام أحمد والحسن وإسحاق والحج من سبيل الله الحديث."], "translation": ["Adapun fī sabīlillāh (di jalan Allah):Di antara mereka adalah para pejuang (ghuzāt) yang tidak mendapatkan bagian dari pendapatan negara (dīwān). Menurut pendapat Imam Aḥmad, al-Ḥasan, dan Isḥāq, termasuk juga orang yang berhaji—berdasarkan hadits.", "Begitu pula \"ibn al-sabīl\" (musafir yang kehabisan bekal):", "Yaitu seorang musafir yang sedang melintas di suatu negeri dan tidak memiliki sesuatu pun untuk membantunya melanjutkan perjalanan. Maka ia boleh diberi dari zakat (sedekah) sejumlah yang mencukupinya untuk pulang ke negerinya—meskipun ia sebenarnya memiliki harta di tempat asalnya.", "Demikian pula hukum bagi seseorang yang hendak memulai perjalanan dari negerinya sendiri namun tidak memiliki bekal; maka ia boleh diberi dari harta zakat secukupnya untuk kebutuhan pergi dan pulangnya.", "Dalilnya adalah ayat (QS. 9:60) dan juga hadits yang diriwayatkan oleh Imam Abū Dāwūd dan Ibn Mājah, dari Maʿmar, dari Zayd bin Aslam, dari ʿAṭāʾ bin Yasār, dari Abū Saʿīd raḍiyallāhu ʿanhu, ia berkata:", "Rasulullah ﷺ bersabda:“Zakat tidak halal bagi orang kaya kecuali untuk lima golongan:(1) orang yang mengelola zakat ('āmil*),(2) seseorang yang membeli zakat dengan hartanya (yakni dengan cara jual beli, bukan meminta),(3) orang yang berutang (ghārim),(4) pejuang di jalan Allah (ghāzī fī sabīlillāh),(5) orang miskin yang menerima zakat lalu memberikan hadiah kepada orang kaya.”*– Diriwayatkan oleh Abū Dāwūd dan Ibn Mājah.", "Dan hadits ini juga diriwayatkan oleh kedua Sufyān (Sufyān al-Thawrī dan Sufyān ibn ʿUyainah) dari Zayd bin Aslam, dari ʿAṭāʾ secara mursal (tanpa menyebut sahabat).", "Dalam riwayat Abū Dāwūd lainnya, dari ʿAṭiyyah al-ʿAwfī, dari Abū Saʿīd al-Khudrī, Nabi ﷺ bersabda:", "“Zakat tidak halal bagi orang kaya kecuali dalam tiga keadaan:(1) berjuang di jalan Allah (fī sabīlillāh),(2) menjadi musafir (ibn al-sabīl),(3) tetangga miskin yang memberimu hadiah dari zakat yang ia terima, atau mengundangmu makan.”", "Adapun firman Allah: “Sebagai kewajiban dari Allah” (QS 9:60),maksudnya adalah hukum yang telah ditetapkan oleh Allah, dengan ketentuan, takaran, dan pembagian yang ditentukan-Nya.", "Firman Allah: “Dan Allah Maha Mengetahui lagi Maha Bijaksana”,maksudnya: Dia Maha Mengetahui segala yang tampak maupun tersembunyi, mengetahui segala maslahat bagi hamba-hamba-Nya, Maha Bijaksana dalam setiap ucapan-Nya, perbuatan-Nya, syariat-Nya, dan hukum-hukum-Nya. Tidak ada tuhan selain Dia dan tidak ada Rabb selain-Nya."]}, {"id": "qurtubi", "title": "al-Qurṭubī — al-Jāmiʿ li-Aḥkām al-Qurʾān", "arabic": ["قلت: أخرج هذا الحديث أبو داود عن بشير بن يسار، أن رجلا من الأنصار يقال له سهل بن أبي حثمة أخبره أن رسول الله صلى الله عليه وسلم وداه مائة من إبل الصدقة، يعني دية الأنصاري الذي قتل بخيبر، وقال موسى بن دينار: تحل الصدقة لغاز في سبيل الله، قد احتاج في غزوته وغاب عنه غناؤه ووفره. قال: ولا تحل لمن كان معه ماله من الغزاة، إنما تحل لمن كان ماله غائبا عنه منهم. وهذا مذهب الشافعي وأحمد وإسحاق وجمهور أهل العلم. وقال أبو حنيفة وصاحباه: لا يعطى الغازي إلا إذا كان فقيرا منقطعا به. وهذه زيادة على النص، والزيادة عنده على النص نسخ، والنسخ لا يكون إلا بقرآن أو خبر متواتر، وذلك معدوم ههنا، بل في صحيح السنة خلاف ذلك من قوله عليه السلام: \"لا تحل الصدقة لغني إلا لخمسة لغاز في سبيل الله أو لعامل عليها أو لغارم أو لرجل اشتراها بماله أو لرجل له جار مسكين فتصدق على المسكين فأهدى المسكين للغني\". رواه مالك مرسلا عن زيد بن أسلم عن عطاء بن يسار. ورفعه معمر عن زيد بن أسلم عن عطاء بن يسار عن أبي سعيد الخدري عن النبي صلى الله عليه وسلم. فكان هذا الحديث مفسرا لمعنى الآية، وأنه يجوز لبعض الأغنياء أخذها، ومفسرا لقوله عليه السلام: \"لا تحل الصدقة لغني ولا لذي مرة سوي\" لأن قوله هذا مجمل ليس على عمومه بدليل الخمسة الأغنياء المذكورين. وكان ابن القاسم يقول: لا يجوز لغني أن يأخذ من الصدقة ما يستعين به على الجهاد وينفقه في سبيل الله، وإنما يجوز ذلك لفقير. قال: وكذلك الغارم لا يجوز له أن يأخذ من الصدقة ما يقي به ماله ويؤدي منها دينه وهو عنها غني. قال: وإذا احتاج الغازي في غزوته وهو غني له مال غائب عنه لم يأخذ من الصدقة شيئا ويستقرض، فإذا بلغ بلده أدى ذلك من ماله. هذا كله ذكره ابن حبيب عن ابن القاسم، وزعم أن ابن نافع وغيره خالفوه في ذلك. وروى أبو زيد وغيره."], "translation": ["Tidak ada perbedaan pendapat di kalangan ulama bahwa seseorang boleh membeli seekor kuda untuk dipakai berjihad di jalan Allah. Jika diperbolehkan membeli seekor kuda secara penuh dari dana zakat, maka membeli budak untuk dimerdekakan juga diperbolehkan secara penuh. Tidak ada perbedaan antara keduanya. Allah lebih mengetahui.", "(22) – Firman Allah Ta’ala: \"Dan (diberikan pula zakat) di jalan Allah.\"", "Mereka yang dimaksud adalah para mujahid dan mereka yang berada di tempat penjagaan (ribath). Mereka diberikan bagian zakat untuk menutupi kebutuhan mereka dalam berjihad, baik mereka orang kaya maupun miskin. Ini adalah pendapat mayoritas ulama dan merupakan kesimpulan dari mazhab Imam Malik.", "Ibnu Umar berpendapat bahwa yang dimaksud \"fi sabilillah\" juga mencakup jamaah haji dan umrah. Diriwayatkan pula dari Imam Ahmad dan Ishaq rahimahumallah bahwa keduanya mengatakan: \"Sabilillah adalah haji.\"", "Dalam Shahih al-Bukhari disebutkan bahwa dari Abu Las: \"Nabi ﷺ memberikan kepada kami unta dari zakat untuk digunakan dalam ibadah haji.\" Diriwayatkan pula dari Ibnu Abbas bahwa beliau berkata: \"Seseorang boleh membebaskan budak dari zakat hartanya, dan boleh memberikan zakat untuk ibadah haji.\"", "Abu Muhammad Abdul Ghani al-Hafizh meriwayatkan dari Muhammad bin Muhammad al-Khayyasy, dari Abu Ghassan Malik bin Yahya, dari Yazid bin Harun, dari Mahdi bin Maimun, dari Muhammad bin Abi Ya'qub, dari Abdurrahman bin Abi Nu’aim (yang dikenal dengan kunyah Abu al-Hakam), ia berkata:", "\"Aku pernah duduk bersama Abdullah bin Umar, lalu datang seorang wanita kepadanya dan bertanya: 'Wahai Abu Abdurrahman, suamiku telah mewasiatkan hartanya untuk disalurkan di jalan Allah.' Maka Ibnu Umar menjawab: 'Itu sebagaimana yang ia katakan, di jalan Allah.' Aku pun berkata kepadanya: 'Engkau tidak menambahkan apapun dalam jawabanmu selain membuatnya bingung.' Lalu Ibnu Umar berkata: 'Apa yang engkau sarankan kepadaku, wahai Ibnu Abi Nu’aim? Apakah aku harus menyuruhnya untuk menyerahkan harta itu kepada tentara-tentara yang keluar dan malah membuat kerusakan di bumi serta memutus jalan-jalan?' Aku bertanya: 'Lalu apa yang engkau sarankan?' Ia menjawab: 'Aku menyarankan agar ia menyerahkannya kepada orang-orang saleh, yaitu para jamaah haji ke Baitullah al-Haram. Mereka adalah tamu-tamu Allah Yang Maha Pemurah, mereka adalah tamu-tamu Allah Yang Maha Pemurah, mereka adalah tamu-tamu Allah Yang Maha Pemurah, bukan tamu-tamu setan!' Beliau mengulangi perkataannya tiga kali.\"", "Aku bertanya: \"Wahai Abu Abdurrahman, siapakah tamu-tamu setan?\"Ia menjawab: \"Mereka adalah orang-orang yang masuk menemui para penguasa dan menyebarkan berita bohong kepada mereka, serta mengadu domba di antara kaum Muslimin dengan kedustaan, lalu mereka diberi hadiah dan memperoleh pemberian atas perbuatan tersebut.\"", "Muhammad bin Abdul Hakam berkata: \"Dapat diberikan zakat untuk membeli perlengkapan perang seperti kuda, senjata, dan alat perang lainnya yang diperlukan untuk mempertahankan wilayah Islam, karena semua itu termasuk dalam jihad dan manfaatnya.\"", "Nabi ﷺ pernah memberikan seratus ekor unta dalam kasus Sahl bin Abi Hatham sebagai upaya meredakan pertikaian. Aku (penulis) berkata: Hadis ini diriwayatkan oleh Abu Dawud dari Basyir bin Yasar, bahwa seorang laki-laki dari kalangan Anshar bernama Sahl bin Abi Hatham mengabarkan kepadanya bahwa Rasulullah ﷺ membayar diyat (uang tebusan) bagi seorang Anshari yang terbunuh di Khaibar dengan seratus ekor unta yang berasal dari zakat.", "Isa bin Dinar berkata: \"Zakat boleh diberikan kepada seorang mujahid yang membutuhkan dalam jihadnya dan kehilangan hartanya atau sumber penghasilannya. Namun, zakat tidak boleh diberikan kepada seorang mujahid yang masih memiliki hartanya, kecuali jika hartanya tidak bersamanya pada saat ia berjuang.\"", "Pendapat ini dianut oleh Imam Syafi’i, Ahmad, Ishaq, dan mayoritas ulama. Sementara Abu Hanifah dan kedua muridnya berpendapat bahwa seorang mujahid hanya boleh menerima zakat jika ia miskin dan tidak memiliki bekal yang cukup. Mereka menyatakan bahwa memberikan zakat kepada mujahid yang masih memiliki harta adalah tambahan terhadap teks Al-Qur’an, sedangkan menurut Abu Hanifah, tambahan terhadap teks merupakan bentuk nasakh (penghapusan hukum sebelumnya). Nasakh hanya bisa terjadi dengan Al-Qur’an atau hadis mutawatir, dan hal tersebut tidak ditemukan dalam konteks ini.", "Namun, dalam hadis sahih, terdapat dalil yang bertentangan dengan pendapat mereka. Rasulullah ﷺ bersabda:", "\"Zakat tidak halal bagi orang kaya kecuali bagi lima golongan: seorang mujahid di jalan Allah, seorang amil (pengurus zakat), seorang gharim (orang yang terlilit utang), seseorang yang membeli zakat dengan hartanya, atau seseorang yang memiliki tetangga miskin, lalu ia bersedekah kepada tetangganya, kemudian tetangganya menghadiahkan sedekah tersebut kepadanya.\"", "Hadis ini diriwayatkan oleh Imam Malik dalam bentuk mursal dari Zaid bin Aslam, dari Atha bin Yasar. Hadis ini juga diriwayatkan dalam bentuk marfu’ oleh Ma’mar dari Zaid bin Aslam, dari Atha bin Yasar, dari Abu Sa’id Al-Khudri, dari Nabi ﷺ.", "Hadis ini merupakan tafsir dari ayat Al-Qur’an, yang menunjukkan bahwa sebagian orang kaya boleh menerima zakat. Hadis ini juga menjelaskan sabda Nabi ﷺ:", "\"Zakat tidak halal bagi orang kaya dan orang yang sehat secara fisik.\"", "Sabda tersebut bersifat umum, tetapi tidak berlaku mutlak karena dikecualikan oleh lima kategori orang kaya yang disebutkan dalam hadis sebelumnya.", "Ibnul Qasim berpendapat bahwa tidak boleh bagi orang kaya menerima zakat untuk berjihad dan membelanjakannya di jalan Allah. Zakat hanya boleh diberikan kepada mujahid yang miskin. Begitu pula seorang gharim (orang yang terlilit utang), tidak boleh menerima zakat jika ia sebenarnya kaya dan masih memiliki harta untuk membayar utangnya.", "Ia juga berpendapat bahwa jika seorang mujahid membutuhkan dana dalam jihadnya, tetapi ia memiliki harta yang tidak bersamanya (misalnya tertinggal di tempat lain), maka ia tidak boleh mengambil zakat. Sebagai gantinya, ia harus meminjam uang, lalu melunasinya setelah ia kembali ke kampung halamannya.", "Semua pendapat ini disebutkan oleh Ibnu Habib dari Ibnu Qasim. Namun, Ibnu Nafi’ dan ulama lainnya menentang pandangan ini. Hadis ini juga diriwayatkan oleh Abu Zaid dan ulama lainnya.", "Ibnu Qasim berkata: \"Dapat diberikan zakat kepada seorang mujahid meskipun ia memiliki harta yang cukup untuk kebutuhannya dalam peperangan dan ia adalah orang kaya di negerinya. Dan ini adalah pendapat yang benar berdasarkan hadis yang berbunyi: (Zakat tidak halal bagi orang kaya kecuali untuk lima golongan).\"", "Ibnu Wahb meriwayatkan dari Imam Malik bahwa zakat dapat diberikan kepada para mujahid dan mereka yang berada di tempat perbatasan, baik mereka miskin maupun kaya."]}], "responses": [{"run_id": "CLAUDE-CoT-1", "model_id": "claude", "model": "Claude Opus 4.8", "family": "Anthropic", "version": 1, "source_file": "Claude Opus 4.8 V1.docx", "word_count": 1390, "paragraphs": ["Berikut uraian makna fī sabīlillāh dalam QS al-Tawbah [9]: 60 menurut metode tafsīr bi al-maʾthūr, dengan rujukan pada tiga kitab yang diminta. Saya dahulukan satu catatan metodologis: lokus rujukan yang paling presisi dan stabil lintas-edisi adalah nomor ayat, ditambah nomor athar pada al-Ṭabarī dan nomor masʾalah pada al-Qurṭubī. Nomor jilid saya sebutkan mengikuti edisi-edisi standar (dirinci pada Daftar Pustaka); nomor halaman persis bergantung pada edisi cetak, dan saya tidak mencantumkan angka halaman yang tidak dapat saya verifikasi terhadap edisi tertentu.", "Konteks ayat dan kedudukan fī sabīlillāh", "QS al-Tawbah [9]: 60 adalah nas penentu (āyat al-maṣārif) yang membatasi penyaluran zakat wajib kepada delapan golongan (al-aṣnāf al-thamāniya): (1) al-fuqarāʾ, (2) al-masākīn, (3) al-ʿāmilūn ʿalayhā, (4) al-muʾallafat qulūbuhum, (5) fī al-riqāb, (6) al-ghārimūn, (7) fī sabīlillāh, dan (8) ibn al-sabīl. Ayat ditutup dengan farīḍatan min Allāh — menegaskan bahwa pembagian ini ketetapan ilahi, bukan kebijakan personal Nabi. Dalam munāsabah-nya, ayat ini menjawab celaan kaum munafik atas pembagian sedekah (ayat 58: wa minhum man yalmizuka fī al-ṣadaqāt).", "Fī sabīlillāh menempati urutan ketujuh. Satu catatan struktural yang sering ditekankan para mufasir dan ahli nahwu (terutama al-Zamakhsharī, lalu dibahas al-Rāzī): empat golongan pertama dirangkai dengan lām al-tamlīk (li-l-fuqarāʾ…), sedangkan empat terakhir dengan huruf fī (wa fī al-riqāb… wa fī sabīlillāh…). Pergeseran ini dibaca sebagai isyarat bahwa empat golongan akhir adalah jalur penyaluran/peruntukan (maṣārif) — dana dibelanjakan untuk kepentingan tersebut, bukan diserahkan menjadi milik pribadi. Pemahaman ini menjadi latar penting bagi penafsiran fī sabīlillāh sebagai pembiayaan suatu aktivitas, bukan santunan kepemilikan.", "Penafsiran tiap mufasir", "a. al-Ṭabarī — Jāmiʿ al-Bayān", "Metode. al-Ṭabarī adalah representasi paripurna tafsīr bi al-maʾthūr: ia menghimpun pendapat salaf lengkap dengan sanad, lalu menetapkan tarjih (wa bi-lladhī qulnā… qāla ahl al-taʾwīl).", "Penafsiran. Ia mendefinisikan fī sabīlillāh sebagai nafkah dalam menolong agama Allah, jalan, dan syariat-Nya dengan memerangi musuh-musuh-Nya, yakni memerangi orang-orang kafir. Jadi maknanya bertumpu pada jihad/peperangan (ghazw al-kuffār). Quran", "Athar yang dikutip (beserta periwayat):", "No. 16876 — dari ʿAbd al-Raḥmān b. Zayd b. Aslam (Ibn Zayd, tabiin Madinah) melalui Ibn Wahb dari Yūnus: fī sabīlillāh itu maksudnya orang yang berperang di jalan Allah (al-ghāzī fī sabīl Allāh). Quran", "No. 16877 — sanad Ibn Wakīʿ ← ayahnya ← Sufyān (al-Thawrī) ← Zayd b. Aslam ← ʿAṭāʾ b. Yasār (tabiin): hadis sedekah tidak halal bagi orang kaya kecuali bagi lima golongan: amil, orang yang membelinya dengan hartanya, (yang berjuang) di jalan Allah, ibnu sabil, dan orang yang diberi hadiah oleh tetangganya yang menerima sedekah. Sebagaimana dikutip di sini sanadnya berhenti pada ʿAṭāʾ b. Yasār (mursal); editor (Aḥmad/Maḥmūd Shākir) mencatat bahwa Abū Dāwūd meriwayatkannya secara mauqūf dari Mālik (no. 1635), lalu marfūʿ melalui Maʿmar dari Zayd b. Aslam dari ʿAṭāʾ b. Yasār dari Abū Saʿīd al-Khudrī (no. 1636). QuranQuran", "No. 16878 — melalui Ibn Abī Laylā ← ʿAṭiyya (al-ʿAwfī) ← Abū Saʿīd al-Khudrī (sahabat) secara marfūʿ: sedekah tidak halal bagi orang kaya kecuali bagi tiga: (yang berjuang) di jalan Allah, ibnu sabil, dan orang yang diberi hadiah oleh tetangganya yang menerima sedekah. Quran", "Sebagai bahan pendukung, dalam pembahasan al-fuqarāʾ al-Ṭabarī juga membawakan athar Ibrāhīm al-Nakhaʿī (via Manṣūr) dan Saʿīd b. Jubayr serta Saʿīd b. ʿAbd al-Raḥmān b. Abzā yang memasangkan sedekah ditempatkan pada fakir-fakir Muhajirin dan pada (golongan) fī sabīlillāh — memperlihatkan resepsi awal yang mengaitkan kaum yang berhijrah-dan-berperang dengan klausa ini. الموسوعة الشاملة لتفسير", "Kesimpulan al-Ṭabarī: fī sabīlillāh = para pejuang (al-ghuzāt/al-mujāhidūn) yang memerangi orang kafir; bagian zakat ini membiayai jihad. Lewat hadis \"lā taḥillu al-ṣadaqatu li-ghaniyyin illā li-khamsa\", al-ghāzī boleh menerima sekalipun ia kaya, karena ia dikecualikan dari larangan memberi zakat kepada orang kaya.", "Rujukan: QS al-Tawbah [9]: 60; Jāmiʿ al-Bayān, athar no. 16876–16878 (edisi Shākir, jilid 14; pada edisi al-Turkī/Dār Hajar berada di jilid 11).", "b. Ibn Kathīr — Tafsīr al-Qurʾān al-ʿAẓīm", "Metode. Tafsīr bi al-maʾthūr yang lebih ringkas dan selektif: penjelasan dengan kata-katanya sendiri, lalu penguatan dengan hadis dan penilaian sanad.", "Penafsiran. Ibn Kathīr menyatakan: adapun \"fī sabīlillāh\", termasuk di dalamnya para pejuang (al-ghuzāt) yang tidak memiliki hak/jatah dalam dīwān — yakni mujahid sukarela (mutaṭawwiʿa) yang tidak tercatat memperoleh tunjangan tetap dari kas/register militer negara. Ia menambahkan catatan fikih: menurut Imam Aḥmad, al-Ḥasan (al-Baṣrī), dan Isḥāq (b. Rāhawayh): haji termasuk \"sabīl Allāh\", berdasarkan hadis. Quran + 3", "Dalil yang dikutip. Hadis Abū Saʿīd al-Khudrī \"lā taḥillu al-ṣadaqatu li-ghaniyyin illā li-khamsa\", yang diriwayatkan Abū Dāwūd dan Ibn Mājah melalui Maʿmar dari Zayd b. Aslam dari ʿAṭāʾ (b. Yasār) dari Abū Saʿīd; dan al-Sufyānān (al-Thawrī serta Ibn ʿUyayna) meriwayatkannya secara mursal dari ʿAṭāʾ, ditambah jalur Abū Dāwūd via ʿAṭiyya al-ʿAwfī dari Abū Saʿīd. Quran", "Kesimpulan Ibn Kathīr: fī sabīlillāh = pejuang sukarela yang tidak ditanggung dīwān; mereka diberi zakat untuk menopang jihadnya meski memiliki harta. Ibn Kathīr-lah, di antara ketiganya, yang secara eksplisit merekam pendapat dimasukkannya haji ke dalam sabīl Allāh (riwayat Aḥmad, al-Ḥasan, Isḥāq).", "Rujukan: QS al-Tawbah [9]: 60; Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4 (volume Sūrat al-Tawbah).", "c. al-Qurṭubī — al-Jāmiʿ li-Aḥkām al-Qurʾān", "Metode. Orientasi aḥkām/fikih: ayat diurai menjadi rangkaian masāʾil bernomor; bermazhab Maliki tetapi memetakan pendapat lintas mazhab.", "Penafsiran. Pada masʾalah ke-22, ia menulis: \"fī sabīlillāh\" yaitu para pejuang (al-ghuzāt) dan tempat ribāṭ (pos perbatasan); mereka diberi apa yang mereka belanjakan dalam peperangannya, baik kaya maupun miskin. Ia memerinci objek yang dibiayai — dari Muḥammad b. ʿAbd al-Ḥakam: diberikan dari sedekah untuk kuda perang (kurāʿ), senjata (silāḥ), dan perlengkapan perang yang diperlukan. QuranQuran", "Athar/riwayat yang dikutip:", "Hadis Sahl b. Abī Ḥathma — Nabi membayar diyat seratus unta dari unta-unta sedekah bagi orang Anshar yang terbunuh di Khaibar — dikeluarkan Abū Dāwūd dari Bashīr b. Yasār. Quranالموسوعة الشاملة لتفسير", "ʿĪsā b. Dīnār, Ibn al-Qāsim (via Ibn Ḥabīb dan via Abū Zayd), serta Ibn Wahb dari Mālik, dengan perbedaan internal Maliki mengenai pejuang yang punya harta di kampung halaman; pendapat sahih (Ibn al-Qāsim via Abū Zayd): Ibn Wahb meriwayatkan dari Mālik bahwa para pejuang dan penghuni pos-pos ribāṭ diberi zakat, baik mereka fakir maupun kaya. الموسوعة الشاملة لتفسير", "Peta mazhab. al-Qurṭubī menegaskan bahwa pemberian kepada pejuang baik kaya maupun miskin adalah mazhab al-Shāfiʿī, Aḥmad, Isḥāq, dan jumhur ahli ilmu; sedangkan Abū Ḥanīfa dan dua sahabatnya berkata: pejuang tidak diberi kecuali jika ia fakir lagi terputus (kehabisan bekal). الموسوعة الشاملة لتفسير", "Kesimpulan al-Qurṭubī: fī sabīlillāh = para pejuang (al-ghuzāt) dan penjaga perbatasan (ahl al-ribāṭ); bagian ini membiayai peperangan mereka (termasuk senjata dan tunggangan), dan menurut pandangan Maliki/jumhur diberikan tanpa memandang kaya atau miskin.", "Rujukan: QS al-Tawbah [9]: 60; al-Jāmiʿ li-Aḥkām al-Qurʾān, jilid 8, masʾalah ke-22 di bawah ayat tersebut.", "Perbandingan ketiga tafsir", "Titik sepakat (ittifāq). Ketiganya menambatkan makna primer fī sabīlillāh pada ayat ini ke ranah jihad/peperangan — para pejuang (al-ghuzāt/al-mujāhidūn) di jalan Allah. Tidak satu pun, dalam pembahasan ayat ini, menjadikan frasa tersebut sebagai lisensi umum bagi seluruh amal kebajikan; bacaan maʾthūr yang dominan adalah peperangan. Ketiganya pun bertumpu pada hadis yang sama (\"lā taḥillu al-ṣadaqatu li-ghaniyyin illā li-khamsa\", jalur Zayd b. Aslam ← ʿAṭāʾ b. Yasār, dengan Abū Saʿīd al-Khudrī pada sanad marfūʿ) untuk menetapkan bahwa pejuang termasuk orang kaya yang tetap boleh menerima.", "Titik beda (ikhtilāf):", "Cakupan \"pejuang\". al-Ṭabarī merumuskannya luas sebagai pembelanjaan untuk menolong agama dengan memerangi musuh (ghazw al-kuffār), dengan tekanan pada penegakan makna melalui athar. Ibn Kathīr mempersempit penerima pada mujahid sukarela yang tidak bertunjangan dīwān. al-Qurṭubī memperluas rujukan dengan memasukkan ahl al-ribāṭ (penjaga perbatasan) dan memerinci objek pembiayaan (senjata, tunggangan).", "Soal haji. Hanya Ibn Kathīr yang secara eksplisit merekam pendapat Aḥmad, al-Ḥasan al-Baṣrī, dan Isḥāq bahwa haji termasuk sabīl Allāh. al-Ṭabarī dan al-Qurṭubī, pada klausa ini, tetap berfokus pada pejuang. Sebagai konteks lintas-mufasir, mayoritas ulama justru tidak membiayai haji dari bagian ini — sebagaimana dicatat al-Baghawī, tidak diberikan sedikit pun darinya untuk haji menurut kebanyakan ahli ilmu. Quran", "Kaya vs. miskin dan pemetaan mazhab. al-Qurṭubī menyajikan fikih paling lengkap (Mālik/al-Shāfiʿī/Aḥmad/Isḥāq/jumhur: boleh kaya/miskin; Abū Ḥanīfa dan dua sahabatnya: hanya jika fakir-terputus), termasuk perselisihan internal Maliki. al-Ṭabarī menetapkan poin \"meski kaya\" lewat hadis tanpa mengurai peta mazhab; Ibn Kathīr mengisyaratkannya lewat kualifikasi dīwān dan hadis yang sama.", "Genre/metode. al-Ṭabarī = penghimpunan riwayat bersanad + tarjih; Ibn Kathīr = maʾthūr ringkas + penilaian hadis; al-Qurṭubī = elaborasi aḥkām lintas mazhab.", "Catatan rujukan halaman", "Lokus paling presisi dan tahan-edisi yang dapat saya pertanggungjawabkan adalah: (QS al-Tawbah [9]: 60) untuk ketiganya; nomor athar 16876–16878 pada al-Ṭabarī (edisi Shākir); dan masʾalah ke-22 pada al-Qurṭubī. Nomor halaman cetak berbeda antaredisi, sehingga saya menambatkan kutipan pada penanda-penanda itu alih-alih mengarang angka halaman. Bila edisi cetak yang Anda pakai disebutkan (mis. al-Ṭabarī edisi Shākir vs. al-Turkī; al-Qurṭubī Dār al-Kutub al-Miṣriyya 20 jilid), saya dapat memetakan nomor halaman persisnya."], "claimed_refs": ["Sumber primer (tiga tafsir):", "al-Ṭabarī, Abū Jaʿfar Muḥammad b. Jarīr (w. 310 H/923 M). Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Tahkik Aḥmad Muḥammad Shākir & Maḥmūd Muḥammad Shākir, Dār al-Maʿārif, Kairo — Sūrat al-Tawbah pada jilid 14, athar no. 16876–16878 (di bawah QS [9]: 60). Edisi alternatif: tahkik ʿAbd Allāh b. ʿAbd al-Muḥsin al-Turkī, Dār Hajar, Kairo, 1422 H — al-Tawbah pada jilid 11.", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl b. ʿUmar (w. 774 H/1373 M). Tafsīr al-Qurʾān al-ʿAẓīm. Tahkik Sāmī b. Muḥammad al-Salāma, Dār Ṭayba, Riyadh, 1420 H/1999 M — Sūrat al-Tawbah pada jilid 4 (di bawah QS [9]: 60).", "al-Qurṭubī, Abū ʿAbd Allāh Muḥammad b. Aḥmad (w. 671 H/1273 M). al-Jāmiʿ li-Aḥkām al-Qurʾān. Tahkik Aḥmad al-Bardūnī & Ibrāhīm Aṭfaysh, Dār al-Kutub al-Miṣriyya, Kairo, 1384 H/1964 M (20 jilid) — Sūrat al-Tawbah pada jilid 8, masʾalah ke-22 (di bawah QS [9]: 60).", "Sumber pendukung (yang dirujuk dalam jawaban):", "Abū Dāwūd al-Sijistānī. Sunan Abī Dāwūd, Kitāb al-Zakāt — hadis \"lā taḥillu al-ṣadaqatu li-ghaniyyin illā li-khamsa\", no. 1635–1636 (jilid 2, hlm. 158, sebagaimana dirujuk dalam apparatus editorial al-Ṭabarī edisi Shākir). Hadis ini menjadi sandaran bersama ketiga mufasir.", "al-Baghawī, Abū Muḥammad al-Ḥusayn b. Masʿūd (w. 516 H). Maʿālim al-Tanzīl — di bawah QS al-Tawbah [9]: 60 (digunakan sebagai konteks lintas-mufasir mengenai tidak dibiayainya haji dari bagian ini menurut mayoritas ulama)."]}, {"run_id": "CLAUDE-CoT-2", "model_id": "claude", "model": "Claude Opus 4.8", "family": "Anthropic", "version": 2, "source_file": "Claude opus 4.8 V2.docx", "word_count": 1447, "paragraphs": ["Berikut uraian makna frasa fī sabīlillāh (وفي سبيل الله) dalam QS al-Tawbah [9]: 60 menurut metode tafsīr bi al-maʾthūr, dengan menelusuri langsung redaksi ketiga kitab yang Anda sebutkan beserta athar yang dikutip masing-masing mufasir.", "Konteks ayat dan kedudukan fī sabīlillāh di antara delapan aṣnāf", "Ayatnya berbunyi:", "إِنَّمَا الصَّدَقَاتُ لِلْفُقَرَاءِ وَالْمَسَاكِينِ وَالْعَامِلِينَ عَلَيْهَا وَالْمُؤَلَّفَةِ قُلُوبُهُمْ وَفِي الرِّقَابِ وَالْغَارِمِينَ وَفِي سَبِيلِ اللَّهِ وَابْنِ السَّبِيلِ ۖ فَرِيضَةً مِنَ اللَّهِ ۗ وَاللَّهُ عَلِيمٌ حَكِيمٌ", "Surah al-Tawbah adalah surah Madaniyyah. Ayat 60 turun dalam rangkaian ayat 58–59 yang menyoroti orang-orang munafik yang mencela (lamz) Nabi ﷺ dalam soal pembagian sedekah (وَمِنْهُم مَّن يَلْمِزُكَ فِي الصَّدَقَاتِ). Maka ayat 60 datang untuk membatasi (fungsi ḥaṣr dari partikel innamā) siapa saja yang berhak menerima zakat, yakni delapan golongan, tidak lebih. Kedelapan golongan itu, secara berurutan: (1) al-fuqarāʾ, (2) al-masākīn, (3) al-ʿāmilīn ʿalayhā, (4) al-muʾallafati qulūbuhum, (5) fī al-riqāb, (6) al-ghārimīn, (7) fī sabīlillāh, dan (8) ibn al-sabīl. Dengan demikian fī sabīlillāh menempati urutan ketujuh.", "Satu catatan struktur kebahasaan yang relevan untuk penafsiran: empat golongan pertama disebut dengan lām al-tamlīk (لِلْفُقَرَاءِ...), sedangkan empat golongan terakhir—mulai وَفِي الرِّقَابِ—disebut dengan partikel fī (ẓarfiyyah). Al-Rāzī menyimpulkan dari pergeseran lām ke fī ini bahwa empat bagian terakhir bersifat maṣraf/saluran penyaluran untuk suatu tujuan, bukan diserahkan sebagai milik pribadi. Bagian yang disebut dengan \"fī\" ditempatkan pada tujuannya—misalnya bagian \"fī al-riqāb\" disalurkan untuk membebaskan budak, bagian para gharim untuk melunasi utang mereka, dan bagian para pejuang untuk menyiapkan kebutuhan perang. Implikasinya, fī sabīlillāh sejak awal dibaca sebagai jalur/tujuan (jihad), bukan sebagai kategori \"orang miskin\" tertentu. الموسوعة الشاملة لتفسير", "Penafsiran masing-masing mufasir", "a. Al-Ṭabarī — Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān", "Metode. Al-Ṭabarī menyajikan aqwāl salaf berikut sanadnya, lalu melakukan tarjīḥ (memilih pendapat yang ia pandang paling kuat).", "Penafsiran frasa. Ia menegaskan bahwa fī sabīlillāh bermakna nafkah untuk menolong agama Allah dan syariat-Nya dengan memerangi musuh-musuh-Nya, dan itulah ghazw al-kuffār (memerangi orang kafir). Al-Ṭabarī menyatakan bahwa maksud \"fī sabīlillāh\" adalah nafkah dalam menolong agama Allah, jalan, dan syariat-Nya dengan memerangi musuh-musuh-Nya, yaitu memerangi orang-orang kafir, dan ia menyebut bahwa para ahli takwil berpendapat demikian. الموسوعة الشاملة لتفسيرQuran", "Athar yang dikutip. Untuk glosa langsung atas frasa ini, al-Ṭabarī menukil riwayat melalui jalur Yūnus → Ibn Wahb → Ibn Zayd (yakni ʿAbd al-Raḥmān b. Zayd b. Aslam, w. 182 H), bahwa fī sabīlillāh maksudnya \"al-ghāzī fī sabīlillāh\" (pejuang di jalan Allah). Al-Ṭabarī meriwayatkan dari Yūnus, dari Ibn Wahb, dari Ibn Zayd mengenai firman \"fī sabīlillāh\" bahwa maksudnya adalah pejuang (al-ghāzī) di jalan Allah. Pada konteks sekitar, ia juga membawakan riwayat dari Ibrāhīm al-Nakhaʿī (tābiʿī, w. ±96 H) melalui Manṣūr, bahwa sedekah dahulu disalurkan kepada fakir kalangan Muhajirin dan fī sabīlillāh. Diriwayatkan dari Ibrāhīm—melalui Manṣūr—bahwa sedekah dahulu ditempatkan pada kaum fakir Muhajirin dan pada jalan Allah. Quran + 2", "Kesimpulan al-Ṭabarī. Fī sabīlillāh = para pejuang/ghuzāt di jalan Allah. Penting dicatat prinsip yang ia tarik: bagian ini diberikan kepada pejuang baik ia kaya maupun miskin, karena diberikan untuk keperluan perang, bukan untuk menutup kebutuhan pribadinya. Al-Ṭabarī menegaskan bahwa orang yang diberi karena berjihad di jalan Allah diberi baik ia kaya maupun miskin, untuk berperang dan bukan untuk menutupi kebutuhannya. Ini adalah pembacaan yang sempit-fokus pada jihad. Quran", "b. Ibn Kathīr — Tafsīr al-Qurʾān al-ʿAẓīm", "Metode. Ibn Kathīr menafsirkan ayat demi ayat secara ringkas dengan sandaran utama hadis dan riwayat (sering dari Musnad Aḥmad dan kitab-kitab Sunan).", "Penafsiran frasa. Ia merumuskan fī sabīlillāh sebagai para pejuang (al-ghuzāt) yang tidak memiliki hak/jatah dalam dīwān (yakni tidak menerima gaji tetap dari baitulmal/daftar tentara). Ibn Kathīr menyatakan bahwa \"fī sabīlillāh\" mencakup para pejuang yang tidak memiliki hak dalam dīwān. Ayah Surah QuranAlmoslim", "Perluasan ke haji. Ibn Kathīr menambahkan pendapat yang memasukkan haji ke dalam fī sabīlillāh. Ia menyebutkan bahwa menurut Imam Aḥmad, al-Ḥasan [al-Baṣrī], dan Isḥāq [b. Rāhwayh], haji termasuk jalan Allah, berdasarkan hadis. Ayah Surah QuranIslam-QA", "Athar/hadis pendukung. Sebagai landasan, ia mengutip hadis Abū Saʿīd al-Khudrī (sahabat): \"sedekah tidak halal bagi orang kaya kecuali bagi lima golongan,\" di antaranya ghāzin fī sabīlillāh (pejuang di jalan Allah). Ibn Kathīr menyebut bahwa hadis ini diriwayatkan oleh Abū Dāwūd dan Ibn Mājah dari jalur Maʿmar, dari Zayd b. Aslam, dari ʿAṭāʾ b. Yasār, dari Abū Saʿīd, dan bahwa kedua Sufyān meriwayatkannya secara mursal. Ayah Surah Quran", "Kesimpulan Ibn Kathīr. Inti fī sabīlillāh = pejuang sukarela yang tidak bergaji dari dīwān; sebagian ulama memperluasnya hingga mencakup haji.", "c. Al-Qurṭubī — al-Jāmiʿ li-Aḥkām al-Qurʾān", "Metode. Al-Qurṭubī (mufasir Mālikī) membahas ayat ini secara fikih dalam rangkaian masāʾil. Pembahasan fī sabīlillāh berada pada al-masʾalah al-thāniyah wa-al-ʿishrūn (masalah ke-22).", "Penafsiran frasa. Ia mendefinisikan mereka sebagai al-ghuzāt (para pejuang) dan mawḍiʿ al-ribāṭ (pos-pos penjagaan perbatasan), yang diberi sebesar belanja perang mereka—baik kaya maupun miskin. Al-Qurṭubī menyatakan pada masalah ke-22 bahwa \"fī sabīlillāh\" adalah para pejuang dan tempat ribāṭ, yang diberi apa yang mereka belanjakan dalam peperangan mereka, baik kaya maupun miskin. Quran", "Athar/pendapat yang dikutip.", "Muḥammad b. ʿAbd al-Ḥakam (faqih Mālikī): bagian ini juga disalurkan untuk al-kurāʿ (kuda), senjata, dan perlengkapan perang, karena semuanya termasuk sarana jihad. Muḥammad b. ʿAbd al-Ḥakam menyatakan bahwa dari sedekah itu diberikan untuk kuda, senjata, dan apa yang dibutuhkan dari alat-alat perang serta menahan musuh, karena semuanya termasuk jalan dan manfaat peperangan. الموسوعة الشاملة لتفسيرQuran", "Hadis Sahl b. Abī Ḥathma (sahabat) melalui Bushayr b. Yasār, riwayat Abū Dāwūd: Nabi ﷺ membayar diyat seratus unta dari unta sedekah—dipakai al-Qurṭubī untuk menunjukkan keluwesan penyaluran harta sedekah pada konteks kemaslahatan. Al-Qurṭubī menyebut bahwa Abū Dāwūd meriwayatkan dari Bushayr b. Yasār, bahwa seorang Ansar bernama Sahl b. Abī Ḥathma mengabarkan Rasulullah ﷺ membayar seratus unta dari unta sedekah. الموسوعة الشاملة لتفسيرQuran", "ʿĪsā b. Dīnār (faqih Mālikī): sedekah halal bagi pejuang yang membutuhkan dalam peperangannya karena hartanya tidak bersamanya; tidak halal bagi pejuang yang hartanya menyertainya. ʿĪsā b. Dīnār berpendapat bahwa sedekah halal bagi pejuang di jalan Allah yang membutuhkan dalam peperangannya dan hartanya tidak menyertainya, dan tidak halal bagi yang hartanya bersamanya. الموسوعة الشاملة لتفسيرQuran", "Perselisihan fikih yang ia rekam. Al-Qurṭubī menyebut bahwa pendapat ini (pejuang diberi meski kaya) adalah mazhab al-Shāfiʿī, Aḥmad, Isḥāq, dan jumhur ahli ilmu, sedangkan Abū Ḥanīfa dan kedua sahabatnya berpendapat pejuang tidak diberi kecuali jika fakir dan terputus dari hartanya. الموسوعة الشاملة لتفسير", "Kesimpulan al-Qurṭubī. Fī sabīlillāh = para pejuang dan penjaga perbatasan beserta pembiayaan jihad (termasuk persenjataan), dengan uraian khilaf fikih yang paling lengkap di antara ketiganya.", "Perbandingan ketiga tafsir", "Titik kesepakatan.", "Ketiganya menjadikan jihad/qitāl sebagai makna inti fī sabīlillāh, dengan rujukan utama pada al-ghuzāt/al-mujāhidūn. Tidak satu pun dari ketiga mufasir ini membaca fī sabīlillāh sebagai \"seluruh jalan kebaikan / kemaslahatan umum.\" Pembacaan luas semacam itu (mis. jamīʿ al-qurab pada sebagian Hanafiyah, lalu Rashīd Riḍā dan sebagian ulama kontemporer) muncul belakangan; secara bahasa, \"fī sabīlillāh\" yang mutlak diarahkan kepada jihad di jalan Allah, bukan setiap bentuk kebaikan. Islam-QA", "Ketiganya sepakat pejuang diberi meski ia kaya, karena pemberian itu untuk keperluan perang.", "Titik perbedaan.", "Cakupan pembiayaan. Al-Ṭabarī menjaga fokus pada pelaku/aktivitas perang (al-nafaqa fī... al-qitāl); al-Qurṭubī secara eksplisit memperluas ke materiel perang (kuda, senjata, alat) lewat Ibn ʿAbd al-Ḥakam; Ibn Kathīr menambahkan syarat dīwān (pejuang yang tak bergaji tetap).", "Status haji. Ibn Kathīr menyebut tegas pandangan yang memasukkan haji (Aḥmad, al-Ḥasan al-Baṣrī, Isḥāq). Al-Ṭabarī dan al-Qurṭubī (pada redaksi yang terkonfirmasi di atas) bertahan pada makna jihad. Sebagai konteks, pandangan \"haji termasuk fī sabīlillāh\" juga terekam pada al-Baghawī yang menyandarkannya kepada Ibn ʿAbbās, al-Ḥasan, Aḥmad, dan Isḥāq—jadi ini posisi minoritas yang dikenal, bukan khas Ibn Kathīr. Al-Baghawī menyebut bahwa sebagian ulama membolehkan penyaluran bagian \"fī sabīlillāh\" untuk haji, dan hal itu diriwayatkan dari Ibn ʿAbbās serta merupakan pendapat al-Ḥasan, Aḥmad, dan Isḥāq. QuranQuran4All", "Sengketa kaya–miskin. Ketiganya menyinggung, tetapi al-Qurṭubī menguraikannya paling rinci sebagai khilaf mazhab (jumhur vs. Abū Ḥanīfa).", "Karakter metode. Al-Ṭabarī = athar + tarjīḥ; Ibn Kathīr = ringkas-bersandar hadis; al-Qurṭubī = masāʾil fikih bercorak Mālikī.", "Catatan presisi rujukan (integritas sitasi)", "Permintaan Anda untuk mencantumkan jilid dan halaman menuntut kehati-hatian, karena nomor halaman ketiga kitab ini berbeda antaredisi (misalnya al-Ṭabarī terbit dalam edisi Muʾassasat al-Risāla, Dār Hajr/al-Turkī, dan Dār al-Maʿārif/Aḥmad Shākir yang paginasinya tidak sama). Agar tidak menyodorkan angka halaman yang tidak dapat saya verifikasi, saya menautkan setiap pernyataan ke koordinat yang stabil di semua edisi:", "Untuk ketiganya: lokasi pada QS al-Tawbah [9]: 60, ditambah nama periwayat/jalur sanad yang saya sebutkan (Ibn Zayd, Ibrāhīm al-Nakhaʿī, Abū Saʿīd al-Khudrī, Sahl b. Abī Ḥathma, Muḥammad b. ʿAbd al-Ḥakam, ʿĪsā b. Dīnār).", "Untuk al-Qurṭubī: tambahan penanda al-masʾalah ke-22 pada ayat tersebut.", "Jilid (edisi standar yang saya yakini): Ibn Kathīr (Dār Ṭayba) → jilid 4; al-Qurṭubī (Dār al-Kutub al-Miṣriyyah, 20 jilid) → jilid 8. Untuk al-Ṭabarī, jilid bergantung edisi sehingga saya tidak mematoknya tanpa konfirmasi.", "Jika Anda memberi tahu edisi cetak persis yang Anda pakai (atau mengizinkan saya menarik dari satu PDF/maktabah digital tertentu), saya akan melengkapi nomor halaman tepat untuk tiap pernyataan dan menyusun ulang sitasi dalam format yang Anda kehendaki (mis. Chicago/Turabian atau Author-Date)."], "claimed_refs": ["Sumber primer (tiga tafsir inti):", "al-Ṭabarī, Abū Jaʿfar Muḥammad b. Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Taḥqīq ʿAbd Allāh b. ʿAbd al-Muḥsin al-Turkī. Kairo: Dār Hajr / Markaz al-Buḥūth wa-al-Dirāsāt al-ʿArabiyyah wa-al-Islāmiyyah. (Tafsir QS al-Tawbah [9]: 60.)", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl b. ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Taḥqīq Sāmī b. Muḥammad Salāmah. Riyadh: Dār Ṭayba li-l-Nashr wa-al-Tawzīʿ, cet. ke-2, 1420 H/1999 M, jilid 4. (Tafsir QS al-Tawbah [9]: 60.)", "al-Qurṭubī, Abū ʿAbd Allāh Muḥammad b. Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān. Taḥqīq Aḥmad al-Bardūnī & Ibrāhīm Aṭfaysh. Kairo: Dār al-Kutub al-Miṣriyyah, cet. ke-2, 1384 H/1964 M, jilid 8. (Tafsir QS al-Tawbah [9]: 60, al-masʾalah ke-22.)", "Sumber penunjang yang dirujuk dalam jawaban:", "al-Baghawī, Abū Muḥammad al-Ḥusayn b. Masʿūd. Maʿālim al-Tanzīl fī Tafsīr al-Qurʾān. (Untuk pandangan haji sebagai fī sabīlillāh dari Ibn ʿAbbās; QS al-Tawbah [9]: 60.)", "al-Rāzī, Fakhr al-Dīn. Mafātīḥ al-Ghayb (al-Tafsīr al-Kabīr). (Untuk analisis lām al-tamlīk vs. partikel fī; QS al-Tawbah [9]: 60.)", "Sumber hadis yang dikutip para mufasir:", "Abū Dāwūd al-Sijistānī. al-Sunan, Kitāb al-Zakāt. (Hadis Abū Saʿīd al-Khudrī \"lā taḥillu al-ṣadaqa li-ghaniyy illā li-khamsa\"; serta riwayat Sahl b. Abī Ḥathma.)", "Ibn Mājah, Abū ʿAbd Allāh Muḥammad b. Yazīd. al-Sunan, Kitāb al-Zakāt. (Hadis Abū Saʿīd al-Khudrī, sebagaimana dikutip Ibn Kathīr.)"]}, {"run_id": "CLAUDE-CoT-3", "model_id": "claude", "model": "Claude Opus 4.8", "family": "Anthropic", "version": 3, "source_file": "Claude Opus 4.8 V3.docx", "word_count": 1722, "paragraphs": ["Berikut uraian sistematis tentang frasa fī sabīlillāh dalam QS al-Tawbah [9]: 60 menurut tiga rujukan tafsīr bi al-maʾthūr yang Anda minta. Saya sudah memverifikasi matn (teks) ketiga tafsir tersebut langsung pada lema ayatnya sebelum menulis, sehingga substansi dan periwayat yang saya sebut bukan dari ingatan semata.", "Satu catatan kejujuran rujukan di muka (penting untuk Anda sebagai editor): saya mengunci rujukan sampai tingkat edisi + jilid + lema ayat (QS 9:60) — dan untuk al-Ṭabarī sampai nomor athar — karena itu yang bisa saya pertanggungjawabkan. Nomor halaman saya tahan, sebab halaman berbeda antarcetakan (Dār Hajar vs Muʾassasat al-Risālah vs al-Risālah ʿĀlamiyyah, dst.) dan saya tidak mau mencantumkan angka halaman yang tidak bisa saya pastikan. Jika Anda beri tahu cetakan persis yang Anda pegang, saya kunci halamannya.", "Konteks ayat dan kedudukan fī sabīlillāh", "Teks ayat:", "إِنَّمَا الصَّدَقَاتُ لِلْفُقَرَاءِ وَالْمَسَاكِينِ وَالْعَامِلِينَ عَلَيْهَا وَالْمُؤَلَّفَةِ قُلُوبُهُمْ وَفِي الرِّقَابِ وَالْغَارِمِينَ وَفِي سَبِيلِ اللَّهِ وَابْنِ السَّبِيلِ ۖ فَرِيضَةً مِّنَ اللَّهِ ۗ وَاللَّهُ عَلِيمٌ حَكِيمٌ", "Sebab/konteks turunnya. Ayat ini turun dalam rangkaian QS al-Tawbah 58–60, merespons kaum munafik yang melaqab (mencela, lamz) Nabi ﷺ dalam hal pembagian sedekah — seolah pembagian itu mengikuti selera pribadi beliau. Maka Allah membatasi (ḥaṣr, lewat innamā) penyaluran zakat hanya kepada delapan golongan, dan menutupnya dengan farīḍatan mina Llāh (\"sebagai ketetapan yang diwajibkan dari Allah\") untuk menegaskan bahwa ini ketentuan ilahi yang baku, bukan kebijakan Nabi. (Konteks lamz ini disebut lintas tafsir, termasuk al-Ṭabarī dan Ibn Kathīr pada awal penafsiran ayat.)", "Delapan aṣnāf dan posisi fī sabīlillāh. Urutannya: (1) al-fuqarāʾ; (2) al-masākīn; (3) al-ʿāmilūn ʿalayhā; (4) al-muʾallafat qulūbuhum; (5) fī al-riqāb; (6) al-ghārimūn; (7) fī sabīlillāh; (8) ibn al-sabīl. Jadi fī sabīlillāh adalah golongan ketujuh.", "Isyarat gramatikal yang relevan. Empat golongan pertama disebut dengan lām al-tamlīk (لِلفقراء…), sedangkan empat terakhir dengan ḥarf fī (وفي الرقاب… وفي سبيل الله…). Tradisi tafsir membaca pergeseran ini sebagai pembeda fungsi: golongan ber-lām menerima untuk dimiliki dan dibelanjakan bebas, sedangkan golongan ber-fī (termasuk fī sabīlillāh) bersifat saluran/peruntukan — dana dialirkan untuk tujuan (di sini: jihad), bukan diserahkan semata atas dasar kefakiran pribadi. Implikasinya muncul di bawah: orang kaya pun boleh menerima dari pos ini jika ia ghāzī.", "Catatan metodologis. Tafsīr bi al-maʾthūr berarti makna ditetapkan melalui riwayat — hadis Nabi, lalu āthār sahabat dan tabiʿin — sebelum (atau alih-alih) raʾy murni. Ketiga mufasir ini sama-sama berdiri di tradisi itu, dengan penekanan berbeda (al-Ṭabarī kuat pada isnād + bahasa + tarjīḥ; Ibn Kathīr ringkas + kritis hadis; al-Qurṭubī melebar ke *aḥkām/*fiqih).", "Penafsiran tiap mufasir", "2a. Al-Ṭabarī — Jāmiʿ al-Bayān", "Glosa inti. Al-Ṭabarī memaknai frasa ini sebagai nafkah untuk menolong agama Allah dengan memerangi musuh-musuh-Nya:", "«وأمّا قوله: ﴿وفي سبيل الله﴾ فإنه يعني: وفي النفقة في نصرة دين الله وطريقه وشريعته التي شرعها لعباده، بقتال أعدائه، وذلك هو غزو الكفّار.»", "Athar yang dikutip (pada lema ini).", "ʿAbd al-Raḥmān ibn Zayd ibn Aslam (\"Ibn Zayd\", generasi atbāʿ al-tābiʿīn), via jalur Yūnus → Ibn Wahb: menafsirkan ﴾وفي سبيل الله﴿ sebagai «الغازي في سبيل الله» (pejuang di jalan Allah). Ini athar penopang utama yang dijadikan al-Ṭabarī sebagai sandaran makna.", "Pada konteks sekitar (\"siapa fakir penerima zakat\"), ia juga membawakan riwayat Ibrāhīm al-Nakhaʿī (tabiʿi, via Manṣūr) dan Saʿīd ibn Jubayr bersama Saʿīd ibn ʿAbd al-Raḥmān ibn Abzā (keduanya tabiʿin), yang mengaitkan sedekah dengan \"fakir Muhajirin dan fī sabīlillāh\" serta menyebut mereka yang punya rumah/unta untuk haji dan berperang tetap dinilai fakir dan diberi bagian zakat.", "Poin \"kaya atau fakir\". Al-Ṭabarī menegaskan bahwa pemberian pada pos ini diberikan kepada pejuang «غنيًّا كان أو فقيرًا، للغزو، لا لسدّ خلّته» (entah kaya atau fakir, demi peperangan, bukan untuk menutup kebutuhannya) — sejajar dengan logika muʾallafat qulūbuhum yang juga bisa diberi meski kaya.", "Kesimpulan al-Ṭabarī. Fī sabīlillāh = para pejuang (al-ghuzāt) dalam memerangi orang kafir. Ia menutup dengan menyatakan bahwa \"demikianlah yang dikatakan ahl al-taʾwīl\" — menandakan ini pendapat yang ia rajih-kan dan ia anggap selaras dengan otoritas salaf yang ia kutip. Ia tidak memperluas ke haji pada lema ini; pendekatannya paling lugawi-restriktif (makna mutlak sabīl Allāh = jihad).", "Rujukan: al-Ṭabarī, Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān, tafsir QS al-Tawbah [9]: 60 — edisi taḥqīq Aḥmad Muḥammad Shākir, Muʾassasat al-Risālah (lihat rangkaian athar bernomor ±16827–16835 dst., bagian penafsiran QS 9:60); bandingkan edisi taḥqīq ʿAbd Allāh b. ʿAbd al-Muḥsin al-Turkī, Dār Hajar, pada sūrat al-Tawbah.", "2b. Ibn Kathīr — Tafsīr al-Qurʾān al-ʿAẓīm", "Glosa inti. Ibn Kathīr meringkas:", "«وأمّا في سبيل الله: فمنهم الغزاة الذين لا حقّ لهم في الديوان، وعند الإمام أحمد والحسن وإسحاق: والحجّ من سبيل الله، للحديث.»", "Artinya: fī sabīlillāh mencakup para pejuang yang tidak punya hak/jatah dalam dīwān (daftar gaji tentara negara) — yakni pejuang sukarela yang tidak ditanggung kas negara, sehingga diberi dari zakat.", "Periwayat/otoritas yang dirujuk.", "al-Ḥasan al-Baṣrī (tabiʿi), bersama Imam Aḥmad b. Ḥanbal dan Isḥāq b. Rāhawayh (imam mutaakhkhirīn) — sebagai pendukung perluasan bahwa haji termasuk sabīlillāh, \"karena adanya hadis.\"", "Hadis penopang isu \"boleh untuk orang kaya pada lima keadaan\": riwayat Abū Saʿīd al-Khudrī (sahabi) — «لا تحلّ الصدقة لغنيّ إلا لخمسة…» (… di antaranya «غازٍ في سبيل الله»), diriwayatkan Abū Dāwūd dan Ibn Mājah lewat Maʿmar → Zayd b. Aslam → ʿAṭāʾ b. Yasār (tabiʿi) → Abū Saʿīd; Ibn Kathīr mencatat bahwa \"al-Sufyānān\" (al-Thawrī dan Ibn ʿUyaynah) meriwayatkannya secara mursal dari Zayd b. Aslam → ʿAṭāʾ. (Hadis ʿAbd al-Raḥmān b. Abī Bakr yang ia bawakan tepat sebelum glosa ini berkenaan dengan al-ghārim/utang, bukan inti fī sabīlillāh.)", "Kesimpulan Ibn Kathīr. Inti fī sabīlillāh = pejuang sukarela di luar dīwān; dan ia secara eksplisit merekam (tanpa membantah) pendapat Aḥmad–al-Ḥasan–Isḥāq bahwa haji pun masuk pos ini berdasarkan hadis. Posisinya berada di tengah: menegaskan jihad sebagai makna pokok, sekaligus mencatat perluasan ke haji.", "Rujukan: Ibn Kathīr, Tafsīr al-Qurʾān al-ʿAẓīm, tafsir QS al-Tawbah [9]: 60 — edisi taḥqīq Sāmī b. Muḥammad Salāmah, Dār Ṭayyibah (Riyadh, 1420/1999), jilid 4.", "2c. Al-Qurṭubī — al-Jāmiʿ li-Aḥkām al-Qurʾān", "Al-Qurṭubī membahasnya sebagai al-masʾala al-thāniya wa al-ʿishrūn (masalah ke-22) dalam penafsiran ayat ini, dan ini bahasan paling luas-fiqih di antara ketiganya.", "Glosa inti.", "«﴿وفي سبيل الله﴾ وهم الغزاة وموضع الرباط، يُعطون ما ينفقون في غزوهم كانوا أغنياء أو فقراء. وهذا قول أكثر العلماء، وهو تحصيل مذهب مالك.»", "Yakni: fī sabīlillāh = para pejuang dan pos perbatasan (ribāṭ); mereka diberi sesuai kebutuhan perang, kaya atau fakir — dan ini pendapat mayoritas ulama serta hasil (taḥṣīl) mazhab Mālik.", "Periwayat/otoritas yang dikutip.", "Ibn ʿUmar (sahabi): fī sabīlillāh = «الحجّاج والعمّار» (jamaah haji dan umrah). Al-Qurṭubī juga membawakan kisah seorang perempuan yang bertanya kepada Ibn ʿUmar tentang harta yang diwasiatkan suaminya \"fī sabīlillāh\", apakah boleh dipakai untuk haji (jalur via ʿAbd al-Raḥmān b. Abī Nuʿm).", "Imam Aḥmad dan Isḥāq: «سبيل الله الحجّ» (sabīlillāh adalah haji).", "Ibn ʿAbbās (sahabi): dalam taʿlīq al-Bukhārī, disebut memakai zakat untuk memerdekakan budak dan memberi dalam (urusan) haji; juga riwayat Abū Lās tentang Nabi ﷺ menanggung jamaah haji dengan unta sedekah.", "Muḥammad b. ʿAbd al-Ḥakam (faqih Mālikī): pos ini juga untuk kuda perang (al-kurāʿ), senjata (al-silāḥ), dan alat perang serta menahan musuh dari wilayah Islam — \"karena semuanya bagian dari jalan dan manfaat peperangan.\"", "ʿĪsā b. Dīnār (faqih Mālikī Andalusi): sedekah halal bagi ghāzī fī sabīlillāh yang kehabisan/jauh dari hartanya dalam ekspedisinya; tidak halal bagi yang hartanya menyertainya.", "Hadis ʿUbayd Allāh b. ʿAdī b. al-Khiyār (sahabi, riwayat Abū Dāwūd): dua orang kekar (jaldayn) meminta zakat saat Haji Wadaʿ, lalu Nabi ﷺ bersabda «… ولا حظّ فيها لغنيّ ولا لقويٍّ مكتسب» — dipakai dalam perdebatan syarat penerima.", "Riwayat Sahl b. Abī Ḥathma (sahabi, via Bashīr b. Yasār, Abū Dāwūd): Nabi ﷺ membayar diyah 100 unta dari unta sedekah.", "Dimensi fiqih (khas al-Qurṭubī). Ia menonjolkan perselisihan: jumhur (al-Shāfiʿī, Aḥmad, Isḥāq, dan mayoritas) — pejuang diberi entah kaya atau fakir; Abū Ḥanīfa dan dua sahabatnya — pejuang hanya diberi bila ia fakir/terputus (munqaṭiʿ bihi).", "Kesimpulan al-Qurṭubī. Makna pokok = pejuang dan ribāṭ, diberi tanpa syarat kaya/fakir (pendapat mayoritas & Mālikī); namun ia mendokumentasikan paling lengkap perluasan ke haji/umrah (Ibn ʿUmar, Aḥmad, Isḥāq, Ibn ʿAbbās) dan ke logistik perang/pertahanan (Ibn ʿAbd al-Ḥakam), sekaligus memetakan sengketa fiqih syarat penerima. Posisinya paling ekspansif secara cakupan.", "Rujukan: al-Qurṭubī, al-Jāmiʿ li-Aḥkām al-Qurʾān, tafsir QS al-Tawbah [9]: 60 (al-masʾala al-thāniya wa al-ʿishrūn: fī sabīlillāh) — edisi taḥqīq Aḥmad al-Bardūnī & Ibrāhīm Aṭfayyish, Dār al-Kutub al-Miṣriyyah (Kairo, 1384/1964), jilid 8.", "Perbandingan ketiga tafsir", "Titik sepakat (ittifāq):", "Makna pokok identik — ketiganya menetapkan rujukan utama fī sabīlillāh sebagai para pejuang/mujahid (al-ghuzāt), khususnya pejuang sukarela yang tidak ditanggung dīwān/kas negara. (al-Ṭabarī: ghazw al-kuffār; Ibn Kathīr: al-ghuzāt alladhīna lā ḥaqq lahum fī al-dīwān; al-Qurṭubī: al-ghuzāt wa mawḍiʿ al-ribāṭ.)", "Boleh untuk yang kaya — pos ini bersifat peruntukan untuk tujuan jihad, bukan santunan kefakiran; sehingga pejuang diberi meski kaya (eksplisit pada al-Ṭabarī dan al-Qurṭubī; pada Ibn Kathīr lewat hadis \"lima keadaan\"). Inilah yang memisahkannya dari fuqarāʾ/masākīn.", "Metode sama — penetapan makna ditempuh secara bi al-maʾthūr: hadis Nabi + āthār sahabat/tabiʿin, bukan raʾy semata.", "Titik berbeda (ikhtilāf):", "Luas perluasan di luar jihad — ini perbedaan paling tajam:", "al-Ṭabarī (paling sempit): mengunci makna pada memerangi orang kafir; tidak membawa perluasan haji pada lema ini; tekanannya lugawi (makna mutlak sabīl Allāh = jihad).", "Ibn Kathīr (tengah): menegaskan pejuang sebagai inti, tetapi mencatat pendapat Aḥmad–al-Ḥasan al-Baṣrī–Isḥāq bahwa haji termasuk sabīlillāh \"karena hadis.\"", "al-Qurṭubī (paling luas): mendokumentasikan terbanyak — Ibn ʿUmar (haji & umrah), Aḥmad & Isḥāq (haji), Ibn ʿAbbās (taʿlīq Bukhārī), dan Ibn ʿAbd al-Ḥakam (senjata, kuda, pertahanan perbatasan).", "Bobot fiqih — hanya al-Qurṭubī yang mengangkat penuh sengketa hukum (jumhur: pejuang kaya boleh menerima; Ḥanafiyyah: hanya bila fakir/terputus) plus syarat ʿĪsā b. Dīnār (hartanya sedang tak terjangkau). al-Ṭabarī menyentuh isu \"kaya/fakir\" sekilas; Ibn Kathīr lewat hadis.", "Karakter genre — al-Ṭabarī = riwāya + bahasa + tarjīḥ; Ibn Kathīr = riwāya ringkas + cenderung kritik hadis; al-Qurṭubī = aḥkām/fiqih maksimal dengan enumerasi masāʾil.", "Catatan penyeimbang (akurasi cakupan). Tidak satu pun dari ketiganya menjadikan pembacaan paling luas — yaitu fī sabīlillāh = \"segala jalan kebaikan / seluruh ibadah\" (jamīʿ al-qurab / wujūh al-khayr) — sebagai pendapat utama. Pembacaan maksimal itu lebih lekat pada karya lain (mis. al-Badāʾiʿ al-Kāsānī sebagaimana dinukil al-Ālūsī, dan kecenderungan al-Rāzī). Ketiga tafsir yang Anda minta tetap menambatkan fī sabīlillāh pada jihad, dengan haji sebagai perluasan utama yang ter-athar-kan (terkuat pada al-Qurṭubī, dicatat oleh Ibn Kathīr, tidak diambil al-Ṭabarī).", "Rujukan presisi dan Daftar Pustaka", "Mengenai presisi halaman: sebagaimana saya tandai di awal, setiap pernyataan di atas saya tambatkan pada lema penafsiran QS al-Tawbah [9]: 60 dalam masing-masing kitab (untuk al-Ṭabarī sampai nomor athar), plus edisi dan jilid. Nomor halaman bergantung cetakan dan sengaja tidak saya karang. Sebutkan cetakan persis yang Anda gunakan (penerbit, tahun, jumlah jilid), dan saya isi nomor halamannya secara tepat."], "claimed_refs": ["al-Ṭabarī, Abū Jaʿfar Muḥammad b. Jarīr (w. 310 H). Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Taḥqīq: Aḥmad Muḥammad Shākir. Beirut: Muʾassasat al-Risālah. — Bagian: tafsir QS al-Tawbah [9]: 60 (rangkaian athar ±no. 16827 dst., termasuk athar Ibn Zayd: «الغازي في سبيل الله»). [Edisi banding: taḥqīq ʿAbd Allāh b. ʿAbd al-Muḥsin al-Turkī, Kairo: Dār Hajar, sūrat al-Tawbah.] Jilid/halaman: konfirmasi sesuai cetakan.", "Ibn Kathīr, ʿImād al-Dīn Abū al-Fidāʾ Ismāʿīl b. ʿUmar (w. 774 H). Tafsīr al-Qurʾān al-ʿAẓīm. Taḥqīq: Sāmī b. Muḥammad Salāmah. Riyadh: Dār Ṭayyibah, cet. ke-2, 1420 H/1999 M. — Jilid 4, tafsir QS al-Tawbah [9]: 60 («الغزاة الذين لا حقّ لهم في الديوان… والحجّ من سبيل الله للحديث»). Halaman: konfirmasi sesuai cetakan.", "al-Qurṭubī, Abū ʿAbd Allāh Muḥammad b. Aḥmad al-Anṣārī (w. 671 H). al-Jāmiʿ li-Aḥkām al-Qurʾān (Tafsīr al-Qurṭubī). Taḥqīq: Aḥmad al-Bardūnī & Ibrāhīm Aṭfayyish. Kairo: Dār al-Kutub al-Miṣriyyah, cet. ke-2, 1384 H/1964 M. — Jilid 8, tafsir QS al-Tawbah [9]: 60, al-masʾala al-thāniya wa al-ʿishrūn (fī sabīlillāh: «وهم الغزاة وموضع الرباط…»). Halaman: konfirmasi sesuai cetakan."]}, {"run_id": "CLAUDE-CoT-4", "model_id": "claude", "model": "Claude Opus 4.8", "family": "Anthropic", "version": 4, "source_file": "Claude Opus 4.8 V4.docx", "word_count": 1658, "paragraphs": ["Berikut uraian sistematis makna fī sabīlillāh dalam QS al-Tawbah [9]: 60 menurut pembacaan tafsīr bi al-maʾthūr pada tiga tafsir yang Anda tetapkan. Saya menelusuri langsung nas Arab ketiga kitab untuk memastikan riwayat, periwayat, dan letak teksnya; konvensi rujukan saya jelaskan di bagian akhir (penomoran athar/masألah dijadikan jangkar utama karena nomor halaman berbeda antaredisi).", "Konteks ayat dan kedudukan fī sabīlillāh", "Surah al-Tawbah (Barāʾah) bersifat Madaniyyah. Ayat 60 turun dalam rangkaian bantahan terhadap kaum munāfiqūn yang mencela (lamz) Nabi ﷺ soal pembagian sedekah — sebagaimana ayat sebelumnya (9: 58: wa minhum man yalmizuka fī al-ṣadaqāt). Ayat 60 menjawab celaan itu dengan pembatasan (ḥaṣr) melalui kata innamā: harta zakat hanya menjadi hak delapan golongan (aṣnāf thamāniyah) yang Allah tetapkan sebagai farīḍah, sehingga Nabi ﷺ tidak memiliki kepentingan pribadi di dalamnya.", "Delapan golongan itu berurutan: (1) al-fuqarāʾ, (2) al-masākīn, (3) al-ʿāmilīn ʿalayhā, (4) al-muʾallafati qulūbuhum, (5) fī al-riqāb, (6) al-ghārimīn, (7) fī sabīlillāh, (8) ibn al-sabīl. Jadi fī sabīlillāh menempati golongan ketujuh, di antara al-ghārimīn (keenam) dan ibn al-sabīl (kedelapan).", "Satu ciri gramatikal ayat ini penting untuk fī sabīlillāh: empat golongan pertama ditandai lām (li-l-fuqarāʾ…) yang oleh para mufasir umumnya dibaca sebagai lām al-tamlīk (kepemilikan/serah-terima langsung), sedangkan empat golongan terakhir ditandai partikel fī (wa fī al-riqāb… wa fī sabīlillāh) yang menunjukkan ẓarfiyyah — bahwa \"bagian\" itu ditempatkan pada saluran/kepentingan, bukan diserahkan untuk dimiliki pribadi. Implikasinya pada fī sabīlillāh: dana disalurkan untuk kepentingan jalan Allah (membiayai jihad), bukan untuk menutup kebutuhan personal penerima — sebuah dasar yang nanti melahirkan kesimpulan \"diberikan meski ia kaya.\"", "Penafsiran tiap mufasir", "2a. al-Ṭabarī — Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān", "Penafsiran frasa. al-Ṭabarī memaknai fī sabīlillāh sebagai nafkah untuk menolong agama Allah, jalan, dan syariat-Nya dengan memerangi musuh-musuh-Nya, yaitu peperangan melawan orang-orang kafir (ghazw al-kuffār). Ia menegaskan bahwa inilah pendapat ahl al-taʾwīl. Quran", "Athar/periwayat yang dikutip.", "Athar no. 16876: dengan sanad Yūnus (b. ʿAbd al-Aʿlā) → Ibn Wahb → Ibn Zayd (yakni ʿAbd al-Raḥmān ibn Zayd ibn Aslam, generasi atbāʿ al-tābiʿīn), bahwa maksud fī sabīlillāh adalah \"al-ghāzī fī sabīlillāh\" (sang pejuang di jalan Allah). Altafser", "Athar no. 16877: sanad Ibn Wakīʿ → ayahnya → Sufyān → Zayd ibn Aslam → ʿAṭāʾ ibn Yasār (tābiʿī), secara marfūʿ: \"Sedekah tidak halal bagi orang kaya kecuali bagi lima: orang yang bekerja mengurusnya, orang yang membelinya dengan hartanya, fī sabīlillāh, ibn al-sabīl, atau orang yang punya tetangga lalu disedekahi kemudian tetangga itu menghadiahkannya kepadanya.\" Quran", "Athar no. 16878: sanad Ibn Wakīʿ → ayahnya → Ibn Abī Laylā → ʿAṭiyyah → Abū Saʿīd al-Khudrī (sahabat) → Nabi ﷺ, dengan redaksi serupa yang menyebut tiga golongan (fī sabīlillāh, ibn al-sabīl, dan tetangga yang disedekahi).", "Sebelumnya, dalam pembahasan al-fuqarāʾ, ia mengutip Ibrāhīm al-Nakhaʿī (tābiʿī) via Manṣūr: \"Dahulu sedekah ditempatkan pada fakir-fakir Muhajirin dan fī sabīlillāh\" (athar 16830, 16832), serta riwayat Saʿīd ibn Jubayr dan Saʿīd ibn ʿAbd al-Raḥmān ibn Abzā tentang sebagian Muhajirin yang memiliki rumah, istri, budak, dan unta untuk haji dan berperang, namun tetap digolongkan fakir dan diberi bagian zakat (athar 16831). Altafser", "Kesimpulan al-Ṭabarī. Dalam tarjīḥ-nya (pendapat pilihannya sendiri), al-Ṭabarī menegaskan bahwa Allah menjadikan zakat untuk dua tujuan: menutup kebutuhan kaum muslimin (sadd khallat al-muslimīn) dan menolong serta menguatkan Islam (maʿūnat al-Islām wa taqwiyatih). Fī sabīlillāh termasuk kategori kedua, sehingga — menurutnya — diberikan kepada yang kaya maupun yang fakir, karena ia diberi untuk peperangan (li-l-ghazw), bukan untuk menutup kebutuhannya. Maka kesimpulannya: fī sabīlillāh = para pejuang (al-ghuzāt al-mujāhidūn), dan dana diberikan demi kepentingan jihad terlepas dari status kaya/miskin. AltafserAltafser", "2b. Ibn Kathīr — Tafsīr al-Qurʾān al-ʿAẓīm", "Penafsiran frasa. Ibn Kathīr meringkas: \"Adapun fī sabīlillāh, mereka itu adalah para pejuang yang tidak memiliki hak (gaji tetap) dalam dīwān (daftar tentara/baitulmal)\" — yakni mujahid sukarela yang tidak digaji negara. Ia lalu menambahkan riwayat perluasan: menurut Imam Aḥmad, al-Ḥasan (al-Baṣrī), dan Isḥāq (ibn Rāhwayh), haji termasuk min sabīlillāh, berdasarkan sebuah hadis. QuranQuran", "Athar/periwayat yang dikutip.", "Hadis Abū Saʿīd al-Khudrī (sahabat) yang diriwayatkan Abū Dāwūd dan Ibn Mājah dari jalur Maʿmar → Zayd ibn Aslam → ʿAṭāʾ ibn Yasār → Abū Saʿīd, dengan matan: \"Sedekah tidak halal bagi orang kaya kecuali bagi lima: ʿāmil zakat, orang yang membelinya dengan hartanya, gharim, ghāzin fī sabīlillāh, atau orang miskin yang disedekahi lalu menghadiahkannya kepada orang kaya.\" Ibn Kathīr mencatat bahwa kedua Sufyān (al-Thawrī dan Ibn ʿUyaynah) meriwayatkannya secara mursal dari Zayd ibn Aslam → ʿAṭāʾ. QuranQuran", "Riwayat Abū Dāwūd dari ʿAṭiyyah al-ʿAwfī → Abū Saʿīd, yang menyebut fī sabīlillāh dan ibn al-sabīl di antara pengecualian bagi orang kaya.", "Hadis penguat Abū Hurayrah (sahabat): \"Tiga golongan yang menjadi hak Allah menolong mereka: al-ghāzī fī sabīlillāh, mukātab yang ingin menebus dirinya, dan orang menikah yang ingin menjaga kehormatan\" — diriwayatkan Imam Aḥmad dan ahli Sunan selain Abū Dāwūd. Quran", "Kesimpulan Ibn Kathīr. Inti fī sabīlillāh adalah para pejuang sukarela yang tidak bergaji dalam dīwān; ia mengakui adanya pendapat yang dinukil (Aḥmad, al-Ḥasan, Isḥāq) bahwa haji turut masuk ke dalam saluran ini berdasarkan hadis. Karakter penafsirannya lebih riwāyah-sentris (mengedepankan takhrīj: Abū Dāwūd, Ibn Mājah, Aḥmad), tanpa elaborasi madzhab seluas al-Qurṭubī.", "2c. al-Qurṭubī — al-Jāmiʿ li-Aḥkām al-Qurʾān", "Penafsiran frasa. al-Qurṭubī menyusun tafsirnya dalam bentuk masāʾil. Pada masألah ke-22 (al-thāniyah wa al-ʿishrūn) ia menyatakan: \"Wa fī sabīlillāh: mereka adalah para pejuang (al-ghuzāt) dan tempat ribāṭ (pos penjagaan perbatasan); mereka diberi apa yang mereka belanjakan dalam peperangannya, baik mereka kaya maupun fakir.\" Quran", "Athar/periwayat dan pandangan fiqih yang dikutip.", "Muḥammad ibn ʿAbd al-Ḥakam (fukaha Mālikī): diberikan pula dari sedekah untuk kurāʿ (kuda/tunggangan), senjata, dan kebutuhan alat-alat perang serta menahan musuh dari wilayah, karena semuanya termasuk jalan peperangan dan kemanfaatannya — yakni perluasan objek penyaluran ke perlengkapan jihad, bukan hanya kepada orang. Quran", "Riwayat dari ʿAbd Allāh ibn ʿUmar (sahabat): seorang perempuan menyebut suaminya berwasiat hartanya \"fī sabīlillāh\"; Ibn ʿUmar mengarahkannya untuk diberikan kepada para jamaah haji (\"itulah delegasi al-Raḥmān\") — menautkan sabīlillāh dengan haji dalam praktik seorang sahabat. Quran", "Hadis Sahl ibn Abī Ḥathmah (sahabat) via Bashīr ibn Yasār: diriwayatkan Abū Dāwūd, bahwa Rasulullah ﷺ membayar diyat seratus unta dari unta sedekah — dijadikan dalil penggunaan dana ini untuk maslahat terkait jihad/keamanan. Quran", "ʿĪsā ibn Dīnār (Mālikī Andalusi): sedekah halal bagi pejuang yang membutuhkan dalam peperangannya dan hartanya tidak bersamanya, tetapi tidak halal bagi yang membawa hartanya — penghalusan syarat. Quran", "Pemetaan madzhab: ini adalah madzhab al-Shāfiʿī, Aḥmad, Isḥāq, dan jumhur ahli ilmu; sedangkan Abū Ḥanīfa dan kedua sahabatnya berpendapat pejuang tidak diberi kecuali bila ia fakir lagi terputus (kehabisan bekal). Quran", "Kesimpulan al-Qurṭubī. Fī sabīlillāh = para pejuang (al-ghuzāt) dan murābiṭūn (penjaga perbatasan), diberi sesuai kebutuhan peperangan baik kaya maupun fakir; dengan perluasan (melalui Ibn ʿAbd al-Ḥakam) bahwa dana mencakup persenjataan dan logistik perang. Penafsirannya paling fiqh-oriented di antara ketiganya, memuat khilaf madzhab, praktik sahabat, dan rincian operasional.", "Catatan komparatif: Ibn ʿĀshūr (dalam al-Taḥrīr wa al-Tanwīr) membaca redaksi al-Qurṭubī sebagai isyarat bahwa pendapat Ibn ʿAbd al-Ḥakam (perluasan ke alat perang) berbeda dari pendapat jumhur — berguna sebagai catatan kaki, tetapi ini penilaian Ibn ʿĀshūr atas al-Qurṭubī, bukan pernyataan al-Qurṭubī sendiri.", "Perbandingan ketiga tafsir", "Titik kesepakatan (ittifāq):", "Rujukan inti: ketiganya menetapkan makna pokok fī sabīlillāh sebagai al-ghuzāt/al-mujāhidūn (pejuang dalam jihad) — al-Ṭabarī \"ghazw al-kuffār\", Ibn Kathīr \"al-ghuzāt alladhīna lā ḥaqqa lahum fī al-dīwān\", al-Qurṭubī \"al-ghuzāt wa mawḍiʿ al-ribāṭ\".", "Diberikan meski kaya: semua membolehkan pemberian kepada pejuang sekalipun ia kaya, karena penyaluran ditujukan untuk kepentingan jihad/penguatan Islam, bukan menutup kefakiran. al-Ṭabarī menegaskannya lewat kerangka dua-tujuan zakat; al-Qurṭubī dengan \"kānū aghniyāʾ aw fuqarāʾ\"; Ibn Kathīr melalui hadis \"lā taḥillu al-ṣadaqatu li-ghaniyyin illā li-khamsah\" yang menyebut sang pejuang.", "Sumber dalil bersama: hadis jalur Zayd ibn Aslam → ʿAṭāʾ ibn Yasār (\"sedekah tidak halal bagi orang kaya kecuali bagi lima\") hadir di ketiganya (al-Ṭabarī athar 16877; Ibn Kathīr via Abū Dāwūd & Ibn Mājah; al-Qurṭubī merujuk Abū Dāwūd) — inti evidensiil maʾthūr yang sama.", "Titik perbedaan (ikhtilāf):", "Cakupan di luar pejuang:", "al-Ṭabarī membatasi pada jihad/perang (ghazw al-kuffār); tidak memperluas ke haji.", "Ibn Kathīr mencatat pendapat dinukil (Aḥmad, al-Ḥasan, Isḥāq) bahwa haji termasuk min sabīlillāh.", "al-Qurṭubī memperluas ke logistik perang (senjata, tunggangan, benteng) via Ibn ʿAbd al-Ḥakam, dan menautkan praktik Ibn ʿUmar yang mengarahkan wasiat \"fī sabīlillāh\" ke haji.", "Dimensi ribāṭ (perbatasan) eksplisit hanya pada al-Qurṭubī (\"mawḍiʿ al-ribāṭ\").", "Objek penyaluran: hanya al-Qurṭubī yang tegas memperluas objek dari orang ke alat perang.", "Nuansa \"kaya/miskin\": al-Ṭabarī tegas \"kaya atau fakir\"; al-Qurṭubī memuat penghalusan ʿĪsā ibn Dīnār (hanya bila harta pejuang tidak bersamanya) dan menukil khilaf Ḥanafī (Abū Ḥanīfa: pejuang diberi hanya bila fakir-terputus) — jadi ada gradasi internal yang tidak ditonjolkan al-Ṭabarī maupun Ibn Kathīr.", "Karakter metodologis:", "al-Ṭabarī: kumpulkan athar salaf lalu tarjīḥ sendiri (kerangka dua tujuan zakat) — mode mufasir-faqih klasik.", "Ibn Kathīr: ringkas, riwāyah-sentris, menonjolkan takhrīj dan satu pendapat minoritas (haji).", "al-Qurṭubī: aḥkām/fiqh-sentris dalam format masāʾil, kaya khilaf madzhab dan rincian operasional.", "4. Rujukan presisi dan daftar pustaka", "Konvensi rujukan. Untuk tafsīr bi al-maʾthūr klasik, jangkar paling tepat dan tahan-edisi adalah letak ayat + penanda internal (nomor athar pada al-Ṭabarī; nomor masألah pada al-Qurṭubī), karena nomor jilid/halaman berubah antaredisi cetak. Di bawah ini saya cantumkan keduanya: penanda internal yang terverifikasi dari nas dan jilid pada edisi standar yang dirujuk. Catatan kejujuran: nomor halaman terikat pada edisi yang disebutkan; saya menganjurkan Anda mencocokkan halaman dengan eksemplar yang Anda pegang, sedangkan letak ayat + nomor athar/masألah membuat rujukan tetap dapat dilacak di edisi mana pun.", "Letak per pernyataan:", "al-Ṭabarī — makna fī sabīlillāh (\"ghazw al-kuffār\"), athar Ibn Zayd (16876), hadis Zayd b. Aslam→ʿAṭāʾ (16877), ʿAṭiyyah→Abū Saʿīd (16878), serta tarjīḥ dua-tujuan zakat: tafsir QS al-Tawbah: 60, Jāmiʿ al-Bayān, jilid 14 (cet. Muʾassasat al-Risālah, taḥqīq Aḥmad Shākir) / jilid 11 (cet. Dār Hajar, taḥqīq al-Turkī).", "Ibn Kathīr — \"al-ghuzāt alladhīna lā ḥaqqa lahum fī al-dīwān\"; pandangan Aḥmad/al-Ḥasan/Isḥāq tentang haji; hadis Abū Saʿīd (Abū Dāwūd & Ibn Mājah) dan Abū Hurayrah (Aḥmad): tafsir QS al-Tawbah: 60, Tafsīr al-Qurʾān al-ʿAẓīm, jilid 4 (cet. Dār Ṭayyibah, taḥqīq Sāmī al-Salāmah).", "al-Qurṭubī — fī sabīlillāh = al-ghuzāt + mawḍiʿ al-ribāṭ; perluasan Ibn ʿAbd al-Ḥakam; riwayat Ibn ʿUmar; hadis Sahl b. Abī Ḥathmah; ʿĪsā ibn Dīnār; peta madzhab: tafsir QS al-Tawbah: 60, al-masألah al-thāniyah wa al-ʿishrūn (ke-22), al-Jāmiʿ li-Aḥkām al-Qurʾān, jilid 8 (cet. Dār al-Kutub al-Miṣriyyah).", "Catatan Ibn ʿĀshūr (pembanding): al-Taḥrīr wa al-Tanwīr, tafsir QS al-Tawbah: 60."], "claimed_refs": ["al-Ṭabarī, Abū Jaʿfar Muḥammad ibn Jarīr. Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān. Taḥqīq Aḥmad Muḥammad Shākir. Beirut: Muʾassasat al-Risālah, 1420 H/2000 M, 24 jilid — jilid 14 (tafsir QS al-Tawbah: 60; athar no. 16876–16878). Edisi alternatif: taḥqīq ʿAbd Allāh ibn ʿAbd al-Muḥsin al-Turkī, Kairo: Dār Hajar, cet. 1, 1422 H, 26 jilid — jilid 11.", "Ibn Kathīr, Abū al-Fidāʾ Ismāʿīl ibn ʿUmar. Tafsīr al-Qurʾān al-ʿAẓīm. Taḥqīq Sāmī ibn Muḥammad al-Salāmah. Riyadh: Dār Ṭayyibah, cet. 2, 1420 H/1999 M, 8 jilid — jilid 4 (tafsir QS al-Tawbah: 60).", "al-Qurṭubī, Abū ʿAbd Allāh Muḥammad ibn Aḥmad. al-Jāmiʿ li-Aḥkām al-Qurʾān. Taḥqīq Aḥmad al-Bardūnī & Ibrāhīm Aṭfaysh. Kairo: Dār al-Kutub al-Miṣriyyah, cet. 2, 1384 H/1964 M, 20 jilid — jilid 8 (tafsir QS al-Tawbah: 60, masألah ke-22).", "Ibn ʿĀshūr, Muḥammad al-Ṭāhir. al-Taḥrīr wa al-Tanwīr. Tunis: al-Dār al-Tūnisiyyah li-l-Nashr — tafsir QS al-Tawbah: 60 (rujukan pembanding untuk pembacaan atas al-Qurṭubī)."]}, {"run_id": "DEEPSEEK-CoT-1", "model_id": "deepseek", "model": "DeepSeek", "family": "DeepSeek", "version": 1, "source_file": "Deepseek V1.docx", "word_count": 1061, "paragraphs": ["Konteks Ayat dan Kedudukan Fī Sabīlillāh di Antara Delapan Golongan Penerima Zakat", "Ayat 60 dari Surah al-Tawbah [9] merupakan satu-satunya ayat yang menetapkan secara eksplisit dan terperinci delapan golongan (al-aṣnāf al-thamāniyah) yang berhak menerima zakat. Ayat ini ditutup dengan penegasan farīḍatan minallāh (kewajiban dari Allah), menunjukkan bahwa ketentuan ini bersifat pasti dan mengikat.", "Frasa wa fī sabīlillāh (dan di jalan Allah) menempati urutan ketujuh dari delapan golongan tersebut, yaitu setelah al-gārimīn (orang yang terlilit utang) dan sebelum ibn al-sabīl (musafir yang kehabisan bekal). Penyebutannya yang terpisah dari golongan lain menunjukkan adanya kategori khusus yang diakui syariat sebagai penerima zakat di luar kelompok-kelompok yang kebutuhan ekonominya bersifat personal. Secara konteks, ayat ini memberikan legitimasi pendanaan dari pos zakat untuk kepentingan yang bersifat kolektif dan perjuangan di jalan Allah.", "Penafsiran Masing-Masing Mufasir", "a. Al-Ṭabarī dalam Jāmiʿ al-Bayān ʿan Taʾwīl Āy al-Qurʾān", "Cara Menafsirkan:", "Al-Ṭabarī menafsirkan fī sabīlillāh sebagai para pejuang (al-ghuzāt) yang terputus dari harta mereka saat berada di medan jihad dan tidak memiliki sumber nafkah. Ia menekankan bahwa mereka berhak menerima zakat sekalipun sebenarnya tergolong orang kaya di negeri asal mereka, karena kebutuhan mendesak untuk melanjutkan perjuangan.", "Riwayat dan Athar yang Dikutip:", "Dari Ibn ʿAbbās melalui jalur ʿAlī ibn Abī Ṭalḥah: “fī sabīl Allāh: ghuzāt fī sabīl Allāh” (di jalan Allah adala
